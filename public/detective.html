<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detective Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body {
    margin: 0;
    background: #0a0f1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    color: #f0e6f5;
    overflow: hidden;
    user-select: none;
  }
  #global-back-btn {
    width: 960px;
    margin-bottom: 10px;
    display: none;
    text-align: left;
    z-index: 10000;
  }
  .plain-btn {
    color: #f0e6f5;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    font-size: 14px;
    background: transparent;
    border: none;
    padding: 0;
  }
  .plain-btn:hover {
    color: #00f5d4;
  }
  #game-wrapper {
    width: 960px;
    height: 640px;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    cursor: default;
  }
  .screen {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    display: none;
    background: #0d0514;
    border: 2px solid #00aaff;
    box-sizing: border-box;
  }
  .screen.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  /* Terminal text */
  .term-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    margin-bottom: 10px;
    text-align: center;
    pointer-events: none;
  }
  /* Prologue */
  #screen-prologue { cursor: pointer; }
  #prologue-text-container {
    opacity: 1;
    transition: opacity 150ms ease-in-out;
    pointer-events: none;
  }
  #prologue-text-container.fade-out {
    opacity: 0;
  }
  /* Title card */
  #screen-titlecard { opacity: 1; transition: opacity 150ms ease-in-out; }
  #screen-titlecard.fade-out { opacity: 0; }
  #screen-titlecard .title-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 64px;
    font-weight: 900;
    letter-spacing: 8px;
    color: #f0e6f5;
    text-align: center;
  }
  /* Modal */
  .modal-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(13, 5, 20, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 99999;
  }
  .modal-content {
    background: #1a0f2e;
    border: 2px solid #4fc3f7;
    padding: 30px;
    width: 600px;
    max-width: 80%;
  }
  .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: bold; color: #4fc3f7; margin-bottom: 10px; }
  .modal-desc { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #f0e6f5; margin-bottom: 20px; line-height: 1.5; }
  .close-btn { font-family: 'JetBrains Mono', monospace; cursor: pointer; color: #ff3366; background: none; border: none; font-size: 16px; padding: 0; }
  
  .game-container-div {
    width: 100%;
    height: 100%;
    display: none;
  }
  .game-container-div.active {
    display: block;
  }

  /* ============ BACKGROUND ENHANCEMENTS ============ */
  body {
    background-color: #0a0f1e;
    background-image: radial-gradient(rgba(0,170,255,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .screen { position: absolute; overflow: hidden; }
  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: repeating-linear-gradient(45deg,
      rgba(80,0,120,0.06) 0,
      rgba(80,0,120,0.06) 1px,
      transparent 1px,
      transparent 30px);
  }
  .screen.active > * { position: relative; z-index: 1; }

  @keyframes borderBreath {
    0%,100% { border-color: #00aaff; }
    50%     { border-color: #0066cc; }
  }
  #screen-titlecard, #screen-selection {
    animation: borderBreath 4s ease-in-out infinite;
  }

  /* ============ ADMIN DASHBOARD ============ */
  #screen-admin .admin-line { font-family:'JetBrains Mono', monospace; font-size:14px; color:#f0e6f5; line-height:1.8; }
  #screen-admin h2 { font-family:'Rajdhani', sans-serif; color:#4fc3f7; letter-spacing:6px; margin:0 0 18px; font-size:22px; }

  /* ============ GEMINI HINT PANEL ============ */
  #gemini-panel {
    position:absolute; right:20px; bottom:20px; width:340px; max-height:60%;
    background:#0d0514; border:1px solid #4fc3f7; display:none; flex-direction:column;
    z-index:9998; font-family:'JetBrains Mono', monospace; color:#f0e6f5;
  }
  #gemini-panel.open { display:flex; }
  #gemini-header { padding:8px 12px; background:#1a0f2e; border-bottom:1px solid #4fc3f7;
    display:flex; justify-content:space-between; font-size:12px; letter-spacing:2px; color:#4fc3f7; }
  #gemini-history { flex:1; overflow-y:auto; padding:10px; font-size:12px; line-height:1.5; min-height:120px; max-height:280px; }
  #gemini-history .msg-u { color:#9fdcff; margin:6px 0; }
  #gemini-history .msg-a { color:#f0e6f5; margin:6px 0; font-style:italic; }
  #gemini-input-row { display:flex; border-top:1px solid #4fc3f7; }
  #gemini-input { flex:1; background:transparent; border:none; color:#f0e6f5;
    font-family:'JetBrains Mono', monospace; font-size:12px; padding:8px; outline:none; }
  #gemini-send { background:transparent; border:none; border-left:1px solid #4fc3f7;
    color:#00f5d4; font-family:inherit; font-size:12px; padding:0 14px; cursor:pointer; }
  #gemini-send:hover { color:#fff; background:#1a0f2e; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 1023px) {
    body { padding: 10px; }
    #game-wrapper, #global-back-btn {
      width: clamp(320px, 95vw, 960px);
    }
    #game-wrapper {
      height: clamp(420px, 60vw, 640px);
    }
    .modal-content { width: 90%; max-width: 560px; }
    #gemini-panel { width: 80%; right: 10%; }
  }
  @media (max-width: 599px) {
    body { overflow: auto; }
    #game-wrapper {
      width: 100vw;
      height: auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .screen { position: relative; min-height: 100vh; }
    .screen.active { padding: 20px 10px; }
    .plain-btn, button { min-height: 44px; min-width: 44px; }
    .term-text { font-size: clamp(12px, 3.5vw, 16px); }
    #screen-titlecard .title-text { font-size: clamp(32px, 9vw, 64px); letter-spacing: 4px; }
    .modal-content { width: 92%; padding: 18px; }
    #gemini-panel { width: 96%; right: 2%; bottom: 2%; max-height: 70%; }
  }
</style>

<script>
// Room slide adjacency maps (FIX 2)
window.__ROOM_ADJ = {
  void: {
    // planetarium <-> labyrinth: left
    planetarium: { labyrinth: 'left', station: 'up', void: 'left' },
    labyrinth:   { planetarium: 'right', station: 'up', void: 'left' },
    void:        { labyrinth: 'right', planetarium: 'right', station: 'up' },
    station:     { planetarium: 'down', labyrinth: 'down', void: 'down' }
  },
  atlantic: {
    hallway: { sauna: 'left', kitchen: 'left', dining: 'left' },
    sauna:   { hallway: 'right', kitchen: 'right', dining: 'right' },
    kitchen: { sauna: 'left', hallway: 'right', dining: 'left' },
    dining:  { kitchen: 'right', sauna: 'right', hallway: 'right' }
  },
  hope: {
    prison:  { lab: 'left', library: 'left', train: 'left' },
    lab:     { prison: 'right', library: 'left', train: 'left' },
    library: { lab: 'right', prison: 'right', train: 'left' },
    train:   { library: 'right', lab: 'right', prison: 'right' }
  },
  starry: {
    the_stage:       { backstage_right: 'right', backstage_left: 'left', bridge: 'up' },
    backstage_right: { the_stage: 'left', bridge: 'up', backstage_left: 'left' },
    backstage_left:  { the_stage: 'right', bridge: 'up', backstage_right: 'right' },
    bridge:          { the_stage: 'down', backstage_right: 'down', backstage_left: 'down' }
  }
};
window.getRoomSlideDirection = function(caseId, from, to) {
  try {
    const m = window.__ROOM_ADJ[caseId];
    if (m && m[from] && m[from][to]) return m[from][to];
  } catch(e){}
  return 'left';
};
</script>

<script>
// --- MOCK DB ---
const mockDB = {
  users: [
    { username: "admin",  password: "123", points: 9999, role: "admin"  },
    { username: "player", password: "456", points: 350,  role: "player" }
  ]
};

const EVIDENCE_DESCRIPTIONS = {"void":{"STABBING VICTIM":"Multiple thin, deep stab wounds on both back and front. Stuffed into a space suit after death. A lot of blood beneath the suit.","WET SPACE SUIT":"The suit the victim was found in is wet on the outside, indicating recent use.","MISSING SUIT STAND":"One display stand is empty. A suit is gone.","KNOCKOUT GAS INFO":"Only sold in packages of three. Always three.","OBJECT TRAIL":"Random small objects placed in a deliberate path from the entrance to a specific floor panel circled by objects.","ONE-WAY PANEL":"The circled panel is a one-way mirror with a knife-sized hole drilled through it. Heavy blood on top.","FRAMING PHONE":"A new phone with no owner in the group. Fresh number. Full of texts used to orchestrate the killings. Left deliberately.","KNOCKOUT GAS BOTTLE":"Used and shattered. One of three from the only pack sold.","THE OPERATOR'S ACCOUNT":"Held captive in the basement. Forced under knife to reveal the layout of the Void gate and the labyrinth.","THE COURIER'S ACCOUNT":"Witnessed the stabbing but saw nothing sharp. Panicked and fled.","THE DRIFTER'S ACCOUNT":"Texted to the labyrinth at midnight, then pushed into the lower maze and framed with the phone.","BROADCAST RECORDING":"Pre-recorded video of a cloaked, masked figure with a modified voice, directing the group to search specific locations. Made to appear live.","ANONYMOUS LETTER":"Sent to the hosts earlier, instructing them to film in the plaza and leave the studio free. No name.","THE OBSERVER'S ACCOUNT":"Approached in disguise and asked for help. Refused to participate, but disclosed the location of a captive before going silent.","SAWN VICTIM":"Bound to a mirror panel by ropes near the gate. The metal saw fell directly on him when the gates opened, killing him from severe blood loss.","RIGGED SAW":"Battery-powered, no outlet required. Set to fall when the gate opened.","VOID PANEL":"The same type of one-way mirror panel as in the labyrinth.","FLASH DRIVE":"Left plugged into the broadcasting desk. Contains the recorded video file used in the broadcast."},"atlantic":{"VICTIM AUTOPSY":"Found dead in the pool, three stab wounds in the abdomen, bled into the water.","PHOTOGRAPHER STATE":"Knocked out, lying on his back. A knife stabbed through his right hand. A visible shoe print bruised into his face.","BLOODY DRAG MARKS":"A blood trail from the floor beside the pool leading to the pool edge.","THE KNIFE":"Stabbed into The Photographer's right hand.","POOL COVER":"Activated, covering the pool and the body beneath it.","BROKEN WHEELCHAIR":"Thrown into a corner, broken, lying over The Assistant.","SAUNA CAMERA":"One of the cameras found under the wheelchair. Still functional. Shows Suspect entering at 2:45 PM.","INTERVAL TIMER":"Takes a photo every 20 minutes automatically.","HALLWAY PHOTOS":"2:40 PM - The Victim closing her cabin door.","LAUNDRY LOGS":"The train laundry service disposes of clothes entirely rather than washing them. The Suspect was the last person to use the service.","KITCHEN CAMERA":"Facing a wall. Repositioned to avoid capturing the killer.","KNIFE CABINET":"Unlocked. The nylon camera straps that had been looped around the handles to keep it closed are now cut on the floor, cut in a rough, messy way.","CUT STRAPS":"Nylon straps from the cameras cut in a messy way.","HOOF KNIFE":"A sharp hoof knife discarded in the trash bin. Not a standard kitchen item.","SUSPECT'S ACCOUNT":"Claimed she only passed by the sauna later and fought in self defense.","PHOTOGRAPHER ACCOUNT":"Stumbled onto the murder, pushed out of wheelchair, stabbed in hand and face stomped."},"hope":{"AUTOPSY REPORT":"Burned alive inside the prison cell. Cause of death: potassium chlorate ignition from the tipped bucket.","GUMMY BEAR PACKETS":"Multiple empty packets discarded in front of the gate. Suggests someone spent time waiting there.","SUSPENDED BUCKET":"An empty bucket found inside the cell, suspended with rope above the burned remains. This held the incendiary solution.","EMPTY BUCKET":"An empty bucket found outside the cell by the gate.","BOARDED VENTS":"The vents are nailed shut with wooden planks, sealing the room. Done before the murder.","LAB NOTE":"Written instructions for synthesizing potassium chlorate from calcium hypochlorite, potassium chloride, water, heat, and filtration.","CALCIUM HYPOCHLORITE":"Empty calcium hypochlorite bucket. The supply was fully used.","SALT FREE BOTTLE":"Potassium chloride (KCl). Used in the synthesis.","BLOW TORCH":"Present on the chemistry lab table.","CHEM 4 MORONS":"Two large volumes on chemistry by a Dr. Howard Light. Too large to read fully before the trial.","HOW 2 MATHS":"Two large volumes on mathematics by the same author.","THE ROPE":"Two rope sets. The second runs from the cell all the way to the train room. Total assembled length: 58 metres.","TRAIN PATH":"The train runs on a circular track with a radius of 17 metres. It only moves when someone is inside it.","KNOCKOUT GAS":"A used and shattered knockout gas bottle. Victim was incapacitated before mechanism was setup.","THE CHEMIST'S LOG":"Fascinating setup. Synthesizing KClO3 is basic high school chemistry.","THE GUARD'S ACCOUNT":"Smelled something sweet before the fire. Like burning sugar.","THE DRIVER'S ALIBI":"This beauty only moves when someone is at the controls."},"starry":{"THE BLOODY NOTE":"A non-prop note reading 'You'll pay for betraying me.' Has a bullet hole through it.","STARRY NIGHT HOLE":"The bullet continued through The Lead's chest, through the hanging Starry Night replica, and into the set wall behind it.","FAKE BLOOD":"A satchel of fake blood hidden inside his costume to simulate being shot. Never triggered.","THE SET DOOR":"The door through which The Shooter was to have exited after the final scene.","DISCARDED SWITCH":"The remote switch that should have detonated The Lead's fake blood satchel. Discarded in a rubbish bin.","REPLICA GUN CASE":"Contains one replica gun. The case has space for two. The second gun is missing.","THE REVOLVER":"The weapon that killed The Lead. Five unused bullets remaining.","THE OIL TRAIL":"A smear of dark oil along the back wall, connects backstage left to backstage right.","LIGHTING CUES":"Lighting console controls all stage lights. The bridge oversees the entire set.","SCRIPT NOTES":"The director's annotated script. No mention of any betrayal note.","STAGE POSITIONS":"Shows exactly where each actor stood. The killer knew his exact mark.","THE UNDERSTUDY'S ACCOUNT":"Walked into the scene right on cue. Gunshot was deafening.","THE MANAGER'S ACCOUNT":"Was running the console when the shot rang out.","THE GUNMAN'S ACCOUNT":"Fired the prop gun, put it back in the case. Got oil on hands.","THE STAGEHAND'S ACCOUNT":"Struck from behind in the dark wings, woke up holding the real gun."}};
const CASE_SYNOPSES = {"void":"On the night of the broadcast, four people are killed across several locations in the underground facility. The investigation begins after a pre-recorded broadcast instructs the group to search specific areas. A fifth victim dies as a rigged saw falls.","atlantic":"On the day of the deadline, a murder takes place in the spa and sauna car of a moving train. The victim is found dead in the pool, having been stabbed three times in the abdomen.","hope":"The Chef is found burned alive inside a prison cell. An empty bucket suspended above her body by rope was used to deliver an incendiary chemical solution onto her, triggered by a moving train.","starry":"During a live performance, The Lead is shot through the chest with a single bullet at close range. A non-prop note reading 'You'll pay for betraying me' is found near the body."};

function mockLogin(u, p) {
  return new Promise(res => {
    const user = mockDB.users.find(x => x.username === u && x.password === p);
    if (user) res({ success: true, user: { username: user.username, role: user.role, token: "mock-token-" + user.username } });
    else res({ success: false, msg: 'AUTH FAILED. INVALID CREDENTIALS.' });
  });
}

function mockSignup(u, p) {
  return new Promise(res => {
    if (mockDB.users.find(x => x.username === u)) res({ success: false, msg: 'REGISTRATION FAILED. USERNAME ALREADY TAKEN.' });
    else {
      const nu = { username: u, password: p, points: 0, role: "player" };
      mockDB.users.push(nu);
      res({ success: true, user: { username: nu.username, role: nu.role, token: "mock-token-" + nu.username } });
    }
  });
}

function mockGetLeaderboard() {
  return new Promise(res => {
    const sorted = [...mockDB.users].sort((a,b) => b.points - a.points);
    res(sorted);
  });
}

function mockAwardPoints(caseId) {
  return new Promise(res => {
    const pointsMap = { void: 100, atlantic: 200, hope: 300, starry: 400 };
    const pts = pointsMap[caseId];
    const uname = localStorage.getItem('username');
    if (uname) {
      const u = mockDB.users.find(x => x.username === uname);
      if (u) u.points += pts;
    }
    res();
  });
}

// ----- Gemini AI hint integration -----
const GEMINI_API_KEY = "YOUR_KEY_HERE"; // paste your Gemini API key here

async function mockFetchHint(req) {
  if (!GEMINI_API_KEY || GEMINI_API_KEY === "YOUR_KEY_HERE") {
    return { hint: "SIGNAL OFFLINE. (No API key configured.)" };
  }
  try {
    const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + GEMINI_API_KEY;
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ role: "user", parts: [{ text: req.systemPrompt + "\n\nPlayer asks: " + (req.userMsg || "Give me a nudge.") }] }],
        generationConfig: { temperature: 0.85, maxOutputTokens: 220 }
      })
    });
    if (!r.ok) throw new Error("http " + r.status);
    const data = await r.json();
    const txt = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
    return { hint: txt || "SIGNAL LOST. TRY AGAIN." };
  } catch (e) {
    console.warn("Gemini error", e);
    return { hint: "SIGNAL LOST. TRY AGAIN." };
  }
}

// ----- Per-case persistent chat history (in-memory only) -----
const geminiHistory = { void: [], atlantic: [], hope: [], starry: [] };
let geminiCurrentCase = null;

function buildGeminiSystemPrompt(caseId) {
  const ev = EVIDENCE_DESCRIPTIONS[caseId] || {};
  const evList = Object.keys(ev).map(k => `- ${k}: ${ev[k]}`).join("\n");
  const collected = (window._currentInventory && window._currentInventory[caseId]) || [];
  return `You are a noir-styled in-world informant in a detective game.
Case: ${caseId.toUpperCase()}.
Synopsis: ${CASE_SYNOPSES[caseId]}
All known evidence:
${evList}
The player has currently collected: ${collected.length ? collected.join(", ") : "nothing yet"}.
Rules:
- NEVER name the killer or directly reveal the solution.
- Speak in 2-4 short, cryptic, atmospheric sentences. Terse. Noir.
- Reference items the player already has when possible.`;
}

function openGeminiPanel(caseId) {
  geminiCurrentCase = caseId;
  const panel = document.getElementById('gemini-panel');
  panel.classList.add('open');
  renderGeminiHistory();
}
function closeGeminiPanel() {
  document.getElementById('gemini-panel').classList.remove('open');
}
function renderGeminiHistory() {
  const h = document.getElementById('gemini-history');
  if (!geminiCurrentCase) { h.innerHTML = ''; return; }
  const hist = geminiHistory[geminiCurrentCase] || [];
  h.innerHTML = hist.map(m => m.role === 'user'
    ? `<div class="msg-u">> ${escapeHtml(m.text)}</div>`
    : `<div class="msg-a">${escapeHtml(m.text)}</div>`).join('');
  h.scrollTop = h.scrollHeight;
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function sendGeminiMessage() {
  if (!geminiCurrentCase) return;
  const inp = document.getElementById('gemini-input');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  geminiHistory[geminiCurrentCase].push({ role:'user', text: txt });
  geminiHistory[geminiCurrentCase].push({ role:'assistant', text: '...' });
  renderGeminiHistory();
  const sysPrompt = buildGeminiSystemPrompt(geminiCurrentCase);
  const res = await mockFetchHint({ caseId: geminiCurrentCase, systemPrompt: sysPrompt, userMsg: txt });
  geminiHistory[geminiCurrentCase].pop();
  geminiHistory[geminiCurrentCase].push({ role:'assistant', text: res.hint });
  renderGeminiHistory();
}

// expose for Phaser scenes

window.closeGeminiPanel = closeGeminiPanel;

  if (sendBtn) sendBtn.onclick = sendGeminiMessage;

});

// ============================================================
// PER-ROOM PHASER DETAILS — derived from case markdowns
// All shapes added to scene.bgLayer (depth 0), behind hotspots.
// ============================================================
window.__drawRoomDetails = function(scene, caseId, room) {
  // ATMOSPHERE PASS: tone everything down globally — every fill/stroke/glow
  // gets its alpha dampened and color darkened so backgrounds read as mood,
  // not diagrams. Helpers also drop a sequence of vignettes/shadows so each
  // room has a clear near/middle/far depth read.
  const _dampA = (a) => Math.min(1, (a==null?1:a) * 0.62);
  const _dark  = (c) => {
    const r = Math.floor(((c >> 16) & 0xff) * 0.78);
    const g = Math.floor(((c >>  8) & 0xff) * 0.78);
    const b = Math.floor(( c        & 0xff) * 0.78);
    return (r << 16) | (g << 8) | b;
  };
  const G = () => { const g = scene.add.graphics(); scene.bgLayer.add(g); return g; };
  const R = (x,y,w,h,color,alpha) => { const r = scene.add.rectangle(x,y,w,h,_dark(color),_dampA(alpha)).setOrigin(0,0); scene.bgLayer.add(r); return r; };
  const CIR = (x,y,r,color,alpha) => { const c = scene.add.circle(x,y,r,_dark(color),_dampA(alpha)); scene.bgLayer.add(c); return c; };
  const LINE = (x1,y1,x2,y2,color,alpha,w) => { const g=G(); g.lineStyle(w||1,_dark(color),_dampA(alpha==null?0.6:alpha)); g.beginPath(); g.moveTo(x1,y1); g.lineTo(x2,y2); g.strokePath(); return g; };
  const TRI = (x,y,a,b,c,d,e,f,color,alpha) => { const t = scene.add.triangle(x,y,a,b,c,d,e,f,_dark(color),_dampA(alpha)); scene.bgLayer.add(t); return t; };
  const STROKE_RECT = (x,y,w,h,color,alpha,sw) => { const r = scene.add.rectangle(x,y,w,h,0x000000,0.00).setStrokeStyle(sw||1,_dark(color),_dampA(alpha==null?0.7:alpha)).setOrigin(0,0); scene.bgLayer.add(r); return r; };
  const STROKE_CIR = (x,y,r,color,alpha,sw) => { const c = scene.add.circle(x,y,r,0x000000,0.00).setStrokeStyle(sw||1,_dark(color),_dampA(alpha==null?0.7:alpha)); scene.bgLayer.add(c); return c; };
  // soft radial glow — softened so lit areas have one clear source
  const GLOW = (x,y,r,color,alpha) => { for (let i=4;i>=1;i--) CIR(x,y,r*i/4,color,(alpha||0.12)*(0.4+i*0.15)*0.7); };

  // Per-room atmospheric base: dark wash + far-wall darken + side/top/bottom
  // vignettes + soft floor shadow band. Drawn FIRST so per-room content sits
  // on top of it, giving every room a near/middle/far depth read.
  scene.bgLayer.add(scene.add.rectangle(0,0,960,640,0x000000,0.22).setOrigin(0,0));
  scene.bgLayer.add(scene.add.rectangle(0,0,960,260,0x000000,0.22).setOrigin(0,0));   // far-wall darken
  scene.bgLayer.add(scene.add.rectangle(0,0,960,90,0x000000,0.30).setOrigin(0,0));    // top vignette
  scene.bgLayer.add(scene.add.rectangle(0,560,960,80,0x000000,0.28).setOrigin(0,0));  // bottom vignette
  scene.bgLayer.add(scene.add.rectangle(0,0,80,640,0x000000,0.24).setOrigin(0,0));    // left vignette
  scene.bgLayer.add(scene.add.rectangle(880,0,80,640,0x000000,0.24).setOrigin(0,0));  // right vignette
  scene.bgLayer.add(scene.add.rectangle(0,545,960,8,0x000000,0.30).setOrigin(0,0));   // floor shadow band


  // -------- inline mini-helpers (compose multi-shape "real" objects) --------
  const ELL = (x,y,w,h,color,alpha) => { const e = scene.add.ellipse(x,y,w,h,_dark(color),_dampA(alpha)); scene.bgLayer.add(e); return e; };
  const STROKE_ELL = (x,y,w,h,color,alpha,sw) => { const e = scene.add.ellipse(x,y,w,h,0x000000,0.00).setStrokeStyle(sw||1,_dark(color),_dampA(alpha==null?0.7:alpha)); scene.bgLayer.add(e); return e; };
  // floor shadow under an object footprint
  const FSHADOW = (x,y,w,h) => ELL(x, y, w, h, 0x000000, 0.55);
  // soft light cast cone (downward triangle with low alpha)
  const LIGHTCONE = (x,y,topW,botW,h,color,alpha) => { const t = scene.add.triangle(x,y, -topW/2,0, topW/2,0, botW/2,h, _dark(color), _dampA(alpha||0.18)); scene.bgLayer.add(t); const t2=scene.add.triangle(x,y, -topW/2,0, topW/2,0, -botW/2,h, _dark(color),_dampA(alpha||0.18)); scene.bgLayer.add(t2); return t; };
  // door = frame + recessed panel + bottom gap line + handle + keyhole
  const DOOR = (x,y,w,h,frameC,panelC,handleC) => {
    R(x,y,w,h,frameC,0.95);
    R(x+w*0.10,y+h*0.06,w*0.80,h*0.78,panelC,0.95);
    LINE(x,y+h-1,x+w,y+h-1,0x000000,0.55,1);
    R(x+w-w*0.18,y+h*0.46,w*0.10,h*0.06,handleC,1.0);
    CIR(x+w-w*0.13,y+h*0.49,1.5,0x000000,0.9);
  };
  // bottle = body + neck + cap + label
  const BOTTLE = (x,y,bw,bh,bodyC,labelC) => {
    R(x,y+bh*0.20,bw,bh*0.80,bodyC,0.95);
    R(x+bw*0.30,y+bh*0.06,bw*0.40,bh*0.18,bodyC,0.95);
    R(x+bw*0.28,y,bw*0.44,bh*0.07,0x222233,1.0);
    R(x+bw*0.06,y+bh*0.45,bw*0.88,bh*0.22,labelC,0.85);
  };
  // desk = top + front face + legs + floor shadow
  const DESK = (x,y,w,h,topC,frontC) => {
    FSHADOW(x+w/2, y+h+6, w*1.05, 10);
    R(x,y,w,h*0.18,topC,0.98);
    R(x,y+h*0.18,w,h*0.62,frontC,0.95);
    R(x+4,y+h*0.80,w*0.06,h*0.20,frontC,1.0);
    R(x+w-w*0.06-4,y+h*0.80,w*0.06,h*0.20,frontC,1.0);
  };
  // ceiling bulb pendant: cord + housing + bulb + cone + floor pool
  const PENDANT = (x,ceilY,floorY,bulbC) => {
    LINE(x,ceilY,x,ceilY+24,0x222222,0.9,1);
    R(x-5,ceilY+22,10,6,0x111111,1.0);
    const b = CIR(x,ceilY+34,7,bulbC,0.95);
    GLOW(x,ceilY+34,28,bulbC,0.18);
    LIGHTCONE(x,ceilY+38, 14, 120, floorY-(ceilY+38), bulbC, 0.10);
    ELL(x,floorY,140,22,bulbC,0.10);
    return b;
  };
  // brick/mortar wall pattern within a region
  const BRICKWALL = (x,y,w,h,color,mortarC) => {
    R(x,y,w,h,color,1.0);
    const rows = Math.floor(h/22);
    for (let r=0;r<=rows;r++){
      LINE(x,y+r*22,x+w,y+r*22,mortarC,0.6,1);
      const off = (r%2===0)?0:30;
      for (let c=0; c<Math.ceil(w/60)+1; c++){
        const xv = x+off+c*60;
        if (xv>x && xv<x+w) LINE(xv,y+r*22,xv,y+(r+1)*22,mortarC,0.6,1);
      }
    }
  };
  // wood plank floor lines
  const WOODFLOOR = (x,y,w,h,baseC,lineC) => {
    R(x,y,w,h,baseC,1.0);
    for (let i=1;i*40<w;i++) LINE(x+i*40,y,x+i*40,y+h,lineC,0.45,1);
    for (let j=0;j<3;j++) LINE(x,y+(j+1)*h/4,x+w,y+(j+1)*h/4,lineC,0.30,1);
  };
  // tile floor grid
  const TILEFLOOR = (x,y,w,h,baseC,lineC,size) => {
    R(x,y,w,h,baseC,1.0); size = size||40;
    for (let i=0;i*size<=w;i++) LINE(x+i*size,y,x+i*size,y+h,lineC,0.35,1);
    for (let j=0;j*size<=h;j++) LINE(x,y+j*size,x+w,y+j*size,lineC,0.35,1);
  };
  // helper: register tween cleanly
  const TW = (target, props, dur) => scene.tweens.add(Object.assign({ targets: target, duration: dur||3000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' }, props));


  // === room-scope perspective + lighting mini-helpers ===
  const PFLOOR = (y0, baseC, lineC, vpx) => {
    vpx = (vpx==null)?480:vpx;
    R(0,y0,960,640-y0,baseC,1.0);
    for (let i=0;i<=12;i++){ LINE(i*80,640,vpx,y0,lineC,0.30,1); }
    const span = 640 - y0;
    for (let i=1;i<=5;i++){ const t=(i/5)*(i/5); LINE(0,y0+span*t,960,y0+span*t,lineC,0.24,1); }
  };
  const CEILING_LINES = (vpx, vpy, color, alpha) => {
    color = color||0xffffff; alpha = alpha||0.14;
    LINE(0,0,vpx,vpy,color,alpha,1);
    LINE(960,0,vpx,vpy,color,alpha,1);
    LINE(0,40,vpx,vpy,color,alpha*0.7,1);
    LINE(960,40,vpx,vpy,color,alpha*0.7,1);
  };
  const JUNCTION = (y, color, alpha) => LINE(0,y,960,y,color||0x000000,alpha==null?0.55:alpha,2);
  const CORNERS_DARK = () => {
    TRI(0,0,     0,0,  240,0,   0,220, 0x000000, 0.50);
    TRI(960,0,   0,0, -240,0,   0,220, 0x000000, 0.50);
    TRI(0,640,   0,0,  200,0,   0,-180,0x000000, 0.40);
    TRI(960,640, 0,0, -200,0,   0,-180,0x000000, 0.40);
  };
  // pseudo-3D box: top + front + side faces + floor shadow
  const BOX = (x,y,w,h,d, frontC, topC, sideC) => {
    FSHADOW(x+w/2, y+h+5, w*1.05, 8);
    R(x+d, y-d, w, d+1, topC, 0.95);
    R(x+w, y-d, d, h+d, sideC, 0.92);
    R(x, y, w, h, frontC, 0.96);
  };
  // long top-edge highlight (lit upper face)
  const LIT_TOP = (x,y,w, color, alpha) => R(x,y,w,2,color,alpha==null?0.35:alpha);
  // floor pool of light (low-alpha ellipse)
  const POOL = (x,y,rx,ry,color,alpha) => ELL(x,y,rx*2,ry*2,color,alpha==null?0.10:alpha);
  // rim highlight along a vertical edge
  const RIM_V = (x,y,h,color,alpha) => R(x,y,2,h,color,alpha==null?0.45:alpha);
  // wall shadow rectangle behind wall-mounted object
  const WSHADOW = (x,y,w,h) => R(x,y,w,h,0x000000,0.35);

  if (caseId === 'void') {
    if (room === 'planetarium') {
      // ---- PLANETARIUM ----  light: overhead dome, soft from top center
      R(0,0,960,640,0x0e0820,1.0);
      // dome radial suggestion (bright at top center)
      GLOW(480,20,260,0x9966ff,0.18);
      CIR(480,40,180,0x6b3a99,0.10);
      // dome arcs
      const _planDome = G(); _planDome.lineStyle(2,0x9966ff,0.45);
      for (let i=0;i<7;i++){ _planDome.beginPath(); _planDome.arc(480,40,260+i*36,Math.PI*0.04,Math.PI*0.96); _planDome.strokePath(); }
      // starfield (smaller/dimmer toward edges)

// --- GLOBAL UI STATE ---
let currentScreen = null;
let currentCase = null;

// One-time migration: clear legacy unprefixed case progress flags so users
// don't see all cases pre-solved from prior sessions.
(function clearLegacyProgress(){
  ['case_void_done','case_atlantic_done','case_hope_done','case_starry_done',
   'awarded_void','awarded_atlantic','awarded_hope','awarded_starry']
    .forEach(k => localStorage.removeItem(k));
})();

function showScreen(id) {
  document.querySelectorAll('.screen, .game-container-div').forEach(el => el.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  currentScreen = id;
  updateTopNav();

  if (id === 'screen-selection') { refreshSelection(); animateSelection(); }
  else if (id === 'screen-login')      animateLogin();
  else if (id === 'screen-leaderboard') animateLeaderboard();
}

function updateTopNav() {
  const nav = document.getElementById('top-nav-bar');
  if (!nav) return;
  const left = document.getElementById('nav-left');
  const acct = document.getElementById('nav-account-btn');
  const adminBtn = document.getElementById('nav-admin-btn');
  const uname = localStorage.getItem('username');
  const role = localStorage.getItem('role');
  const inCase = currentScreen && currentScreen.startsWith('game-');
  // Left side: BACK TO CASES only inside a case, otherwise hidden (empty)
  if (inCase) {
    left.innerHTML = '<button class="plain-btn" onclick="returnToSelection()">[ BACK TO CASES ]</button>';
  } else {
    left.innerHTML = '';
  }
  // Account button never logs out directly
  if (uname) {
    acct.textContent = '[ ' + uname.toUpperCase() + ' ]';
  } else {
    acct.textContent = '[ LOGIN ]';
  }
  acct.setAttribute('onclick', "toggleAccountMenu(event)");
  // Admin button visibility
  if (adminBtn) adminBtn.style.display = (role === 'admin') ? '' : 'none';
  // Hide menu on nav refresh
  const menu = document.getElementById('nav-account-menu');
  if (menu) menu.style.display = 'none';
}

function toggleAccountMenu(ev) {
  if (ev && ev.stopPropagation) ev.stopPropagation();
  const uname = localStorage.getItem('username');
  if (!uname) { showScreen('screen-login'); return; }
  const menu = document.getElementById('nav-account-menu');
  if (!menu) return;
  menu.style.display = (menu.style.display === 'none' || !menu.style.display) ? 'block' : 'none';
}
window.toggleAccountMenu = toggleAccountMenu;

document.addEventListener('click', function(e){
  const wrap = document.getElementById('nav-account-wrap');
  const menu = document.getElementById('nav-account-menu');
  if (!wrap || !menu) return;
  if (!wrap.contains(e.target)) menu.style.display = 'none';
});

function showProfilePanel(ev) {
  if (ev && ev.stopPropagation) ev.stopPropagation();
  const menu = document.getElementById('nav-account-menu');
  if (menu) menu.style.display = 'none';
  const uname = localStorage.getItem('username') || 'GUEST';
  const role  = localStorage.getItem('role') || 'detective';
  let pts = 0;
  try {
    if (window.mockDB && window.mockDB.users) {
      const u = window.mockDB.users.find(x => x.username === uname);
      if (u && typeof u.points === 'number') pts = u.points;
    }
    if (!pts) pts = parseInt(localStorage.getItem('points') || '0', 10) || 0;
  } catch(e){}
  let panel = document.getElementById('profile-panel-overlay');
  if (panel) panel.remove();
  panel = document.createElement('div');
  panel.id = 'profile-panel-overlay';
  panel.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(13,5,20,0.85); display:flex; align-items:center; justify-content:center; z-index:100000; font-family:JetBrains Mono, monospace; color:#f0e6f5;';
  panel.innerHTML = '<div style="background:#0d0514; border:2px solid #4fc3f7; padding:24px 32px; min-width:320px;">'
    + '<div style="color:#4fc3f7; margin-bottom:14px;">// PROFILE</div>'
    + '<div style="margin:6px 0;">USERNAME: ' + uname.toUpperCase() + '</div>'
    + '<div style="margin:6px 0;">ROLE:     ' + String(role).toUpperCase() + '</div>'
    + '<div style="margin:6px 0;">POINTS:   ' + pts + '</div>'
    + '<div style="margin-top:18px; cursor:pointer; color:#00f5d4;" onclick="document.getElementById(\'profile-panel-overlay\').remove()">[ CLOSE ]</div>'
    + '</div>';
  panel.addEventListener('click', function(e){ if (e.target === panel) panel.remove(); });
  document.body.appendChild(panel);
}
window.showProfilePanel = showProfilePanel;

function doLogout(ev) {
  if (ev && ev.stopPropagation) ev.stopPropagation();
  const menu = document.getElementById('nav-account-menu');
  if (menu) menu.style.display = 'none';
  localStorage.removeItem('username');
  localStorage.removeItem('role');
  localStorage.removeItem('token');
  updateTopNav();
  showTitleCard();
}
window.doLogout = doLogout;

// ---- GSAP shell animations ----
function animateSelection() {
  if (!window.gsap) return;
  const header = document.querySelector('#screen-selection .term-text');
  const buttons = document.querySelectorAll('#screen-selection button.plain-btn[id^="btn-case"]');
  const footer = document.querySelectorAll('#screen-selection > div:last-child button');
  gsap.from(header, { y: -30, opacity: 0, duration: 0.6, ease: "power2.out" });
  gsap.from(buttons, { x: -60, opacity: 0, stagger: 0.12, duration: 0.5, ease: "power2.out" });
  gsap.from(footer, { opacity: 0, duration: 0.4, delay: 0.6 });
}
function animateLogin() {
  if (!window.gsap) return;
  gsap.from('#screen-login > *', { y: 20, opacity: 0, stagger: 0.08, duration: 0.4, ease: "power2.out" });
}
function animateLeaderboard() {
  if (!window.gsap) return;
  gsap.from('#screen-leaderboard > *', { x: 30, opacity: 0, stagger: 0.06, duration: 0.35, ease: "power2.out" });
}

// --- PROLOGUE ---
const prologueLines = [
  "They say the dead can't speak.",
  "They're wrong.",
  "Every crime scene is a sentence waiting to be read.",
  "I've been reading them for years.",
  "Four cases. Four rooms full of lies.",
  "Someone always thinks they got away with it.",
  "They never do.",
  "Not on my watch.",
  "The truth doesn't hide. It just waits for someone patient enough to find it.",
  "Let's get to work."
];
let prologueIdx = 0;
let prologueBusy = false;

function advancePrologue() {
  if (prologueBusy) return;
  prologueBusy = true;
  const container = document.getElementById('prologue-text-container');
  const btn = document.getElementById('prologue-continue');
  const finalize = () => {
    if (prologueIdx >= prologueLines.length) {
      sessionStorage.setItem('prologueSeen', 'true');
      showTitleCard();
      return;
    }
    container.innerText = "> " + prologueLines[prologueIdx];
    if (prologueIdx === prologueLines.length - 1) btn.innerText = "[ BEGIN ]";
    prologueIdx++;
    if (window.gsap) {
      gsap.to(container, { opacity: 1, duration: 0.15, onComplete: () => { prologueBusy = false; } });
    } else {
      container.style.opacity = 1; prologueBusy = false;
    }
  };
  if (window.gsap) {
    gsap.to(container, { opacity: 0, duration: 0.15, onComplete: finalize });
  } else {
    finalize();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// --- AUTH & SELECTION ---
function refreshSelection() {
  const uname = localStorage.getItem('username');
  const role = localStorage.getItem('role');
  const st = document.getElementById('auth-status');
  if (uname) st.innerText = "LOGGED IN AS: " + uname + (role === 'admin' ? " [ADMIN]" : "");
  else st.innerText = "NO USER LOGGED IN";

  const pfx = 'case_' + (uname || 'guest') + '_';
  const c1 = localStorage.getItem(pfx + 'void_done') === 'true';
  const c2 = localStorage.getItem(pfx + 'atlantic_done') === 'true';
  const c3 = localStorage.getItem(pfx + 'hope_done') === 'true';
  const c4 = localStorage.getItem(pfx + 'starry_done') === 'true';

  const btnV = document.getElementById('btn-case-void');
  const btnA = document.getElementById('btn-case-atlantic');
  const btnH = document.getElementById('btn-case-hope');
  const btnS = document.getElementById('btn-case-starry');

  // Case 1 always unlocked, never shows [LOCKED] or [CLOSED]
  btnV.innerText = c1 ? "[SOLVED] THE VOID CASE" : "THE VOID CASE";
  btnV.disabled = false;
  btnV.style.borderColor = "#4fc3f7";

  btnA.disabled = !c1;
  btnA.innerText = !c1 ? "[LOCKED] THE ATLANTIC WOLFFISH CASE" : (c2 ? "[SOLVED] THE ATLANTIC WOLFFISH CASE" : "THE ATLANTIC WOLFFISH CASE");
  btnA.style.borderColor = !c1 ? "#555" : "#4fc3f7";

  btnH.disabled = !c2;
  btnH.innerText = !c2 ? "[LOCKED] THE H.O.P.E. CASE" : (c3 ? "[SOLVED] THE H.O.P.E. CASE" : "THE H.O.P.E. CASE");

  let acc = '';
  Object.keys(caseNames).forEach(cid => {
    const a = sessionStats.accusations[cid] || {};
    const items = Object.keys(a);
    if (!items.length) acc += '  ' + caseNames[cid] + ' \u2014 (no accusations)\n';
    else items.forEach(s => { acc += '  ' + caseNames[cid] + ' \u2014 ' + s + ': ' + a[s] + ' times\n'; });
  });
  let leastVisited = '  (no rooms visited yet)';
  let minN = Infinity, minRoom = null, minCase = null;
  Object.keys(sessionStats.roomVisits).forEach(cid => {
    const r = sessionStats.roomVisits[cid] || {};
    Object.keys(r).forEach(room => {
      if (r[room] < minN) { minN = r[room]; minRoom = room; minCase = cid; }
    });
  });
  if (minRoom) leastVisited = '  ' + caseNames[minCase] + ' \u2014 ' + minRoom + ' (' + minN + ' visits)';
  el.innerHTML = '<pre style="font-family:JetBrains Mono, monospace; color:#f0e6f5; white-space:pre-wrap; line-height:1.7;">'
    + 'TOTAL REGISTERED USERS: ' + totalUsers + '\n'
    + 'CASES COMPLETED THIS SESSION: ' + sessionStats.casesCompleted + '\n\n'
    + 'ACCUSATION BREAKDOWN:\n' + acc + '\n'
    + 'CORRECT ENDINGS: ' + sessionStats.correct + '\n'

    + 'LEAST VISITED ROOM THIS SESSION:\n' + leastVisited

}

// --- GAME LOGIC ---
const gamesInit = { void:false, atlantic:false, hope:false, starry:false };

function launchCase(id) {
  currentCase = id;
  window.currentCase = id;
  if (window.resetCaseSession) window.resetCaseSession(id);
  showScreen('game-' + id);
  if (!gamesInit[id]) {
    gamesInit[id] = true;
    if (id === 'void') initVoid();
    else if (id === 'atlantic') initAtlantic();
    else if (id === 'hope') initHope();
    else if (id === 'starry') initStarry();
  } else {
    // Replay: trigger restart logic in the game
    const g = (window.Phaser && Phaser.GAMES && Phaser.GAMES.find(x => x.config.parent === 'game-' + id));
    if (g) {
        const sc = g.scene.getScene('EndingScene') || g.scene.getScene('GameScene') || g.scene.getScene('BootScene');
        if (sc) {
            sc.registry.set('gameState', sc.registry.get('initialGameState') || sc.registry.get('gameState'));
            sc.scene.start('IntroScene');
        }
    }
  }
}

function returnToSelection() {
  currentCase = null;
  showScreen('screen-selection');
}

window._postCaseId = null;
window.showPostCaseMenu = function(id) {
  window._postCaseId = id;
  const names = { void:'THE VOID CASE', atlantic:'THE ATLANTIC WOLFFISH CASE', hope:'THE H.O.P.E. CASE', starry:'THE STARRY-EYED CASE' };
  document.getElementById('postcase-name').innerText = names[id] || '';
  document.getElementById('postcase-overlay').style.display = 'flex';
};
function postCaseReplay() {
  const id = window._postCaseId;
  document.getElementById('postcase-overlay').style.display = 'none';
  // Force a clean restart of the case
  gamesInit[id] = false;
  // Destroy any existing Phaser game for that case
  if (window.Phaser && Phaser.GAMES) {
    Phaser.GAMES.forEach(g => { if (g && g.config && g.config.parent === 'game-' + id) { try { g.destroy(true); } catch(e){} } });
  }
  const container = document.getElementById('game-' + id);
  if (container) container.innerHTML = '';
  launchCase(id);
}
function postCaseReturn() {
  document.getElementById('postcase-overlay').style.display = 'none';
  window._postCaseId = null;
  returnToSelection();
}


function completeCase(id) {
  const uname = localStorage.getItem('username') || 'guest';

}

You speak in a terse, noir detective tone — short sentences, atmospheric, slightly cryptic.

function drawCornerMarks(s, x, y, w, h, color, len) {
  len = len || 14;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawAllCornerMarks(s, x, y, w, h, color, len) {
  len = len || 16;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y); g.lineTo(x+w, y); g.lineTo(x+w, y+len); g.strokePath();
  g.beginPath(); g.moveTo(x, y+h-len); g.lineTo(x, y+h); g.lineTo(x+len, y+h); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawCanvasFrame(s) {
  const g = s.add.graphics();
  g.lineStyle(2, C.ACCENT, 1);
  g.strokeRect(1, 1, 958, 638);
  g.setDepth(9999);
  const len = 22;
  const cg = s.add.graphics();
  cg.lineStyle(3, C.ACCENT, 1);
  cg.beginPath(); cg.moveTo(0, len); cg.lineTo(0, 0); cg.lineTo(len, 0); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 0); cg.lineTo(960, 0); cg.lineTo(960, len); cg.strokePath();
  cg.beginPath(); cg.moveTo(0, 640-len); cg.lineTo(0, 640); cg.lineTo(len, 640); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 640); cg.lineTo(960, 640); cg.lineTo(960, 640-len); cg.strokePath();
  cg.setDepth(9999);
  return [g, cg];
}

function makeButton(s, x, y, w, h, label, opts) {
  opts = opts || {};
  const fontSize = opts.fontSize || 14;
  const cont = s.add.container(x, y);
  const bg = s.add.rectangle(0, 0, w, h, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
  const txt = s.add.text(w/2, h/2, label, {
    fontFamily: F.UI, fontSize: fontSize+'px', fontStyle:'600',
    color: C.ACCENT_S
  }).setOrigin(0.5);
  cont.add([bg, txt]);
  bg.setInteractive({ useHandCursor:true });
  bg.on('pointerover', () => { bg.setFillStyle(C.ACCENT, 1); txt.setColor(C.BG_DEEP_S); });
  bg.on('pointerout',  () => { bg.setFillStyle(C.BG_PANEL, 1); txt.setColor(C.ACCENT_S); });
  if (opts.onClick) bg.on('pointerdown', opts.onClick);
  cont.bg = bg; cont.txt = txt;
  return cont;
}

// =========================================================
// BOOTSCENE
// =========================================================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  create() {
    this.bakeBackgrounds();
    this.loadPortraits();
  }

  loadPortraits() {
    const keys = Object.keys(PORTRAITS);
    const toLoad = [];

    keys.forEach(key => {
      const data = PORTRAITS[key];
      if (!data) this.generateFallbackPortrait(key);
      else toLoad.push(key);
    });

    if (toLoad.length === 0) {
      this.scene.start('IntroScene');
      return;
    }

    let loaded = 0;
    toLoad.forEach(key => {
      this.textures.once('addtexture-' + key, () => {
        loaded++;
        if (loaded === toLoad.length) this.scene.start('IntroScene');
      });
      this.textures.addBase64(key, PORTRAITS[key]);
    });
  }

  generateFallbackPortrait(key) {
    const fallbackColors = {
      portrait_protagonist: { bg: 0x160a24, accent: C.ACCENT },
      portrait_scheduler:   { bg: 0x1f0d33, accent: 0x8c1aff },
      portrait_operator:    { bg: 0x170b26, accent: 0x9933ff },
      portrait_observer:    { bg: 0x12081f, accent: 0xa64dff },
      portrait_courier:     { bg: 0x1a0c2e, accent: 0xb366ff },
      portrait_drifter:     { bg: 0x140a24, accent: 0xbf80ff },
      portrait_mystery:     { bg: 0x1c0f2b, accent: 0xcc99ff }
    };
    const fc = fallbackColors[key] || { bg: 0x160a24, accent: C.ACCENT };
    const labelMap = {
      'portrait_the_director':  'THE DIRECTOR',
      'portrait_the_gunman':    'THE GUNMAN',
      'portrait_the_understudy':'THE UNDERSTUDY',
      'portrait_the_manager':   'THE MANAGER',
      'portrait_the_stagehand': 'THE STAGEHAND',
      'portrait_protagonist':   '',
      'portrait_mystery':       '???'
    };
    const name = labelMap[key] !== undefined ? labelMap[key] : key.replace('portrait_', '').replace(/_/g, ' ').toUpperCase();
    const W = 160, H = 200;

    const rt = this.add.renderTexture(0, 0, W, H).setVisible(false);
    rt.fill(fc.bg);

    const g = this.add.graphics();
    g.lineStyle(2, fc.accent, 1);
    g.strokeRect(2, 2, W - 4, H - 4);
    if (key === 'portrait_protagonist') {
      g.fillStyle(0x0a030f, 1);
      g.fillEllipse(W / 2, 70, 60, 68);
      g.lineStyle(2, C.ACCENT, 0.6);
      g.strokeEllipse(W / 2, 70, 60, 68);
      g.fillStyle(0x0a030f, 1);
      g.beginPath();
      g.moveTo(20, H); g.lineTo(42, 120); g.lineTo(W - 42, 120); g.lineTo(W - 20, H);
      g.closePath(); g.fillPath();
      g.lineStyle(2, C.ACCENT, 0.6); g.strokePath();
      g.fillStyle(C.ACCENT, 0.6);
      g.fillCircle(64, 70, 2); g.fillCircle(96, 70, 2);
    } else {
      g.fillStyle(fc.accent, 0.2);
      g.fillCircle(W / 2, 60, 28);
      g.beginPath();
      g.moveTo(35, H); g.lineTo(50, 110); g.lineTo(W - 50, 110); g.lineTo(W - 35, H);
      g.closePath(); g.fillPath();
    }
    rt.draw(g);
    g.destroy();

    if (name) {
      if (name) {
      const txt = this.add.text(W / 2, H - 24, name, {
        fontFamily: F.UI, fontSize: '14px', fontStyle: '700',
        color: '#' + fc.accent.toString(16).padStart(6, '0'), letterSpacing: 2
      }).setOrigin(0.5);
      rt.draw(txt);
      txt.destroy();
    }
    }

    rt.saveTexture(key);
    rt.destroy();
  }

  mg() { return this.make.graphics({ add:false }); }

  bakeBackgrounds() {
    this.bakePlanetarium();
    this.bakeLabyrinth();
    this.bakeStation();
    this.bakeVoid();
  }

  // ---- PLANETARIUM LOUNGE
  bakePlanetarium() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Deep space background
    g.fillStyle(0x05020a, 1); g.fillRect(0, 0, W, H);
    
    // Stars
    g.fillStyle(0xe6ccff, 0.8);
    for(let i=0; i<150; i++) {
      g.fillCircle(Math.random()*W, Math.random()*H, Math.random()*1.5);
    }
    
    // Glowing lounge table
    g.fillStyle(0x1a0f2e, 1); g.fillEllipse(480, 500, 300, 100);
    g.lineStyle(2, C.ACCENT, 0.5); g.strokeEllipse(480, 500, 300, 100);
    g.fillStyle(0xb366ff, 0.1); g.fillEllipse(480, 500, 280, 80); // inner glow
    
    // Space suit stands
    // Stand with suit left
    g.fillStyle(0x261645, 1); g.fillRect(280, 480, 60, 20);
    g.lineStyle(2, C.MUTE, 1); g.beginPath(); g.moveTo(310, 480); g.lineTo(310, 250); g.strokePath();
    g.fillStyle(0x3d2b59, 1); g.fillEllipse(310, 320, 80, 160); // suit body
    // wet sheen on suit
    g.fillStyle(0x6fa8ff, 0.35); g.fillEllipse(310, 320, 60, 130);
    g.fillStyle(0x1a0f2e, 1); g.fillCircle(310, 220, 35); // helmet
    g.lineStyle(2, C.ACCENT, 0.8); g.strokeCircle(310, 220, 35);
    // Empty stand right
    g.fillStyle(0x261645, 1); g.fillRect(620, 480, 60, 20);
    g.lineStyle(2, C.MUTE, 1); g.beginPath(); g.moveTo(650, 480); g.lineTo(650, 250); g.strokePath();
    // empty bracket marker
    g.lineStyle(2, 0x801010, 0.8); g.strokeCircle(650, 260, 18);

    g.generateTexture('bg_planetarium', W, H);
    g.destroy();
  }

  // ---- MIRROR LABYRINTH
  bakeLabyrinth() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Base floor
    g.fillStyle(0x0d0514, 1); g.fillRect(0, 0, W, H);
    
    // Grid floor
    g.lineStyle(1, 0x261645, 1);
    for(let x=0; x<W; x+=40) { g.beginPath(); g.moveTo(x, 400); g.lineTo(x-200, H); g.strokePath(); }
    for(let y=400; y<H; y+=25) { g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.strokePath(); }

    // Mirror walls (angled trapezoids)
    g.fillStyle(0x1a0f2e, 1);
    g.beginPath(); g.moveTo(100, 0); g.lineTo(300, 150); g.lineTo(300, 450); g.lineTo(100, 550); g.fillPath();
    g.lineStyle(2, 0x661aff, 0.6); g.strokePath();
    
    g.beginPath(); g.moveTo(860, 0); g.lineTo(660, 150); g.lineTo(660, 450); g.lineTo(860, 550); g.fillPath();
    g.lineStyle(2, 0x661aff, 0.6); g.strokePath();
    
    // Reflections (cyan/purple diagonal streaks)
    g.lineStyle(4, 0x00f5d4, 0.2); g.beginPath(); g.moveTo(150, 50); g.lineTo(250, 400); g.strokePath();
    g.lineStyle(4, C.ACCENT, 0.2); g.beginPath(); g.moveTo(700, 100); g.lineTo(800, 450); g.strokePath();
    
    // Trail dots
    g.fillStyle(0xf0e6f5, 0.8);
    let px = 200, py = 580;
    for(let i=0; i<8; i++) {
      g.fillCircle(px, py, 4);
      px += 35; py -= 15;
    }
    
    // Trapdoor / Panel
    g.fillStyle(0x05020a, 1);
    g.beginPath(); g.moveTo(430, 480); g.lineTo(530, 480); g.lineTo(550, 520); g.lineTo(410, 520); g.fillPath();
    g.lineStyle(2, C.ACCENT, 1); g.strokePath();
    // Hole
    g.fillStyle(0x000000, 1); g.fillCircle(480, 500, 6);

    // Shattered knockout gas bottle (floor, lower left)
    g.fillStyle(0x4fc3f7, 0.55); g.fillEllipse(130, 470, 38, 14); // sweet-smelling residue puddle
    g.lineStyle(2, 0xb6e8ff, 0.9);
    // glass shards
    [[110,460],[120,455],[135,450],[145,460],[140,470],[125,475],[115,468]].forEach(([x,y])=>{
      g.beginPath(); g.moveTo(x,y); g.lineTo(x+5,y-6); g.lineTo(x+9,y+1); g.closePath(); g.strokePath();
    });
    // bottle neck remnant
    g.fillStyle(0x3a4a55, 1); g.fillRect(128, 446, 6, 10);

    g.generateTexture('bg_labyrinth', W, H);
    g.destroy();
  }

  // ---- TV STATION
  bakeStation() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Dark room
    g.fillStyle(0x160a24, 1); g.fillRect(0, 0, W, 400);
    g.fillStyle(0x0d0514, 1); g.fillRect(0, 400, W, 240);

    // Big TV Screens
    g.fillStyle(0x05020a, 1); g.fillRect(150, 50, 660, 280);
    g.lineStyle(4, 0x261645, 1); g.strokeRect(150, 50, 660, 280);
    
    // Screen contents (static / recording)
    g.fillStyle(0x1a0f2e, 1); g.fillRect(160, 60, 640, 260);
    g.lineStyle(2, 0x3d2b59, 0.5);
    for(let y=60; y<320; y+=10) { g.beginPath(); g.moveTo(160, y); g.lineTo(800, y); g.strokePath(); }
    // LIVE dot
    g.fillStyle(0xff3366, 1); g.fillCircle(760, 90, 8);
    
    // Broadcasting Desk
    g.fillStyle(0x261645, 1); g.fillRect(200, 400, 560, 150);
    g.lineStyle(2, C.ACCENT, 0.7); g.strokeRect(200, 400, 560, 150);
    
    // Microphones
    g.lineStyle(4, 0x05020a, 1);
    g.beginPath(); g.moveTo(350, 450); g.lineTo(350, 400); g.strokePath(); g.fillStyle(0x3d2b59, 1); g.fillCircle(350, 390, 12);
    g.beginPath(); g.moveTo(610, 450); g.lineTo(610, 400); g.strokePath(); g.fillStyle(0x3d2b59, 1); g.fillCircle(610, 390, 12);

    g.generateTexture('bg_station', W, H);
    g.destroy();
  }

  // ---- VOID OF JUDGEMENT
  bakeVoid() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Abyss background
    g.fillStyle(0x05020a, 1); g.fillRect(0, 0, W, H);
    
    // Heavy metallic gates
    g.fillStyle(0x1a1a24, 1);
    g.fillRect(180, 50, 300, 450); // Left gate
    g.fillRect(480, 50, 300, 450); // Right gate
    g.lineStyle(4, 0x333345, 1);
    g.strokeRect(180, 50, 300, 450); g.strokeRect(480, 50, 300, 450);
    
    // Giant Saw Blade suspended
    g.fillStyle(0x404050, 1); g.fillCircle(480, 150, 80);
    g.lineStyle(4, 0x808090, 1);
    // Saw teeth
    for(let i=0; i<12; i++) {
      const angle = (i/12) * Math.PI * 2;
      const x1 = 480 + Math.cos(angle)*80; const y1 = 150 + Math.sin(angle)*80;
      const x2 = 480 + Math.cos(angle+0.2)*100; const y2 = 150 + Math.sin(angle+0.2)*100;
      g.beginPath(); g.moveTo(x1, y1); g.lineTo(x2, y2); g.strokePath();
    }
    // Saw ropes
    g.lineStyle(3, 0x3d2b59, 1);
    g.beginPath(); g.moveTo(480, 150); g.lineTo(480, 0); g.strokePath();

    // Floor panel
    g.fillStyle(0x1a0f2e, 1);
    g.beginPath(); g.moveTo(400, 500); g.lineTo(560, 500); g.lineTo(600, 550); g.lineTo(360, 550); g.fillPath();
    g.lineStyle(2, C.ACCENT, 1); g.strokePath();

    g.generateTexture('bg_void', W, H);
    g.destroy();
  }
}

class IntroScene extends Phaser.Scene {
  constructor() { super('IntroScene'); }

  create() {
    this.registry.set('gameState', {
      currentRoom: 'planetarium',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    }); this.registry.set('initialGameState', {
      currentRoom: 'planetarium',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    });

    this.cameras.main.setBackgroundColor('#0d0514');
    drawCanvasFrame(this);

    this.panelIndex = 0;
    this.advancing = false;
    this.layer = this.add.container(0, 0);

    this.input.keyboard.on('keydown-SPACE', () => this.advance());
    this.input.on('pointerdown', () => { if(Date.now() - (this.lastClick||0) < 300) return; this.lastClick = Date.now(); this.advance(); });

    this.showPanel();
  }

  clearLayer() { this.layer.removeAll(true); }

  showPanel() {
    this.clearLayer();
    const idx = this.panelIndex;

    if (idx === 1 || idx === 3) {
      const bg = this.add.image(480, 320, 'bg_planetarium').setAlpha(0.4);
      this.layer.add(bg);
      const tint = this.add.rectangle(480, 320, 960, 640, 0x0d0514, 0.6);

    }

    this.layer.add(pBg);
    this.layer.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 18));

    const stripText = `[ FILE ${String(idx+1).padStart(2,'0')} / 05 ]   ·   THE VOID CASE`;
    const strip = this.add.text(px+18, py+14, stripText, {
      fontFamily: F.MONO, fontSize:'12px', color:C.MUTE_S, letterSpacing:2
    });
    this.layer.add(strip);
    const stripLine = this.add.rectangle(px+18, py+34, pw-36, 1, C.ACCENT).setOrigin(0,0);
    this.layer.add(stripLine);

    if (idx === 0) {
      this.layer.add(this.add.text(480, 240, 'A NIGHT OF JUDGEMENT.', { fontFamily: F.UI, fontSize:'56px', fontStyle:'700', color:C.LIGHT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 290, 220, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 340, 'A facility turned into a slaughterhouse.', { fontFamily: F.MONO, fontSize:'18px', color:C.MUTE_S }).setOrigin(0.5));
    }
    else if (idx === 1) {
      this.layer.add(this.add.text(480, 240, 'MULTIPLE VICTIMS.', { fontFamily: F.UI, fontSize:'46px', fontStyle:'700', color:C.LIGHT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 285, 200, 2, C.ACCENT).setOrigin(0.5));
      const lines = [
        '> a stabbing in the lounge.',
        '> a trap in the mirror labyrinth.',
        '> ...and the void of judgement.'
      ];
      lines.forEach((t, i) => {
        this.layer.add(this.add.text(280, 320 + i*32, t, { fontFamily: F.MONO, fontSize:'18px', color: i === 2 ? C.ACCENT_S : C.LIGHT_S }));
      });
    }
    else if (idx === 2) {
      const port = this.add.image(220, 320, 'portrait_protagonist').setOrigin(0.5).setDisplaySize(160, 200);
      this.layer.add(port);
      this.layer.add(this.add.rectangle(220, 320, 162, 202, 0x000000, 0).setOrigin(0.5).setStrokeStyle(2, C.ACCENT));
      this.layer.add(drawAllCornerMarks(this, 139, 219, 162, 202, C.ACCENT, 12));

      this.layer.add(this.add.text(340, 220, 'My name does not matter right now.', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 270, 'The broadcast ordered us to search.', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 320, 'Someone pulled the strings of this night,', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 348, 'and orchestrated every death.', { fontFamily: F.MONO, fontSize:'17px', color:C.ACCENT_S, fontStyle:'italic' }));
    }
    else if (idx === 3) {
      this.layer.add(this.add.text(480, 240, 'LAST KNOWN LOCATION', { fontFamily: F.UI, fontSize:'30px', fontStyle:'700', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'PLANETARIUM LOUNGE.', { fontFamily: F.UI, fontSize:'56px', fontStyle:'700', color:C.ACCENT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 330, 280, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 370, 'That is where I start.', { fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic' }).setOrigin(0.5));
    }
    else if (idx === 4) {
      this.layer.add(this.add.text(480, 200, 'MURDER NEXT DOOR', { fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:6 }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 250, 360, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'CASE FILE — THE VOID CASE', { fontFamily: F.MONO, fontSize:'15px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(0.5));
      const btn = makeButton(this, 340, 380, 280, 56, '[ BEGIN INVESTIGATION ]', { fontSize: 18, onClick: () => { this.scene.start('GameScene'); } });
      this.layer.add(btn);
      this.lastPanel = true;
    }

    if (idx < 4) {
      const cont = this.add.text(px+pw-180, py+ph-30, '[ CLICK OR SPACE TO CONTINUE ▶ ]', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 });
      this.layer.add(cont);
      this.tweens.add({ targets: cont, alpha: { from: 1, to: 0.35 }, duration: 700, yoyo:true, repeat:-1 });
    }
    this.cameras.main.fadeIn(300, 10, 10, 15);
  }

  advance() {
    if (this.advancing || this.lastPanel) return;
    this.advancing = true;
    this.cameras.main.fadeOut(220, 10, 10, 15);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.panelIndex++;
      if (this.panelIndex > 4) { this.scene.start('GameScene'); return; }
      this.advancing = false;
      this.lastPanel = (this.panelIndex === 4);
      this.showPanel();
    });
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'investigation';
    if (!this.gs.visitedRooms.includes(this.gs.currentRoom)) this.gs.visitedRooms.push(this.gs.currentRoom);

    this.cameras.main.setBackgroundColor('#0d0514');

    this.bgLayer       = this.add.container(0, 0).setDepth(0);
    this.roomLayer     = this.add.container(0, 0).setDepth(10);
    this.uiBackLayer   = this.add.container(0, 0).setDepth(40);
    this.cardsLayer    = this.add.container(0, 0).setDepth(50);
    this.navLayer      = this.add.container(0, 0).setDepth(60);
    this.hintBtnLayer  = this.add.container(0, 0).setDepth(70);
    this.dialogueLayer = this.add.container(0, 0).setDepth(100).setVisible(false);
    this.suspectLayer  = this.add.container(0, 0).setDepth(200).setVisible(false);
    this.hintLayer     = this.add.container(0, 0).setDepth(300).setVisible(false);
    this.logsLayer     = this.add.container(0, 0).setDepth(400).setVisible(false);
    this.contraLayer   = this.add.container(0, 0).setDepth(500).setVisible(false);

    drawCanvasFrame(this);
    this.buildHeader();
    this.buildFilterButtons();
    this.buildEvidenceRow();
    this.cardsLayer.setVisible(false);
    this.buildNavBar();
    this.buildHintButton();
    this.buildDialoguePanel();

    this.loadRoom(this.gs.currentRoom);
    this.refreshEvidenceCards();
    this.refreshNavBar();

    this.input.keyboard.on('keydown-SPACE', () => { if (this.dialogueActive) this.advanceDialogue(); });
    this.input.keyboard.on('keydown-ESC', () => {
      if (this.suspectLayer.visible) this.toggleSuspectBoard(false);
      else if (this.hintLayer.visible) this.toggleHintPanel(false);
      else if (this.logsLayer.visible) this.toggleLogs(false);
    });
  }

  buildHeader() {
    const h = 38;
    const bg = this.add.rectangle(0, 0, 960, h, C.BG_PANEL, 1).setOrigin(0,0);
    const line = this.add.rectangle(0, h, 960, 1, C.ACCENT).setOrigin(0,0);
    this.uiBackLayer.add([bg, line]);
    this.headerLabel = this.add.text(20, 12, '', { fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 });
    this.headerSub = this.add.text(20, 28, '', { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:2 });
    this.headerStatus = this.add.text(940, 14, '', { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1, 0);
    this.uiBackLayer.add([this.headerLabel, this.headerSub, this.headerStatus]);
  }

  refreshHeader() {
    const room = this.gs.currentRoom;
    this.headerLabel.setText(`// ${ROOM_NAMES[room]}`);
    this.headerSub.setText(`zone ${ROOM_KEYS.indexOf(room)+1} / 04   ·   void case investigation`);
    const ev = this.gs.collectedEvidence.length;

    this.gs.currentRoom = room;
    if (!this.gs.visitedRooms.includes(room)) this.gs.visitedRooms.push(room);

    this.bgLayer.removeAll(true);
    this.roomLayer.removeAll(true);

    const bg = this.add.image(480, 320, 'bg_' + room);
    this.bgLayer.add(bg);

    const dim = this.add.rectangle(0, 360, 960, 280, 0x000000, 0.18).setOrigin(0,0);
    this.bgLayer.add(dim);

    try { window.__drawRoomDetails && window.__drawRoomDetails(this, 'void', room); } catch(e){ console.warn('details', e); }
    try { window.markRoomVisited && window.markRoomVisited('void', room); window.recordRoomVisit && window.recordRoomVisit('void', (typeof ROOM_NAMES!=='undefined'?ROOM_NAMES[room]:room)); } catch(e){}
    try { window.__drawRoomDetails && window.__drawRoomDetails(this, 'atlantic', room); } catch(e){ console.warn('details', e); }
    try { window.markRoomVisited && window.markRoomVisited('atlantic', room); window.recordRoomVisit && window.recordRoomVisit('atlantic', (typeof ROOM_NAMES!=='undefined'?ROOM_NAMES[room]:room)); } catch(e){}
    try { window.__drawRoomDetails && window.__drawRoomDetails(this, 'hope', room); } catch(e){ console.warn('details', e); }

    HOTSPOTS[room].forEach(h => this.makeHotspot(h));

    this.refreshHeader();
    this.refreshNavBar();

    this.cameras.main.flash(180, 179, 102, 255); // Purple flash
  }

  makeHotspot(h) {
    const collected = h.collect && this.gs.collectedEvidence.includes(h.collect);
    const cont = this.add.container(h.x, h.y);
    cont.hsId = h.id;

    const br = this.add.graphics();
    br.lineStyle(1.5, C.ACCENT, 1);
    const r = 22;
    [[-r,-r,1,1],[r,-r,-1,1],[-r,r,1,-1],[r,r,-1,-1]].forEach(([x,y,sx,sy]) => {
      br.beginPath(); br.moveTo(x, y); br.lineTo(x + 8*sx, y); br.moveTo(x, y); br.lineTo(x, y + 8*sy); br.strokePath();
    });
    cont.add(br);

    const dia = this.add.graphics();
    if (collected) { dia.fillStyle(C.ACCENT_D, 0.7); dia.lineStyle(1.5, C.ACCENT, 0.7); } 
    else { dia.fillStyle(C.ACCENT, 1); dia.lineStyle(1.5, C.LIGHT, 1); }
    dia.beginPath(); dia.moveTo(0, -8); dia.lineTo(8, 0); dia.lineTo(0, 8); dia.lineTo(-8, 0); dia.closePath(); dia.fillPath(); dia.strokePath();
    cont.add(dia);

    const lbl = this.add.text(0, 28, h.label, { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:1.5 }).setOrigin(0.5).setAlpha(0);
    cont.add(lbl);

    const hit = this.add.rectangle(0, 0, 56, 56, 0x000000, 0).setInteractive({ useHandCursor:true });
    cont.add(hit);

    hit.on('pointerover', () => { lbl.setAlpha(1); this.tweens.add({ targets: dia, scale:1.4, duration:120 }); });
    hit.on('pointerout', () => { lbl.setAlpha(0); this.tweens.add({ targets: dia, scale:1.0, duration:120 }); });
    hit.on('pointerdown', () => this.triggerHotspot(h));

    this.tweens.add({ targets: [dia, br], alpha:{ from:0.6, to:1.0 }, duration:900, yoyo:true, repeat:-1 });
    this.roomLayer.add(cont);
  }

  makeNPC(n) {
    const cont = this.add.container(n.x, n.y);
    const sh = this.add.ellipse(0, 70, 70, 14, 0x000000, 0.5);
    cont.add(sh);
    const body = this.add.graphics();
    body.fillStyle(n.color, 1);
    body.beginPath(); body.moveTo(-22, 60); body.lineTo(-14, 0); body.lineTo(14, 0); body.lineTo(22, 60); body.closePath(); body.fillPath();
    body.lineStyle(2, 0x0d0514, 1); body.strokePath();
    cont.add(body);
    const head = this.add.circle(0, -14, 14, 0xd4cfe0).setStrokeStyle(2, 0x0d0514);
    cont.add(head);
    const nameBg = this.add.rectangle(0, -50, 80, 18, C.BG_PANEL, 0.92).setStrokeStyle(1, C.ACCENT);
    const nameTxt = this.add.text(0, -50, n.name, { fontFamily: F.UI, fontSize:'11px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:2 }).setOrigin(0.5);
    cont.add([nameBg, nameTxt]);
    const dot = this.add.circle(34, -36, 4, C.ACCENT);
    cont.add(dot);
    this.tweens.add({ targets: dot, alpha:{from:0.4,to:1}, duration:700, yoyo:true, repeat:-1 });

    const hit = this.add.rectangle(0, 20, 80, 100, 0x000000, 0).setInteractive({ useHandCursor:true });
    cont.add(hit);
    hit.on('pointerover', () => { this.tweens.add({ targets: cont, y: n.y - 4, duration: 140 }); });
    hit.on('pointerout', () => { this.tweens.add({ targets: cont, y: n.y, duration: 140 }); });
    hit.on('pointerdown', () => this.triggerNPC(n));

    this.roomLayer.add(cont);
  }

  refreshEvidenceCards() {
    Object.keys(this.filterBtns).forEach(k => {
      const o = this.filterBtns[k];
      if (k === this.filter) { o.bg.setFillStyle(C.ACCENT, 1).setStrokeStyle(1, C.ACCENT); o.txt.setColor(C.BG_DEEP_S); } 
      else { o.bg.setFillStyle(C.BG_PANEL, 1).setStrokeStyle(1, C.MUTE); o.txt.setColor(C.MUTE_S); }
    });

    const evs = this.gs.collectedEvidence.filter(id => {
      if (this.filter === 'ALL') return true;
      return EVIDENCE_META[id] && EVIDENCE_META[id].type === this.filter;
    });

    this.evCount.setText(`${String(this.gs.collectedEvidence.length).padStart(2,'0')} / 16`);
    this.emptyText.setVisible(evs.length === 0);
    this.cardsHolder.removeAll(true);

    const cardW = 138, cardH = 60, gap = 8;
    const visible = 6;
    const maxScroll = Math.max(0, evs.length - visible);
    if (this.cardScroll > maxScroll) this.cardScroll = maxScroll;

    for (let i = 0; i < visible; i++) {
      const idx = i + this.cardScroll;
      if (idx >= evs.length) break;
      const id = evs[idx];
      const meta = EVIDENCE_META[id];
      const x = i * (cardW + gap);

      const card = this.add.container(x, 0);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, C.MUTE);
      const stripe = this.add.rectangle(0, 0, 3, cardH, C.ACCENT, 1).setOrigin(0,0);
      const tagColor = meta.type === 'PHYSICAL' ? C.ACCENT : (meta.type === 'TESTIMONY' ? 0xc49a2a : 0x8aa6c8);
      const tagBg = this.add.rectangle(cardW-50, 6, 44, 12, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, tagColor);
      const tagTx = this.add.text(cardW-28, 12, meta.type.slice(0,3), { fontFamily: F.MONO, fontSize:'8px', color:'#'+tagColor.toString(16).padStart(6,'0'), letterSpacing:1 }).setOrigin(0.5);
      const title = this.add.text(10, 14, id.length > 18 ? id.slice(0,17)+'…' : id, { fontFamily: F.UI, fontSize:'12px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:1 });
      const room = this.add.text(10, 30, '> ' + meta.room, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:1 });
      const bottomBar = this.add.rectangle(10, cardH-15, cardW-20, 1, 0x261645).setOrigin(0,0);
      const bottomTag = this.add.text(10, cardH-12, '· COLLECTED', { fontFamily: F.MONO, fontSize:'8px', color:C.ACCENT_S, letterSpacing:1 });

      card.add([bg, stripe, tagBg, tagTx, title, room, bottomBar, bottomTag]);
      bg.setInteractive({ useHandCursor: true });
      bg.on('pointerdown', () => window.openEvidenceModal('void', id));
    
      if (id === this._newestEvidence) {
        card.setScale(0.6); card.setAlpha(0);
        this.tweens.add({ targets: card, scale:1, alpha:1, duration:380, ease:'Back.Out' });
      }
      this.cardsHolder.add(card);
    }
    this._newestEvidence = null;
    this.refreshHeader();
  }

  refreshNavBar() {
    Object.keys(this.navTabs).forEach(k => {
      const o = this.navTabs[k];
      const isCurrent = (this.gs.currentRoom === k);
      const visited = this.gs.visitedRooms.includes(k);
      if (isCurrent) { o.bg.setFillStyle(C.ACCENT, 1).setStrokeStyle(1, C.ACCENT); o.txt.setColor(C.BG_DEEP_S); } 
      else { o.bg.setFillStyle(C.BG_PANEL, 1).setStrokeStyle(1, 0x261645); o.txt.setColor(visited ? C.LIGHT_S : C.MUTE_S); }
      o.dot.setVisible(visited && !isCurrent);
    });
    const ready = this.gs.visitedRooms.length >= 4;
    this.accuseCont.setVisible(ready);
    this.accuseEmpty.setVisible(!ready);
    this.accuseEmptyTxt.setVisible(!ready);
  }

      this.cameras.main.scrollX = 0;
      this.cameras.main.scrollY = 0;
    }
    this.loadRoom(room);
  }

  showDialogue(lines, onDone) {
    this.dialogueActive = true;
    this.dialogueQueue = lines.slice();
    this._dialogueOnDone = onDone || null;
    this.dialogueLayer.setVisible(true);
    this.dialogueLayer.setAlpha(0);
    this.dialogueLayer.y = 8;
    this.tweens.add({ targets: this.dialogueLayer, alpha: 1, y: 0, duration: 200 });
    this.advanceDialogue(true);
  }

  advanceDialogue(initial) {
    if (!this.dialogueActive) return;
    if (!initial) { if (this.dialogueQueue.length === 0) { this.hideDialogue(); return; } }
    const next = this.dialogueQueue.shift();
    if (!next) { this.hideDialogue(); return; }
    this.dPortrait.setTexture(next.portrait);
    this.dSpeaker.setText('// ' + (next.speaker || '— — —'));
    this.dFileTag.setText('// LOG ENTRY · MIXED CASE');
    this.dText.setStyle({ fontFamily: F.MONO, fontSize:'18px', color: C.LIGHT_S, fontStyle: next.italic ? 'italic' : '500', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'left', lineSpacing:6 });
    this.dText.setText(next.text);
    this.dText.setAlpha(0);
    this.tweens.add({ targets: this.dText, alpha: 1, duration: 130 });
  }

  hideDialogue() {
    this.dialogueActive = false;
    this.tweens.add({
      targets: this.dialogueLayer, alpha: 0, duration: 140,
      onComplete: () => {
        this.dialogueLayer.setVisible(false);
        const done = this._dialogueOnDone;
        this._dialogueOnDone = null;
        if (done) done();
      }
    });
  }

  triggerHotspot(h) {
    if (this.dialogueActive) return;
    this.showDialogue(h.lines, () => {
      if (h.collect) {
        if (h.collectExtra && this.gs.collectedEvidence.includes(h.collect)) {
          this.showDialogue([P(h.collectExtra)]); return;
        }
        this.collectEvidence(h.collect);
      }
      if (h.after === 'logs_panel') {
        this.toggleLogs(true); return;
      }
      this.checkContradictions();
    });
  }

  triggerNPC(n) {
    if (this.dialogueActive) return;
    if (!this.gs.suspectsTalked.includes(n.id)) this.gs.suspectsTalked.push(n.id);
    let queue = n.lines.slice();
    if (n.conditional && this.gs.collectedEvidence.includes(n.conditional.has)) { queue.push(n.conditional.line); }
    this.showDialogue(queue, () => {
      if (n.collect) this.collectEvidence(n.collect);
      this.checkContradictions();
    });
  }

  collectEvidence(id) {
    if (!id || this.gs.collectedEvidence.includes(id)) return false;
    this.gs.collectedEvidence.push(id);
    this._newestEvidence = id;
    this.filter = 'ALL';
    this.cardScroll = Math.max(0, this.gs.collectedEvidence.length - 6);
    this.refreshEvidenceCards();
    this.cameras.main.flash(120, 179, 102, 255);
    this.refreshHotspots();
    return true;
  }

  refreshHotspots() {
    this.roomLayer.removeAll(true);
    HOTSPOTS[this.gs.currentRoom].forEach(h => this.makeHotspot(h));
    (NPCS[this.gs.currentRoom] || []).forEach(n => this.makeNPC(n));
  }

  checkContradictions() {
    for (const c of CONTRADICTIONS) {
      if (this.gs.contradictionsTriggered.includes(c.id)) continue;
      const ok = c.requires.every(req => this.gs.collectedEvidence.includes(req));
      if (ok) { this.fireContradiction(c.id); return; }
    }
  }

  fireContradiction(id) {
    const c = CONTRADICTIONS.find(x => x.id === id);
    if (!c) return;
    if (this.gs.contradictionsTriggered.includes(id)) return;
    this.gs.contradictionsTriggered.push(id);
    this.refreshHeader();

    const layer = this.contraLayer;
    layer.removeAll(true);
    layer.setVisible(true).setAlpha(0);

    const overlay = this.add.rectangle(0, 0, 960, 640, 0x0d0514, 0.92).setOrigin(0,0);
    layer.add(overlay);

    const big = this.add.text(480, 230, 'CONTRADICTION', { fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:8 }).setOrigin(0.5);
    layer.add(big);
    const tw = big.width + 80, th = big.height + 30;
    const border = this.add.rectangle(480, 230, tw, th, 0x000000, 0).setOrigin(0.5).setStrokeStyle(3, C.ACCENT);
    layer.add(border);
    layer.add(drawAllCornerMarks(this, 480-tw/2, 230-th/2, tw, th, C.ACCENT, 22));
    
    const idx = this.add.text(480, 290, `// CONTRADICTION 0${id} OF 05 LOGGED`, { fontFamily: F.MONO, fontSize:'12px', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5);
    layer.add(idx);
    const expl = this.add.text(480, 360, c.text, { fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'center', lineSpacing:6 }).setOrigin(0.5);
    layer.add(expl);

    const _dismissTxt = this.add.text(480, 470, '[ CLICK TO DISMISS ]', {
      fontFamily: F.MONO, fontSize:'14px', color:C.ACCENT_S, letterSpacing:3
    }).setOrigin(0.5);
    layer.add(_dismissTxt);
    const _hit = this.add.rectangle(0, 0, 960, 640, 0x000000, 0.001).setOrigin(0,0).setInteractive({ useHandCursor:true });
    layer.add(_hit);
    const _dismiss = () => {
      this.tweens.add({
        targets: layer, alpha: 0, duration: 300,
        onComplete: () => { layer.setVisible(false); layer.removeAll(true); }
      });
    };
    _hit.on('pointerdown', _dismiss);
    this.tweens.add({ targets: layer, alpha: 1, duration: 300 });
  }

  toggleSuspectBoard(show) {
    if (show) {
      this.buildSuspectBoard();
      this.suspectLayer.setVisible(true).setAlpha(0);
      this.tweens.add({ targets: this.suspectLayer, alpha: 1, duration: 180 });
    } else {
      this.tweens.add({

  openPinPicker(sus) {
    const layer = this.suspectLayer;
    const sub = this.add.container(0, 0);
    const back = this.add.rectangle(0, 0, 960, 640, 0x000000, 0.7).setOrigin(0,0).setInteractive();
    sub.add(back);

    sub.add(this.add.rectangle(px+16, py+16, pw-32, 1, C.ACCENT).setOrigin(0,0));
    sub.add(this.add.text(px+16, py+22, `// PIN EVIDENCE TO ${sus.name}`, { fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 }));
    sub.add(this.add.text(px+pw-16, py+24, 'click an item to toggle pin', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S }).setOrigin(1,0));

    const pins = this.gs.pins[sus.id] || (this.gs.pins[sus.id] = []);
    const list = this.gs.collectedEvidence;

    if (list.length === 0) {
      sub.add(this.add.text(px+pw/2, py+ph/2, '> NO EVIDENCE COLLECTED YET', { fontFamily: F.MONO, fontSize:'14px', color:C.MUTE_S }).setOrigin(0.5));

    list.forEach((id, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const ix = px + 20 + col * 240;
      const iy = py + 60 + row * 36;
      const isPinned = pins.includes(id);
      const meta = EVIDENCE_META[id];
      const itemBg = this.add.rectangle(ix, iy, 230, 30, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, isPinned ? C.ACCENT : 0x261645);
      const stripe = this.add.rectangle(ix, iy, 3, 30, isPinned ? C.ACCENT : C.MUTE, 1).setOrigin(0,0);
      const tx = this.add.text(ix+10, iy+8, (isPinned ? '◉ ' : '○ ') + (id.length > 22 ? id.slice(0,21)+'…' : id), { fontFamily: F.MONO, fontSize:'10px', color: isPinned ? C.ACCENT_S : C.LIGHT_S, letterSpacing:1 });
      const tag = this.add.text(ix+220, iy+15, meta.type.slice(0,3), { fontFamily: F.MONO, fontSize:'8px', color:C.MUTE_S }).setOrigin(1, 0.5);
      itemBg.setInteractive({ useHandCursor:true });
      itemBg.on('pointerdown', () => {
        if (pins.includes(id)) pins.splice(pins.indexOf(id), 1); else pins.push(id);
        sub.destroy(); this.openPinPicker(sus);
        this.toggleSuspectBoard(false); this.toggleSuspectBoard(true);
      });
      itemBg.on('pointerover', () => itemBg.setStrokeStyle(1, C.ACCENT));
      itemBg.on('pointerout',  () => itemBg.setStrokeStyle(1, isPinned ? C.ACCENT : 0x261645));
      sub.add([itemBg, stripe, tx, tag]);
    });

    const closeBtn = makeButton(this, px+pw-110, py+ph-44, 92, 28, 'DONE', { fontSize:12, onClick: () => sub.destroy() });

  }
}
