  showDialogue(lines, onDone) {
    this.dialogueActive = true;
    this.dialogueQueue = lines.slice();
    this._dialogueOnDone = onDone || null;
    this.dialogueLayer.setVisible(true);
    this.dialogueLayer.setAlpha(0);
    this.dialogueLayer.y = 8;
    this.tweens.add({ targets: this.dialogueLayer, alpha: 1, y: 0, duration: 200 });
    this.advanceDialogue(true);
  }

  advanceDialogue(initial) {
    if (!this.dialogueActive) return;
    if (!initial) { if (this.dialogueQueue.length === 0) { this.hideDialogue(); return; } }
    const next = this.dialogueQueue.shift();
    if (!next) { this.hideDialogue(); return; }
    this.dPortrait.setTexture(next.portrait);
    this.dSpeaker.setText('// ' + (next.speaker || '— — —'));
    this.dFileTag.setText('// LOG ENTRY · MIXED CASE');
    this.dText.setStyle({ fontFamily: F.MONO, fontSize:'18px', color: C.LIGHT_S, fontStyle: next.italic ? 'italic' : '500', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'left', lineSpacing:6 });
    this.dText.setText(next.text);
    this.dText.setAlpha(0);
    this.tweens.add({ targets: this.dText, alpha: 1, duration: 130 });
  }

  hideDialogue() {
    this.dialogueActive = false;
    this.tweens.add({
      targets: this.dialogueLayer, alpha: 0, duration: 140,
      onComplete: () => {
        this.dialogueLayer.setVisible(false);
        const done = this._dialogueOnDone;
        this._dialogueOnDone = null;
        if (done) done();
      }
    });
  }

  triggerHotspot(h) {
    if (this.dialogueActive) return;
    this.showDialogue(h.lines, () => {
      if (h.collect) {
        if (h.collectExtra && this.gs.collectedEvidence.includes(h.collect)) {
          this.showDialogue([P(h.collectExtra)]); return;
        }
        this.collectEvidence(h.collect);
      }
      if (h.after === 'guard_block') {
        this.showDialogue([ S('THE GUARD', 'portrait_guard', 'Don\'t touch that bucket. It\'s evidence.') ]); return;
      }
      if (h.after === 'logs_panel') {
        this.toggleLogs(true); return;
      }
      this.checkContradictions();
    });
  }

  triggerNPC(n) {
    if (this.dialogueActive) return;
    if (!this.gs.suspectsTalked.includes(n.id)) this.gs.suspectsTalked.push(n.id);
    let queue = n.lines.slice();
    if (n.conditional && this.gs.collectedEvidence.includes(n.conditional.has)) { queue.push(n.conditional.line); }
    this.showDialogue(queue, () => {
      if (n.collect) this.collectEvidence(n.collect);
      this.checkContradictions();
    });
  }

  collectEvidence(id) {
    if (!id || this.gs.collectedEvidence.includes(id)) return false;
    this.gs.collectedEvidence.push(id);
    this._newestEvidence = id;
    this.filter = 'ALL';
    this.cardScroll = Math.max(0, this.gs.collectedEvidence.length - 6);
    this.refreshEvidenceCards();
    this.cameras.main.flash(120, 255, 204, 0);
    this.refreshHotspots();
    return true;
  }

  refreshHotspots() {
    this.roomLayer.removeAll(true);
    HOTSPOTS[this.gs.currentRoom].forEach(h => this.makeHotspot(h));
    (NPCS[this.gs.currentRoom] || []).forEach(n => this.makeNPC(n));
  }

  checkContradictions() {
    for (const c of CONTRADICTIONS) {
      if (this.gs.contradictionsTriggered.includes(c.id)) continue;
      const ok = c.requires.every(req => this.gs.collectedEvidence.includes(req));
      if (ok) { this.fireContradiction(c.id); return; }
    }
  }

  fireContradiction(id) {
    const c = CONTRADICTIONS.find(x => x.id === id);
    if (!c) return;
    if (this.gs.contradictionsTriggered.includes(id)) return;
    this.gs.contradictionsTriggered.push(id);
    this.refreshHeader();

    const layer = this.contraLayer;
    layer.removeAll(true);
    layer.setVisible(true).setAlpha(0);

    const overlay = this.add.rectangle(0, 0, 960, 640, 0x12110a, 0.92).setOrigin(0,0);
    layer.add(overlay);

    const big = this.add.text(480, 230, 'CONTRADICTION', { fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:8 }).setOrigin(0.5);
    layer.add(big);
    const tw = big.width + 80, th = big.height + 30;
    const border = this.add.rectangle(480, 230, tw, th, 0x000000, 0).setOrigin(0.5).setStrokeStyle(3, C.ACCENT);
    layer.add(border);
    layer.add(drawAllCornerMarks(this, 480-tw/2, 230-th/2, tw, th, C.ACCENT, 22));
    
    const idx = this.add.text(480, 290, `// CONTRADICTION 0${id} OF 05 LOGGED`, { fontFamily: F.MONO, fontSize:'12px', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5);
    layer.add(idx);
    const expl = this.add.text(480, 360, c.text, { fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'center', lineSpacing:6 }).setOrigin(0.5);
    layer.add(expl);

    const _dismissTxt = this.add.text(480, 470, '[ CLICK TO DISMISS ]', {
      fontFamily: F.MONO, fontSize:'14px', color:C.ACCENT_S, letterSpacing:3
    }).setOrigin(0.5);
    layer.add(_dismissTxt);
    const _hit = this.add.rectangle(0, 0, 960, 640, 0x000000, 0.001).setOrigin(0,0).setInteractive({ useHandCursor:true });

        targets: layer, alpha: 0, duration: 300,
        onComplete: () => { layer.setVisible(false); layer.removeAll(true); }

  toggleSuspectBoard(show) {
    if (show) {
      this.buildSuspectBoard();
      this.suspectLayer.setVisible(true).setAlpha(0);
      this.tweens.add({ targets: this.suspectLayer, alpha: 1, duration: 180 });
    } else {
      this.tweens.add({
        targets: this.suspectLayer, alpha: 0, duration: 180,
        onComplete: () => { this.suspectLayer.setVisible(false); this.suspectLayer.removeAll(true); }
      });
    }
  }

  buildSuspectBoard() {
    const layer = this.suspectLayer;
    layer.removeAll(true);
    const back = this.add.rectangle(0, 0, 960, 640, 0x12110a, 0.97).setOrigin(0,0);
    layer.add(back);
    const grid = this.add.graphics();
    grid.lineStyle(1, 0x2e2918, 1);
    for (let gx = 0; gx <= 960; gx += 40) { grid.beginPath(); grid.moveTo(gx, 0); grid.lineTo(gx, 640); grid.strokePath(); }
    for (let gy = 0; gy <= 640; gy += 40) { grid.beginPath(); grid.moveTo(0, gy); grid.lineTo(960, gy); grid.strokePath(); }
    layer.add(grid);

    const headerBg = this.add.rectangle(0, 0, 960, 56, C.BG_PANEL, 1).setOrigin(0,0);
    const headerLine = this.add.rectangle(0, 56, 960, 2, C.ACCENT).setOrigin(0,0);
    layer.add([headerBg, headerLine]);
    layer.add(this.add.text(20, 16, '// SUSPECT BOARD', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 }));
    layer.add(this.add.text(20, 38, 'cross-reference suspects against evidence · pin items to build a case', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:1 }));
    const closeBtn = makeButton(this, 880, 14, 60, 28, '× ESC', { fontSize:11, onClick: () => this.toggleSuspectBoard(false) });
    layer.add(closeBtn);

    const cardW = 175, cardH = 410, gap = 10;
    const totalW = 5 * cardW + 4 * gap;
    const startX = (960 - totalW) / 2;
    const cardY = 90;

    SUSPECTS.forEach((sus, i) => {
      const x = startX + i * (cardW + gap);
      const card = this.add.container(x, cardY);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(1, 0x3d3624);
      card.add(bg);
      card.add(this.add.rectangle(0, 0, cardW, 4, C.ACCENT, 1).setOrigin(0,0));
      card.add(this.add.text(10, 14, '0' + (i+1), { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }));
      card.add(this.add.text(cardW-10, 14, '·', { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S }).setOrigin(1,0));
      const port = this.add.image(cardW/2, 130, sus.portrait).setOrigin(0.5).setDisplaySize(150, 188);
      card.add(port);
      const portBorder = this.add.rectangle(cardW/2, 130, 152, 190, 0x000000, 0).setOrigin(0.5).setStrokeStyle(1, C.ACCENT, 0.7);
      card.add(portBorder);
      card.add(this.add.text(cardW/2, 240, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:4 }).setOrigin(0.5));
      card.add(this.add.rectangle(20, 268, cardW-40, 1, C.ACCENT, 0.4).setOrigin(0,0));
      card.add(this.add.text(cardW/2, 290, sus.desc, { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, wordWrap:{ width: cardW - 24, useAdvancedWrap: true }, align:'center', lineSpacing:3 }).setOrigin(0.5));

      const pins = this.gs.pins[sus.id] || [];
      const pinsContainer = this.add.container(8, 330);
      let py = 0;
      pins.slice(0, 3).forEach(p => {
        const tagW = cardW - 16;
        const tagBg = this.add.rectangle(0, py, tagW, 20, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT);
        const tagTx = this.add.text(8, py + 10, '· ' + (p.length > 22 ? p.slice(0,21)+'…' : p), { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:1 }).setOrigin(0,0.5);
        pinsContainer.add([tagBg, tagTx]);
        py += 24;
      });
      if (pins.length > 3) { pinsContainer.add(this.add.text(0, py, `+${pins.length - 3} more`, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S })); }
      card.add(pinsContainer);

      const pinBtn = makeButton(this, 14, cardH - 38, cardW - 28, 26, '+ PIN EVIDENCE', { fontSize: 11, onClick: () => this.openPinPicker(sus) });
      card.add(pinBtn);
      layer.add(card);
    });
  }

  openPinPicker(sus) {
    const layer = this.suspectLayer;
    const sub = this.add.container(0, 0);
    const back = this.add.rectangle(0, 0, 960, 640, 0x000000, 0.7).setOrigin(0,0).setInteractive();
    sub.add(back);
    const pw = 520, ph = 440;
    const px = (960-pw)/2, py = (640-ph)/2;
    const pBg = this.add.rectangle(px, py, pw, ph, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
    sub.add(pBg);
    sub.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 16));
    sub.add(this.add.rectangle(px+16, py+16, pw-32, 1, C.ACCENT).setOrigin(0,0));
    sub.add(this.add.text(px+16, py+22, `// PIN EVIDENCE TO ${sus.name}`, { fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 }));
    sub.add(this.add.text(px+pw-16, py+24, 'click an item to toggle pin', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S }).setOrigin(1,0));

    const pins = this.gs.pins[sus.id] || (this.gs.pins[sus.id] = []);
    const list = this.gs.collectedEvidence;

    if (list.length === 0) {
      sub.add(this.add.text(px+pw/2, py+ph/2, '> NO EVIDENCE COLLECTED YET', { fontFamily: F.MONO, fontSize:'14px', color:C.MUTE_S }).setOrigin(0.5));
    }

    list.forEach((id, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const ix = px + 20 + col * 240;
      const iy = py + 60 + row * 36;
      const isPinned = pins.includes(id);
      const meta = EVIDENCE_META[id];
      const itemBg = this.add.rectangle(ix, iy, 230, 30, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, isPinned ? C.ACCENT : 0x3d3624);
      const stripe = this.add.rectangle(ix, iy, 3, 30, isPinned ? C.ACCENT : C.MUTE, 1).setOrigin(0,0);
      const tx = this.add.text(ix+10, iy+8, (isPinned ? '◉ ' : '○ ') + (id.length > 22 ? id.slice(0,21)+'…' : id), { fontFamily: F.MONO, fontSize:'10px', color: isPinned ? C.ACCENT_S : C.LIGHT_S, letterSpacing:1 });
      const tag = this.add.text(ix+220, iy+15, meta.type.slice(0,3), { fontFamily: F.MONO, fontSize:'8px', color:C.MUTE_S }).setOrigin(1, 0.5);
      itemBg.setInteractive({ useHandCursor:true });
      itemBg.on('pointerdown', () => {
        if (pins.includes(id)) pins.splice(pins.indexOf(id), 1); else pins.push(id);
        sub.destroy(); this.openPinPicker(sus);
        this.toggleSuspectBoard(false); this.toggleSuspectBoard(true);
      });
      itemBg.on('pointerover', () => itemBg.setStrokeStyle(1, C.ACCENT));
      itemBg.on('pointerout',  () => itemBg.setStrokeStyle(1, isPinned ? C.ACCENT : 0x3d3624));
      sub.add([itemBg, stripe, tx, tag]);
    });

    const closeBtn = makeButton(this, px+pw-110, py+ph-44, 92, 28, 'DONE', { fontSize:12, onClick: () => sub.destroy() });
    sub.add(closeBtn);
    layer.add(sub);
  }

  toggleHintPanel(show) {
    if (show) {
      this.buildHintPanel();
      this.hintLayer.setVisible(true);
      this.hintLayer.x = 960;
      this.tweens.add({ targets: this.hintLayer, x: 0, duration: 220, ease:'Cubic.Out' });
    } else {
      this.tweens.add({
        targets: this.hintLayer, x: 960, duration: 200, ease:'Cubic.In',
        onComplete: () => { this.hintLayer.setVisible(false); this.hintLayer.removeAll(true); this.hintLayer.x = 0; }
      });
    }
  }

  buildHintPanel() {
    const layer = this.hintLayer;
    layer.removeAll(true);
    const pw = 380, ph = 480;
    const px = 960 - pw - 20, py = 80;
    const bg = this.add.rectangle(px, py, pw, ph, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
    layer.add(bg);
    layer.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 16));
    layer.add(this.add.rectangle(px+16, py+16, pw-32, 1, C.ACCENT).setOrigin(0,0));
    layer.add(this.add.text(px+16, py+24, '// ANONYMOUS TIP', { fontFamily: F.UI, fontSize:'14px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 }));
    const closeBtn = makeButton(this, px+pw-46, py+18, 30, 22, '×', { fontSize:14, onClick: () => this.toggleHintPanel(false) });
    layer.add(closeBtn);
    const port = this.add.image(px+24, py+60, 'portrait_mystery').setOrigin(0,0).setDisplaySize(120, 150);
    layer.add(port);
    layer.add(this.add.rectangle(px+24, py+60, 120, 150, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT, 0.7));
    layer.add(this.add.text(px+160, py+72, '???', { fontFamily: F.UI, fontSize:'30px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:6 }));
    layer.add(this.add.text(px+160, py+108, '> source unknown · trust at own risk', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:1 }));
    layer.add(this.add.rectangle(px+160, py+128, pw-180, 1, C.ACCENT, 0.4).setOrigin(0,0));
    layer.add(this.add.text(px+24, py+230, '// HINTS · ' + ROOM_NAMES[this.gs.currentRoom], { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 }));
    layer.add(this.add.rectangle(px+24, py+250, pw-48, 1, C.ACCENT).setOrigin(0,0));
    const hints = HINTS[this.gs.currentRoom];
    hints.forEach((t, i) => {
      const hy = py + 270 + i * 70;
      const hbg = this.add.rectangle(px+24, hy, pw-48, 60, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, 0x3d3624);
      const stripe = this.add.rectangle(px+24, hy, 4, 60, C.ACCENT, 1).setOrigin(0,0);
      const num = this.add.text(px+38, hy+8, '0' + (i+1), { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:2 });
      const tx = this.add.text(px+38, hy+24, t, { fontFamily: F.MONO, fontSize:'12px', color:C.LIGHT_S, wordWrap:{ width: pw - 80, useAdvancedWrap:true }, fontStyle:'italic' });
      layer.add([hbg, stripe, num, tx]);
    });
  }

  toggleLogs(show) {
    if (show) {
      this.buildLogsPanel();
      this.logsLayer.setVisible(true).setAlpha(0);
      this.tweens.add({ targets: this.logsLayer, alpha: 1, duration: 200 });
    } else {
      this.tweens.add({
        targets: this.logsLayer, alpha: 0, duration: 200,
        onComplete: () => { this.logsLayer.setVisible(false); this.logsLayer.removeAll(true); }
      });
    }
  }

  buildLogsPanel() {
    const layer = this.logsLayer;
    layer.removeAll(true);
    const back = this.add.rectangle(0, 0, 960, 640, 0x12110a, 0.92).setOrigin(0,0).setInteractive();
    layer.add(back);
    const pw = 720, ph = 500;
    const px = (960-pw)/2, py = (640-ph)/2;
    layer.add(this.add.rectangle(px, py, pw, ph, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT));
    layer.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 18));
    layer.add(this.add.text(px+20, py+22, '// TRIAL RECORDS TERMINAL', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 }));
    layer.add(this.add.text(px+pw-20, py+26, '04 ENTRIES RECOVERED · CHRONOLOGICAL', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0));
    layer.add(this.add.rectangle(px+20, py+50, pw-40, 1, C.ACCENT).setOrigin(0,0));

    CALL_LOGS.forEach((log, i) => {
      const ly = py + 70 + i * 95;
      const lbg = this.add.rectangle(px+20, ly, pw-40, 80, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, 0x3d3624);
      const stripe = this.add.rectangle(px+20, ly, 4, 80, C.ACCENT, 1).setOrigin(0,0);
      const tag = this.add.text(px+36, ly+10, log.tag, { fontFamily: F.UI, fontSize:'13px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:3 });
      const time = this.add.text(px+pw-30, ly+12, '· t+' + i, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S }).setOrigin(1,0);
      const body = this.add.text(px+36, ly+32, log.body, { fontFamily: F.MONO, fontSize:'12px', color:C.LIGHT_S, wordWrap:{ width: pw - 70, useAdvancedWrap:true }, lineSpacing:2 });
      layer.add([lbg, stripe, tag, time, body]);
      [lbg, stripe, tag, time, body].forEach(o => o.setAlpha(0));
      this.tweens.add({ targets:[lbg, stripe, tag, time, body], alpha:1, duration:200, delay: 80 + i*120 });
    });

    const close = makeButton(this, px+pw-130, py+ph-46, 110, 30, 'CLOSE', { fontSize:13, onClick: () => this.toggleLogs(false) });
    layer.add(close);
  }
}

// ACCUSATIONSCENE
// =========================================================
class AccusationScene extends Phaser.Scene {
  constructor() { super('AccusationScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'accusation';
    this.cameras.main.setBackgroundColor('#12110a');

    const grid = this.add.graphics();
    grid.lineStyle(1, 0x2e2918, 1);
    for (let x = 0; x <= 960; x += 40) { grid.beginPath(); grid.moveTo(x,0); grid.lineTo(x,640); grid.strokePath(); }
    for (let y = 0; y <= 640; y += 40) { grid.beginPath(); grid.moveTo(0,y); grid.lineTo(960,y); grid.strokePath(); }
    const diag = this.add.graphics();
    diag.lineStyle(1, C.ACCENT, 0.3);
    diag.beginPath(); diag.moveTo(0, 80); diag.lineTo(80, 0); diag.strokePath();
    diag.beginPath(); diag.moveTo(960, 80); diag.lineTo(880, 0); diag.strokePath();

    drawCanvasFrame(this);

    this.add.rectangle(0, 0, 960, 56, C.BG_PANEL, 1).setOrigin(0,0);
    this.add.rectangle(0, 56, 960, 2, C.ACCENT).setOrigin(0,0);
    this.add.text(20, 18, '// FINAL ACCUSATION', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 });
    
    this.add.text(940, 18, '// CASE: THE CHEF · CLOSE THE LOOP', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0);

    this.add.text(480, 110, 'WHO KILLED THE CHEF?', { fontFamily: F.UI, fontSize:'42px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:6 }).setOrigin(0.5);
    this.add.rectangle(480, 142, 380, 3, C.ACCENT).setOrigin(0.5);
    this.add.text(480, 168, 'select one. there is no second guess.', { fontFamily: F.MONO, fontSize:'13px', color:C.MUTE_S, letterSpacing:2, fontStyle:'italic' }).setOrigin(0.5);

    const cardW = 160, cardH = 280, gap = 20;
    const totalW = 5*cardW + 4*gap;
    const startX = (960 - totalW) / 2;
    const y = 220;

    (function(arr){ for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; })([...SUSPECTS]).forEach((sus, i) => {
      const x = startX + i*(cardW+gap);
      const card = this.add.container(x, y);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.MUTE);
      const portBg = this.add.rectangle(8, 8, cardW-16, 200, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT, 0.7);
      const port = this.add.image(cardW/2, 108, sus.portrait).setOrigin(0.5).setDisplaySize(cardW-20, 196);
      const numTag = this.add.text(14, 18, '0' + (i+1), { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 });
      const name = this.add.text(cardW/2, 226, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:5 }).setOrigin(0.5);
      const div = this.add.rectangle(cardW/2, 248, 60, 1, C.ACCENT).setOrigin(0.5);
      const action = this.add.text(cardW/2, 264, '> ACCUSE', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:3 }).setOrigin(0.5);
      const corners = drawAllCornerMarks(this, x+4, y+4, cardW-8, cardH-8, C.ACCENT, 14);
      corners.setAlpha(0);

      card.add([bg, portBg, port, numTag, name, div, action]);
      bg.setInteractive({ useHandCursor:true });
      bg.on('pointerover', () => {
        bg.setStrokeStyle(2, C.ACCENT); action.setColor(C.ACCENT_S); corners.setAlpha(1);
        this.tweens.add({ targets: card, scaleX:1.05, scaleY:1.05, x: x - cardW*0.025, y: y - cardH*0.025, duration:140 });
      });
      bg.on('pointerout', () => {
        bg.setStrokeStyle(2, C.MUTE); action.setColor(C.ACCENT_S); corners.setAlpha(0);
        this.tweens.add({ targets: card, scaleX:1, scaleY:1, x, y, duration:140 });
      });
      bg.on('pointerdown', () => {
        bg.disableInteractive();
        this.cameras.main.flash(180, 255, 204, 0);
        this.cameras.main.fadeOut(360, 10, 10, 15);
        this.cameras.main.once('camerafadeoutcomplete', () => {
          this.scene.start('EndingScene', { accused: sus.id, correct: sus.correct });
        });
      });
    });

    const back = makeButton(this, 20, 590, 140, 30, '← BACK', { fontSize:12, onClick: () => { this.scene.start('GameScene'); } });

    const ev = this.gs.collectedEvidence.length;
    const cn = this.gs.contradictionsTriggered.length;
    this.add.text(940, 600, `EVIDENCE ${String(ev).padStart(2,'0')}/16  ·  CONTRADICTIONS ${cn}/05`, {
      fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2
    }).setOrigin(1,0.5);

    this.cameras.main.fadeIn(280, 10, 10, 15);
  }
}

// ENDINGSCENE
// =========================================================
class EndingScene extends Phaser.Scene {
  constructor() { super('EndingScene'); }

  init(data) {
    this.accused = data && data.accused;
    this.correct = !!(data && data.correct);
    try { window.recordAccusation && window.recordAccusation(window.currentCase || window._postCaseId || 'unknown', this.accused || 'unknown', this.correct); } catch(e){}
  }

  create() {
    const gs = this.registry.get('gameState');
    this.cameras.main.setBackgroundColor(this.correct ? '#1a180d' : '#12110a');
    drawCanvasFrame(this);

    const grid = this.add.graphics();
    grid.lineStyle(1, this.correct ? 0x2e2918 : 0x1f1c12, 1);
    for (let x = 0; x <= 960; x += 40) { grid.beginPath(); grid.moveTo(x,0); grid.lineTo(x,640); grid.strokePath(); }
    for (let y = 0; y <= 640; y += 40) { grid.beginPath(); grid.moveTo(0,y); grid.lineTo(960,y); grid.strokePath(); }

    this.add.rectangle(0, 0, 960, 38, C.BG_PANEL, 1).setOrigin(0,0);
    this.add.rectangle(0, 38, 960, 1, C.ACCENT).setOrigin(0,0);
    this.add.text(20, 12, '// CASE FILE — VERDICT', { fontFamily: F.UI, fontSize:'14px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 });
    this.add.text(940, 12, this.correct ? '// CASE CLOSED' : '// CASE OPEN — UNRESOLVED', { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0);

    const verdict = this.correct ? 'CORRECT.' : 'INCORRECT.';
    const big = this.add.text(480, 130, verdict, { fontFamily: F.UI, fontSize:'90px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:10 }).setOrigin(0.5).setAlpha(0);
    this.tweens.add({ targets: big, alpha:1, duration:400 });
    const tw = big.width + 80, th = big.height + 30;
    const border = this.add.rectangle(480, 130, tw, th, 0x000000, 0).setOrigin(0.5).setStrokeStyle(3, C.ACCENT).setAlpha(0);
    this.tweens.add({ targets: border, alpha:1, duration:400 });
    drawAllCornerMarks(this, 480-tw/2, 130-th/2, tw, th, C.ACCENT, 22);

    this.add.text(480, 200, this.correct ? '// YOU SAW THE SHAPE OF IT.' : '// SOMEONE IS WALKING FREE.', { fontFamily: F.MONO, fontSize:'13px', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5);

    const cardX = 80, cardY = 250, cardW = 200, cardH = 280;
    this.add.rectangle(cardX, cardY, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
    drawAllCornerMarks(this, cardX, cardY, cardW, cardH, C.ACCENT, 16);
    const sus = SUSPECTS.find(s => s.id === this.accused) || SUSPECTS[0];

function drawCornerMarks(s, x, y, w, h, color, len) {
  len = len || 14;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  // top-left
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  // bottom-right
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawAllCornerMarks(s, x, y, w, h, color, len) {
  len = len || 16;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  // TL
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  // TR
  g.beginPath(); g.moveTo(x+w-len, y); g.lineTo(x+w, y); g.lineTo(x+w, y+len); g.strokePath();
  // BL
  g.beginPath(); g.moveTo(x, y+h-len); g.lineTo(x, y+h); g.lineTo(x+len, y+h); g.strokePath();
  // BR
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawCanvasFrame(s) {
  const g = s.add.graphics();
  g.lineStyle(2, C.ACCENT, 1);
  g.strokeRect(1, 1, 958, 638);
  g.setDepth(9999);
  // big corner marks at canvas corners
  const len = 22;
  const cg = s.add.graphics();
  cg.lineStyle(3, C.ACCENT, 1);
  cg.beginPath(); cg.moveTo(0, len); cg.lineTo(0, 0); cg.lineTo(len, 0); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 0); cg.lineTo(960, 0); cg.lineTo(960, len); cg.strokePath();
  cg.beginPath(); cg.moveTo(0, 640-len); cg.lineTo(0, 640); cg.lineTo(len, 640); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 640); cg.lineTo(960, 640); cg.lineTo(960, 640-len); cg.strokePath();
  cg.setDepth(9999);
  return [g, cg];
}

function makeButton(s, x, y, w, h, label, opts) {
  opts = opts || {};
  const fontSize = opts.fontSize || 14;
  const cont = s.add.container(x, y);
  const bg = s.add.rectangle(0, 0, w, h, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
  const txt = s.add.text(w/2, h/2, label, {
    fontFamily: F.UI, fontSize: fontSize+'px', fontStyle:'600',
    color: C.ACCENT_S
  }).setOrigin(0.5);
  cont.add([bg, txt]);
  bg.setInteractive({ useHandCursor:true });
  bg.on('pointerover', () => { bg.setFillStyle(C.ACCENT, 1); txt.setColor(C.BG_DEEP_S); });
  bg.on('pointerout',  () => { bg.setFillStyle(C.BG_PANEL, 1); txt.setColor(C.ACCENT_S); });
  if (opts.onClick) bg.on('pointerdown', opts.onClick);
  cont.bg = bg; cont.txt = txt;
  return cont;
}

// =========================================================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  create() {
    this.bakeBackgrounds();
    this.bakeUIBits();
    this.loadPortraits();
  }

  // ---- portrait loading via base64 with fallback ----
  loadPortraits() {
    const keys = Object.keys(PORTRAITS);
    const toLoad = [];

    keys.forEach(key => {
      const data = PORTRAITS[key];
      if (!data) {
        this.generateFallbackPortrait(key);
      } else {
        toLoad.push(key);
      }
    });

    if (toLoad.length === 0) {
      this.scene.start('IntroScene');
      return;
    }

    let loaded = 0;
    toLoad.forEach(key => {
      this.textures.once('addtexture-' + key, () => {
        loaded++;
        if (loaded === toLoad.length) {
          this.scene.start('IntroScene');
        }
      });
      this.textures.addBase64(key, PORTRAITS[key]);
    });
  }

  generateFallbackPortrait(key) {
    const fallbackColors = {
      portrait_protagonist: { bg: 0x1c1414, accent: C.ACCENT },
      portrait_the_director:      { bg: 0x2a1a1a, accent: 0xa06a6a },
      portrait_the_gunman:       { bg: 0x1a1210, accent: 0x8b5e3c },
      portrait_the_understudy:      { bg: 0x1a1210, accent: 0xbd5a5a },
      portrait_the_manager:       { bg: 0x1a1410, accent: 0xc4802a },
      portrait_the_stagehand:       { bg: 0x1a1414, accent: 0x7a4040 },
      portrait_mystery:     { bg: 0x1a1210, accent: 0xe87ca0 }
    };
    const fc = fallbackColors[key] || { bg: 0x1c1414, accent: C.ACCENT };
    const labelMap = {
      'portrait_the_director':  'THE DIRECTOR',
      'portrait_the_gunman':    'THE GUNMAN',
      'portrait_the_understudy':'THE UNDERSTUDY',
      'portrait_the_manager':   'THE MANAGER',
      'portrait_the_stagehand': 'THE STAGEHAND',
      'portrait_protagonist':   '',
      'portrait_mystery':       '???'
    };
    const name = labelMap[key] !== undefined ? labelMap[key] : key.replace('portrait_', '').replace(/_/g, ' ').toUpperCase();
    const W = 160, H = 200;

    const rt = this.add.renderTexture(0, 0, W, H).setVisible(false);
    rt.fill(fc.bg);

    const g = this.add.graphics();
    g.lineStyle(2, fc.accent, 1);
    g.strokeRect(2, 2, W - 4, H - 4);
    if (key === 'portrait_protagonist') {
      g.fillStyle(0x0a0505, 1);
      g.fillEllipse(W / 2, 70, 60, 68);
      g.lineStyle(2, C.ACCENT, 0.6);
      g.strokeEllipse(W / 2, 70, 60, 68);
      g.fillStyle(0x0a0505, 1);
      g.beginPath();
      g.moveTo(20, H); g.lineTo(42, 120); g.lineTo(W - 42, 120); g.lineTo(W - 20, H);
      g.closePath(); g.fillPath();
      g.lineStyle(2, C.ACCENT, 0.6); g.strokePath();
      g.fillStyle(C.ACCENT, 0.6);
      g.fillCircle(64, 70, 2); g.fillCircle(96, 70, 2);
    } else {
      g.fillStyle(fc.accent, 0.2);
      g.fillCircle(W / 2, 60, 28);
      g.beginPath();
      g.moveTo(35, H); g.lineTo(50, 110); g.lineTo(W - 50, 110); g.lineTo(W - 35, H);
      g.closePath(); g.fillPath();
    }
    rt.draw(g);
    g.destroy();

    if (name) {
      const txt = this.add.text(W / 2, H - 24, name, {
      fontFamily: F.UI, fontSize: '14px', fontStyle: '700',
      color: '#' + fc.accent.toString(16).padStart(6, '0'), letterSpacing: 2
    }).setOrigin(0.5);
    rt.draw(txt);
    txt.destroy();
    }

    rt.saveTexture(key);
    rt.destroy();
  }

  // ---- helpers
  mg() { return this.make.graphics({ add:false }); }

  bakeUIBits() {
    // simple diamond hotspot icon (drawn live in scene; nothing to bake)
  }

  // -------- ROOM BACKGROUNDS --------
  bakeBackgrounds() {
    this.bakeBackstageLeft();
    this.bakeStage();
    this.bakeBridge();
    this.bakeBackstageRight();
  }

  // ---- BACKSTAGE LEFT (formerly Gatehouse)
  bakeBackstageLeft() {
    const W = 960, H = 640;
    const g = this.mg();
    // back wall
    g.fillStyle(0x160e0e, 1); g.fillRect(0, 0, W, 380);
    // floor
    g.fillStyle(0x1c1414, 1); g.fillRect(0, 380, W, 260);
    // perspective grid lines on floor
    g.lineStyle(1, 0x261c1c, 1);
    for (let i = 0; i < 10; i++) {
      const y = 400 + i * 28;
      g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.strokePath();
    }
    // stage door centred-back-right
    const gx = 600, gy = 60, gw = 320, gh = 320;
    g.fillStyle(0x100808, 1); g.fillRect(gx, gy, gw, gh);
    // light slit under door
    g.fillStyle(0xdf9a9a, 0.18); g.fillRect(gx, gy+gh-10, gw, 10);
    // door panels
    g.lineStyle(4, 0x261c1c, 1);
    g.strokeRect(gx+20, gy+20, gw-40, gh-40);
    g.strokeRect(gx+40, gy+40, gw-80, gh/2-60);
    g.strokeRect(gx+40, gy+gh/2+20, gw-80, gh/2-60);
    
    // horizontal beams
    g.lineStyle(3, 0x261c1c, 1);
    g.strokeRect(gx, gy, gw, gh);

    // door light shaft on floor
    g.fillStyle(0xdf9a9a, 0.06);
    g.fillTriangle(gx, gy+gh, gx+gw, gy+gh, W*0.55, H);

    // wall divider lines
    g.lineStyle(1, 0x261c1c, 1);
    g.beginPath(); g.moveTo(0, 380); g.lineTo(W, 380); g.strokePath();
    g.beginPath(); g.moveTo(0, 100); g.lineTo(W, 100); g.strokePath();

    // === PROP BIN (formerly cake) ===
    g.fillStyle(0x342a2a, 1); g.fillRect(150, 410, 150, 14);
    g.fillStyle(0x221a1a, 1); g.fillRect(150, 424, 150, 4);
    // wheels
    g.fillStyle(0x0f0a0a, 1);
    g.fillCircle(170, 440, 14); g.fillCircle(280, 440, 14);
    g.lineStyle(2, 0x342a2a, 1);
    g.strokeCircle(170, 440, 14); g.strokeCircle(280, 440, 14);
    // Bin box
    g.fillStyle(0x261c1c, 1); g.fillRect(160, 260, 130, 150);
    g.lineStyle(2, 0x14141c, 1); g.strokeRect(160, 260, 130, 150);
    // Red discarded switch wire
    g.lineStyle(3, C.ACCENT, 1);
    g.beginPath(); g.moveTo(225, 250); g.lineTo(245, 280); g.strokePath();
    g.fillStyle(C.RED, 0.85); g.fillCircle(245, 280, 4);

    // === FLIGHT CASES (formerly coffins) ===
    const cof = [
      { x:790, y:200, w:160, h:55 },
      { x:790, y:260, w:160, h:55 },
      { x:790, y:320, w:160, h:55 }
    ];
    cof.forEach((b, i) => {
      // rectangular trunk shape
      g.fillStyle(0x22171f, 1);
      g.fillRect(b.x, b.y, b.w, b.h);
      g.lineStyle(1, 0x301f2a, 1); g.strokeRect(b.x, b.y, b.w, b.h);
      // accent stripe
      g.lineStyle(2, C.ACCENT, 0.4);
      g.beginPath(); g.moveTo(b.x+20, b.y+10); g.lineTo(b.x+20, b.y+b.h-10); g.strokePath();
      g.beginPath(); g.moveTo(b.x+b.w-20, b.y+10); g.lineTo(b.x+b.w-20, b.y+b.h-10); g.strokePath();
    });

    // === GUN CASE (formerly wheelbarrow) ===
    g.fillStyle(0x342a2a, 1);
    g.beginPath();
    g.moveTo(540, 440); g.lineTo(700, 440);
    g.lineTo(680, 460); g.lineTo(560, 460); g.closePath();
    g.fillPath();
    g.lineStyle(1, 0x1c1414, 1); g.strokePath();
    // open lid
    g.fillStyle(0x2a2222, 1);
    g.beginPath();
    g.moveTo(540, 440); g.lineTo(700, 440);
    g.lineTo(720, 410); g.lineTo(560, 410); g.closePath();
    g.fillPath();

    // === THE REPLICA on floor ===
    g.lineStyle(3, C.MUTE, 1);
    g.beginPath(); g.moveTo(380, 535); g.lineTo(410, 535); g.strokePath();
    g.fillStyle(C.ACCENT, 0.7);
    g.fillRect(375, 535, 10, 15);

    g.generateTexture('bg_backstage_left', W, H);
    g.destroy();
  }

  // ---- THE STAGE (formerly Infirmary)
  bakeStage() {
    const W = 960, H = 640;
    const g = this.mg();
    // walls
    g.fillStyle(0x342a2a, 1); g.fillRect(0, 0, W, 380);
    // floor
    g.fillStyle(0x3d3333, 1); g.fillRect(0, 380, W, 260);
    // tile grid floor
    g.lineStyle(1, 0x4a4040, 1);
    for (let x = 0; x <= W; x += 60) {
      g.beginPath(); g.moveTo(x, 380); g.lineTo(x, H); g.strokePath();
    }
    for (let y = 380; y <= H; y += 30) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.strokePath();
    }
    // ceiling tiles top
    g.fillStyle(0x3c3232, 1); g.fillRect(0, 0, W, 70);
    g.lineStyle(1, 0x4e4444, 1);
    for (let x = 0; x <= W; x += 80) {
      g.beginPath(); g.moveTo(x, 0); g.lineTo(x, 70); g.strokePath();
    }
    g.beginPath(); g.moveTo(0, 35); g.lineTo(W, 35); g.strokePath();
    g.beginPath(); g.moveTo(0, 70); g.lineTo(W, 70); g.strokePath();

    // overhead spotlight cone
    g.fillStyle(0xf0eaea, 0.07);
    g.fillTriangle(440, 70, 520, 70, 700, 380);
    g.fillTriangle(440, 70, 520, 70, 260, 380);

    // wall division line
    g.lineStyle(1, 0x4a4040, 1);
    g.beginPath(); g.moveTo(0, 380); g.lineTo(W, 380); g.strokePath();

    // Sofa (upright center bed replacement)
    g.fillStyle(0x544a4a, 1); g.fillRect(420, 340, 140, 80);
    g.lineStyle(2, C.ACCENT, 0.5); g.strokeRect(420, 340, 140, 80);
    // Cushions
    g.fillStyle(0x746a6a, 1); g.fillRect(430, 348, 50, 40);
    g.fillStyle(0x746a6a, 1); g.fillRect(490, 348, 50, 40);
    
    // Set dressing (overturned chairs)
    const drawChair = (x, y, w, h, tilt, frame) => {
      g.save();
      const cx = x+w/2, cy = y+h/2;
      const cos = Math.cos(tilt), sin = Math.sin(tilt);
      const corners = [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]];
      const tp = corners.map(([dx,dy]) => [cx+dx*cos-dy*sin, cy+dx*sin+dy*cos]);
      g.fillStyle(frame, 1);
      g.beginPath();
      g.moveTo(tp[0][0], tp[0][1]);
      for (let i = 1; i < tp.length; i++) g.lineTo(tp[i][0], tp[i][1]);
      g.closePath(); g.fillPath();
      g.lineStyle(1, 0x1c1414, 1);
      g.strokePath();
      g.restore && g.restore();
    };
    drawChair(120, 530, 60, 60, 0.6, 0x443a3a);
    drawChair(720, 540, 60, 60, -0.5, 0x443a3a);

    // Starry Night Painting Frame (formerly medicine cabinet)
    g.fillStyle(0x261c1c, 1); g.fillRect(240, 150, 120, 90);
    g.lineStyle(4, 0x8b5e3c, 1); g.strokeRect(240, 150, 120, 90); // wooden frame
    g.fillStyle(C.BG_DEEP, 1); g.fillCircle(300, 195, 6); // bullet hole

    // stage dressing on floor (shattered prop glass / papers)
    [
      [220, 510, 0xede8e8], [260, 530, C.ACCENT_D], [340, 540, 0xede8e8],
      [400, 525, 0xede8e8], [180, 490, 0xede8e8], [310, 500, C.ACCENT_D]
    ].forEach(([x, y, c]) => {
      g.fillStyle(c, 0.9); g.fillRect(x, y, 14, 8);
      g.lineStyle(1, 0x1c1414, 1); g.strokeRect(x, y, 14, 8);
    });

    // set door right side
    g.fillStyle(0x261c1c, 1); g.fillRect(870, 230, 60, 150);
    g.lineStyle(2, C.ACCENT, 0.6); g.strokeRect(870, 230, 60, 150);
    g.fillStyle(C.ACCENT, 0.8); g.fillCircle(920, 305, 4);

    g.generateTexture('bg_the_stage', W, H);
    g.destroy();
  }

  // ---- LIGHTING BRIDGE (formerly Office)
  bakeBridge() {
    const W = 960, H = 640;
    const g = this.mg();
    // walls
    g.fillStyle(0x1e1616, 1); g.fillRect(0, 0, W, 400);
    // floor (metal grating/walkway)
    g.fillStyle(0x181a1f, 1); g.fillRect(0, 400, W, 240);
    g.lineStyle(1, 0x0f1114, 1);
    for (let y = 410; y <= H; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.strokePath();
    }
    g.lineStyle(2, C.ACCENT, 0.3);
    g.beginPath(); g.moveTo(0, 400); g.lineTo(W, 400); g.strokePath();

    // rack cabinets left side
    const drawCab = (x, y) => {
      g.fillStyle(0x261c1c, 1); g.fillRect(x, y, 110, 200);
      g.lineStyle(2, C.MUTE, 1); g.strokeRect(x, y, 110, 200);
      for (let i = 0; i < 4; i++) {
        const dy = y + 8 + i*48;
        g.fillStyle(0x302222, 1); g.fillRect(x+6, dy, 98, 42);
        g.lineStyle(1, 0x3e3434, 1); g.strokeRect(x+6, dy, 98, 42);
        g.fillStyle(C.ACCENT, 0.7); g.fillRect(x+45, dy+18, 20, 4);
      }
    };
    drawCab(40, 180);
    drawCab(155, 180);
    drawCab(820, 180);

    // lighting console center
    const dx = 320, dy = 320, dw = 360, dh = 80;
    g.fillStyle(0x2a1c1c, 1); g.fillRect(dx, dy, dw, dh);
    g.lineStyle(2, C.ACCENT, 0.5); g.strokeRect(dx, dy, dw, dh);
    // sliders
    g.fillStyle(0x1a0d0d, 1);
    for (let i=0; i<10; i++) {
      g.fillRect(dx + 20 + i*30, dy + 10, 8, 60);
      g.fillStyle(C.LIGHT, 0.8); g.fillRect(dx + 18 + i*30, dy + 40, 12, 6); g.fillStyle(0x1a0d0d, 1);
    }
    // monitor on console
    g.fillStyle(0x0f0a0a, 1); g.fillRect(440, 230, 180, 110);
    g.lineStyle(2, C.MUTE, 1); g.strokeRect(440, 230, 180, 110);
    g.fillStyle(0x5a1a1a, 1); g.fillRect(450, 240, 160, 90);
    g.fillStyle(0x8a2a2a, 0.8); g.fillCircle(530, 285, 22);
    g.fillStyle(0x1c1414, 1); g.fillCircle(530, 285, 12);
    g.lineStyle(2, 0xd86a6a, 1); g.strokeCircle(530, 285, 18);
    // monitor stand
    g.fillStyle(0x261c1c, 1); g.fillRect(520, 340, 20, 14);
    g.fillRect(490, 354, 80, 6);
    // red glow halo behind monitor
    g.fillStyle(0xb84a4a, 0.08); g.fillRect(380, 200, 300, 180);

    // warm lamp cone on console
    g.fillStyle(0xf07878, 0.10);
    g.fillTriangle(500, 200, 380, 400, 620, 400);

    // scripts scattered
    [[345, 332, 30, 18], [405, 333, 22, 14], [675, 330, 30, 16]].forEach(([x,y,w,h]) => {
      g.fillStyle(0xede8e8, 0.95); g.fillRect(x, y, w, h);
      g.lineStyle(1, C.MUTE, 0.6); g.strokeRect(x, y, w, h);
    });

    g.generateTexture('bg_bridge', W, H);
    g.destroy();
  }

  // ---- BACKSTAGE RIGHT (formerly Morgue)
  bakeBackstageRight() {
    const W = 960, H = 640;
    const g = this.mg();
    // walls 
    g.fillStyle(0x261c1c, 1); g.fillRect(0, 0, W, 380);
    // floor 
    g.fillStyle(0x2e2626, 1); g.fillRect(0, 380, W, 260);
    g.lineStyle(1, 0x3a3030, 1);
    for (let x = 0; x <= W; x += 60) {
      g.beginPath(); g.moveTo(x, 380); g.lineTo(x, H); g.strokePath();
    }
    for (let y = 380; y <= H; y += 30) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.strokePath();
    }
    // overhead light cone
    g.fillStyle(0xe4c8c8, 0.10);
    g.fillTriangle(440, 0, 520, 0, 700, 380);
    g.fillTriangle(440, 0, 520, 0, 260, 380);

    // lockers back wall
    const sx = 70, sy = 100, dw = 90, dh = 90, gap = 8;
    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < 8; col++) {
        const x = sx + col*(dw+gap);
        const y = sy + row*(dh+gap);
        const open = (col % 2 === 0) || (col === 5);
        g.fillStyle(0x342a2a, 1); g.fillRect(x, y, dw, dh);
        g.lineStyle(2, open ? C.ACCENT : C.MUTE, open ? 1 : 0.7);
        g.strokeRect(x, y, dw, dh);
        g.fillStyle(open ? 0x1c1414 : 0x261c1c, 1);
        g.fillRect(x+8, y+8, dw-16, dh-16);
        g.fillStyle(C.LIGHT, 0.7); g.fillRect(x+dw-22, y+dh/2-3, 12, 6);
        if (open) {
          g.fillStyle(C.ACCENT, 0.4);
          g.fillRect(x+12, y+dh-22, dw-24, 8);
        }
      }
    }

    // work table center
    g.fillStyle(0x443a3a, 1); g.fillRect(395, 440, 170, 50);
    g.lineStyle(2, C.ACCENT, 0.7); g.strokeRect(395, 440, 170, 50);
    g.fillStyle(0x1c1414, 1);
    g.fillRect(400, 490, 8, 50); g.fillRect(556, 490, 8, 50);

    // oil trail on back wall and floor
    g.lineStyle(12, 0x0f0a0a, 0.85);
    g.beginPath(); g.moveTo(850, 320); g.lineTo(750, 280); g.strokePath();

    // Ladder up to lighting bridge (left side)
    const ldX = 175, ldY = 60, ldH = 380, ldW = 60;
    // rails
    g.lineStyle(6, 0x6b5a3a, 1);
    g.beginPath(); g.moveTo(ldX, ldY); g.lineTo(ldX, ldY + ldH); g.strokePath();
    g.beginPath(); g.moveTo(ldX + ldW, ldY); g.lineTo(ldX + ldW, ldY + ldH); g.strokePath();
    // rungs
    g.lineStyle(5, 0x8a7548, 1);
    for (let ry = ldY + 25; ry < ldY + ldH; ry += 36) {
      g.beginPath(); g.moveTo(ldX, ry); g.lineTo(ldX + ldW, ry); g.strokePath();
    }
    // shadow side highlight
    g.lineStyle(2, 0x3a2f1c, 1);
    g.beginPath(); g.moveTo(ldX + ldW - 2, ldY); g.lineTo(ldX + ldW - 2, ldY + ldH); g.strokePath();
    // foot at floor
    g.fillStyle(0x4a3d24, 1); g.fillRect(ldX - 4, ldY + ldH, ldW + 8, 6);

    g.generateTexture('bg_backstage_right', W, H);
    g.destroy();
  }

}

  create() {
    this.registry.set('gameState', {
      currentRoom: 'backstage_left',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    }); this.registry.set('initialGameState', {
      currentRoom: 'backstage_left',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],

    this.cameras.main.setBackgroundColor('#100a0a');
    drawCanvasFrame(this);

    this.panelIndex = 0;
    this.advancing = false;
    this.layer = this.add.container(0, 0);

    this.input.keyboard.on('keydown-SPACE', () => this.advance());
