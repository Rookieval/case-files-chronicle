// =========================================================
class AccusationScene extends Phaser.Scene {
  constructor() { super('AccusationScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'accusation';
    this.cameras.main.setBackgroundColor('#0d0514');

    const grid = this.add.graphics();
    grid.lineStyle(1, 0x261645, 1);
    for (let x = 0; x <= 960; x += 40) { grid.beginPath(); grid.moveTo(x,0); grid.lineTo(x,640); grid.strokePath(); }
    for (let y = 0; y <= 640; y += 40) { grid.beginPath(); grid.moveTo(0,y); grid.lineTo(960,y); grid.strokePath(); }
    const diag = this.add.graphics();
    diag.lineStyle(1, C.ACCENT, 0.3);
    diag.beginPath(); diag.moveTo(0, 80); diag.lineTo(80, 0); diag.strokePath();
    diag.beginPath(); diag.moveTo(960, 80); diag.lineTo(880, 0); diag.strokePath();

    drawCanvasFrame(this);

    this.add.rectangle(0, 0, 960, 56, C.BG_PANEL, 1).setOrigin(0,0);
    this.add.rectangle(0, 56, 960, 2, C.ACCENT).setOrigin(0,0);
    this.add.text(20, 18, '// FINAL ACCUSATION', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 });
    
    this.add.text(940, 18, '// CASE: THE VOID CASE · CLOSE THE LOOP', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0);

    this.add.text(480, 110, 'WHO IS THE MASTERMIND?', { fontFamily: F.UI, fontSize:'42px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:6 }).setOrigin(0.5);
    this.add.rectangle(480, 142, 380, 3, C.ACCENT).setOrigin(0.5);
    this.add.text(480, 168, 'select one. there is no second guess.', { fontFamily: F.MONO, fontSize:'13px', color:C.MUTE_S, letterSpacing:2, fontStyle:'italic' }).setOrigin(0.5);

    const cardW = 160, cardH = 280, gap = 20;
    const totalW = 5*cardW + 4*gap;
    const startX = (960 - totalW) / 2;
    const y = 220;

    (function(arr){ for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; })([...SUSPECTS]).forEach((sus, i) => {
      const x = startX + i*(cardW+gap);
      const card = this.add.container(x, y);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.MUTE);
      const portBg = this.add.rectangle(8, 8, cardW-16, 200, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT, 0.7);
      const port = this.add.image(cardW/2, 108, sus.portrait).setOrigin(0.5).setDisplaySize(cardW-20, 196);
      const numTag = this.add.text(14, 18, '0' + (i+1), { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 });
      const name = this.add.text(cardW/2, 226, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:5 }).setOrigin(0.5);
      const div = this.add.rectangle(cardW/2, 248, 60, 1, C.ACCENT).setOrigin(0.5);
      const action = this.add.text(cardW/2, 264, '> ACCUSE', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:3 }).setOrigin(0.5);
      const corners = drawAllCornerMarks(this, x+4, y+4, cardW-8, cardH-8, C.ACCENT, 14);
      corners.setAlpha(0);

      card.add([bg, portBg, port, numTag, name, div, action]);
      bg.setInteractive({ useHandCursor:true });
      bg.on('pointerover', () => {
        bg.setStrokeStyle(2, C.ACCENT); action.setColor(C.ACCENT_S); corners.setAlpha(1);
        this.tweens.add({ targets: card, scaleX:1.05, scaleY:1.05, x: x - cardW*0.025, y: y - cardH*0.025, duration:140 });
      });
      bg.on('pointerout', () => {
        bg.setStrokeStyle(2, C.MUTE); action.setColor(C.ACCENT_S); corners.setAlpha(0);
        this.tweens.add({ targets: card, scaleX:1, scaleY:1, x, y, duration:140 });
      });
      bg.on('pointerdown', () => {
        bg.disableInteractive();
        this.cameras.main.flash(180, 179, 102, 255);
        this.cameras.main.fadeOut(360, 10, 10, 15);
        this.cameras.main.once('camerafadeoutcomplete', () => {
          this.scene.start('EndingScene', { accused: sus.id, correct: sus.correct });
        });
      });
    });

    const back = makeButton(this, 20, 590, 140, 30, '← BACK', { fontSize:12, onClick: () => { this.scene.start('GameScene'); } });

    const ev = this.gs.collectedEvidence.length;
    const cn = this.gs.contradictionsTriggered.length;

// =========================================================

// =========================================================
function drawCornerMarks(s, x, y, w, h, color, len) {
  len = len || 14;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawAllCornerMarks(s, x, y, w, h, color, len) {
  len = len || 16;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y); g.lineTo(x+w, y); g.lineTo(x+w, y+len); g.strokePath();
  g.beginPath(); g.moveTo(x, y+h-len); g.lineTo(x, y+h); g.lineTo(x+len, y+h); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawCanvasFrame(s) {
  const g = s.add.graphics();
  g.lineStyle(2, C.ACCENT, 1);
  g.strokeRect(1, 1, 958, 638);
  g.setDepth(9999);
  const len = 22;
  const cg = s.add.graphics();
  cg.lineStyle(3, C.ACCENT, 1);
  cg.beginPath(); cg.moveTo(0, len); cg.lineTo(0, 0); cg.lineTo(len, 0); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 0); cg.lineTo(960, 0); cg.lineTo(960, len); cg.strokePath();
  cg.beginPath(); cg.moveTo(0, 640-len); cg.lineTo(0, 640); cg.lineTo(len, 640); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 640); cg.lineTo(960, 640); cg.lineTo(960, 640-len); cg.strokePath();
  cg.setDepth(9999);
  return [g, cg];
}

function makeButton(s, x, y, w, h, label, opts) {
  opts = opts || {};
  const fontSize = opts.fontSize || 14;
  const cont = s.add.container(x, y);
  const bg = s.add.rectangle(0, 0, w, h, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
  const txt = s.add.text(w/2, h/2, label, {
    fontFamily: F.UI, fontSize: fontSize+'px', fontStyle:'600',
    color: C.ACCENT_S
  }).setOrigin(0.5);
  cont.add([bg, txt]);
  bg.setInteractive({ useHandCursor:true });
  bg.on('pointerover', () => { bg.setFillStyle(C.ACCENT, 1); txt.setColor(C.BG_DEEP_S); });
  bg.on('pointerout',  () => { bg.setFillStyle(C.BG_PANEL, 1); txt.setColor(C.ACCENT_S); });
  if (opts.onClick) bg.on('pointerdown', opts.onClick);
  cont.bg = bg; cont.txt = txt;
  return cont;
}

// =========================================================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  create() {
    this.bakeBackgrounds();
    this.loadPortraits();
  }

  loadPortraits() {
    const keys = Object.keys(PORTRAITS);
    const toLoad = [];

    keys.forEach(key => {
      const data = PORTRAITS[key];
      if (!data) this.generateFallbackPortrait(key);
      else toLoad.push(key);
    });

    if (toLoad.length === 0) {
      this.scene.start('IntroScene');
      return;
    }

    let loaded = 0;
    toLoad.forEach(key => {
      this.textures.once('addtexture-' + key, () => {
        loaded++;
        if (loaded === toLoad.length) this.scene.start('IntroScene');
      });
      this.textures.addBase64(key, PORTRAITS[key]);
    });
  }

  generateFallbackPortrait(key) {
    const fallbackColors = {
      portrait_protagonist:  { bg: 0x0a1a10, accent: C.ACCENT },
      portrait_suspect:      { bg: 0x1a2a20, accent: 0x66ff99 },
      portrait_photographer: { bg: 0x102018, accent: 0x33cc66 },
      portrait_assistant:    { bg: 0x0a150e, accent: 0x4dd279 },
      portrait_launderer:    { bg: 0x142b1d, accent: 0x5cd685 },
      portrait_sleeper:      { bg: 0x112217, accent: 0x7ae09e },
      portrait_mystery:      { bg: 0x0f1a12, accent: 0xa8f0bd }
    };
    const fc = fallbackColors[key] || { bg: 0x0a1a10, accent: C.ACCENT };
    const labelMap = {
      'portrait_the_director':  'THE DIRECTOR',
      'portrait_the_gunman':    'THE GUNMAN',
      'portrait_the_understudy':'THE UNDERSTUDY',
      'portrait_the_manager':   'THE MANAGER',
      'portrait_the_stagehand': 'THE STAGEHAND',
      'portrait_protagonist':   '',
      'portrait_mystery':       '???'
    };
    const name = labelMap[key] !== undefined ? labelMap[key] : key.replace('portrait_', '').replace(/_/g, ' ').toUpperCase();
    const W = 160, H = 200;

    const rt = this.add.renderTexture(0, 0, W, H).setVisible(false);
    rt.fill(fc.bg);

    const g = this.add.graphics();
    g.lineStyle(2, fc.accent, 1);
    g.strokeRect(2, 2, W - 4, H - 4);
    if (key === 'portrait_protagonist') {
      g.fillStyle(0x05100a, 1);
      g.fillEllipse(W / 2, 70, 60, 68);
      g.lineStyle(2, C.ACCENT, 0.6);
      g.strokeEllipse(W / 2, 70, 60, 68);
      g.fillStyle(0x05100a, 1);
      g.beginPath();
      g.moveTo(20, H); g.lineTo(42, 120); g.lineTo(W - 42, 120); g.lineTo(W - 20, H);
      g.closePath(); g.fillPath();
      g.lineStyle(2, C.ACCENT, 0.6); g.strokePath();
      g.fillStyle(C.ACCENT, 0.6);
      g.fillCircle(64, 70, 2); g.fillCircle(96, 70, 2);
    } else {
      g.fillStyle(fc.accent, 0.2);
      g.fillCircle(W / 2, 60, 28);
      g.beginPath();
      g.moveTo(35, H); g.lineTo(50, 110); g.lineTo(W - 50, 110); g.lineTo(W - 35, H);
      g.closePath(); g.fillPath();
    }
    rt.draw(g);
    g.destroy();

    if (name) {
      const txt = this.add.text(W / 2, H - 24, name, {
      fontFamily: F.UI, fontSize: '14px', fontStyle: '700',
      color: '#' + fc.accent.toString(16).padStart(6, '0'), letterSpacing: 2
    }).setOrigin(0.5);
    rt.draw(txt);
    txt.destroy();
    }

    rt.saveTexture(key);
    rt.destroy();
  }

  mg() { return this.make.graphics({ add:false }); }

  bakeBackgrounds() {
    this.bakeHallway();
    this.bakeSauna();
    this.bakeKitchen();
    this.bakeDining();
  }

  // ---- HALLWAY (Sleeper Car)
  bakeHallway() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Deep green/blue hallway feel
    g.fillStyle(0x081510, 1); g.fillRect(0, 0, W, H);
    
    // Perspective lines for corridor
    g.lineStyle(2, 0x102618, 1);
    g.beginPath(); g.moveTo(0, 0); g.lineTo(380, 220); g.strokePath();
    g.beginPath(); g.moveTo(W, 0); g.lineTo(580, 220); g.strokePath();
    g.beginPath(); g.moveTo(0, H); g.lineTo(380, 420); g.strokePath();
    g.beginPath(); g.moveTo(W, H); g.lineTo(580, 420); g.strokePath();
    
    // End wall
    g.fillStyle(0x0a1a10, 1); g.fillRect(380, 220, 200, 200);
    g.lineStyle(2, C.ACCENT, 0.3); g.strokeRect(380, 220, 200, 200);
    
    // Doors on sides
    g.fillStyle(0x102618, 1);
    g.fillRect(100, 180, 120, 320); g.strokeRect(100, 180, 120, 320);
    g.fillRect(740, 180, 120, 320); g.strokeRect(740, 180, 120, 320);
    
    // Hallway Camera on ceiling
    g.fillStyle(0x1a3322, 1); g.fillRect(450, 40, 60, 40);
    g.lineStyle(2, C.ACCENT, 0.8); g.strokeRect(450, 40, 60, 40);
    g.fillStyle(0x000000, 1); g.fillCircle(480, 60, 12);
    // Intervalometer blinking light
    g.fillStyle(0xff5566, 1); g.fillCircle(500, 50, 3);
    
    // Laundry Chute
    g.fillStyle(0x05100a, 1); g.fillRect(200, 350, 80, 80);
    g.lineStyle(2, C.MUTE, 1); g.strokeRect(200, 350, 80, 80);
    g.lineStyle(1, C.ACCENT, 0.5); g.beginPath(); g.moveTo(210, 390); g.lineTo(270, 390); g.strokePath();
    
    g.generateTexture('bg_hallway', W, H);
    g.destroy();
  }

  // ---- SAUNA (Spa & Sauna)
  bakeSauna() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Wooden slats wall
    g.fillStyle(0x141c14, 1); g.fillRect(0, 0, W, 400);
    g.lineStyle(1, 0x0a100a, 1);
    for(let x=0; x<=W; x+=25) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, 400); g.strokePath(); }
    
    // Sauna rocks/heater
    g.fillStyle(0x0a0f0a, 1); g.fillRect(80, 250, 150, 150);
    g.fillStyle(0xff4422, 0.2); g.fillRect(90, 260, 130, 40); // heat glow
    
    // Floor
    g.fillStyle(0x0f1a14, 1); g.fillRect(0, 400, W, 240);
    
    // Pool in center
    g.fillStyle(0x103020, 1); g.fillEllipse(480, 450, 400, 120);
    g.lineStyle(4, 0x204030, 1); g.strokeEllipse(480, 450, 400, 120);
    // Bloody water section
    g.fillStyle(0x801010, 0.6); g.fillEllipse(400, 450, 200, 90);
    
    // Pool cover partially deployed
    g.fillStyle(0x0a1510, 0.9); g.beginPath(); g.moveTo(280, 450); g.lineTo(480, 390); g.lineTo(480, 510); g.closePath(); g.fillPath();
    
    // Drag marks (longer, more visible blood trail)
    g.lineStyle(10, 0x801010, 0.85);
    g.beginPath(); g.moveTo(260, 560); g.lineTo(420, 460); g.strokePath();
    g.lineStyle(6, 0x4a0808, 0.7);
    g.beginPath(); g.moveTo(270, 555); g.lineTo(415, 465); g.strokePath();
    g.fillStyle(0x801010, 0.7); g.fillCircle(280, 555, 8); g.fillCircle(330, 525, 6); g.fillCircle(380, 490, 5);
    
    // Broken wheelchair right side (larger, clearer)
    // seat
    g.fillStyle(0x1a2620, 1); g.fillRect(700, 430, 90, 30);
    g.lineStyle(2, 0x4a5b50, 1); g.strokeRect(700, 430, 90, 30);
    // back rest tipped
    g.fillStyle(0x1a2620, 1); g.fillRect(680, 380, 20, 60);
    // wheels broken
    g.lineStyle(3, 0x0a100a, 1); g.strokeCircle(710, 490, 28); g.strokeCircle(780, 490, 28);
    // spokes broken
    g.lineStyle(2, 0x4a5b50, 1);
    g.beginPath(); g.moveTo(692, 478); g.lineTo(728, 502); g.strokePath();
    g.beginPath(); g.moveTo(710, 462); g.lineTo(710, 518); g.strokePath();
    g.beginPath(); g.moveTo(762, 478); g.lineTo(798, 502); g.strokePath();
    // bent crossbar
    g.lineStyle(3, 0x4a5b50, 1); g.beginPath(); g.moveTo(700, 460); g.lineTo(740, 470); g.lineTo(790, 460); g.strokePath();
    
    // Sauna camera (visible, beside the wheelchair on the floor)
    // body
    g.fillStyle(0x101814, 1); g.fillRect(800, 530, 60, 38);
    g.lineStyle(2, 0xa0b0a5, 1); g.strokeRect(800, 530, 60, 38);
    // lens
    g.fillStyle(0x05100a, 1); g.fillCircle(830, 549, 14);
    g.lineStyle(2, 0xc8d4cc, 1); g.strokeCircle(830, 549, 14);
    g.fillStyle(0x4a5b50, 1); g.fillCircle(830, 549, 8);
    // viewfinder hump
    g.fillStyle(0x101814, 1); g.fillRect(815, 520, 18, 10);
    // record dot
    g.fillStyle(0xff3344, 1); g.fillCircle(853, 538, 3);

    g.generateTexture('bg_sauna', W, H);
    g.destroy();
  }

  // ---- KITCHEN (Dining Car Kitchen)
  bakeKitchen() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Metallic walls
    g.fillStyle(0x121a15, 1); g.fillRect(0, 0, W, 350);
    // Metallic counter
    g.fillStyle(0x18261d, 1); g.fillRect(0, 350, W, 290);
    g.lineStyle(2, 0x2a3b2f, 1); g.beginPath(); g.moveTo(0, 350); g.lineTo(W, 350); g.strokePath();
    
    // Knife Cabinet on wall
    g.fillStyle(0x0a100c, 1); g.fillRect(300, 150, 150, 120);
    g.lineStyle(2, C.MUTE, 1); g.strokeRect(300, 150, 150, 120);
    // Knife slots
    g.fillStyle(0x1a261d, 1);
    for(let x=320; x<430; x+=20) { g.fillRect(x, 180, 6, 70); }
    // Cut nylon straps - hanging stubs on cabinet handles + cut pieces on floor below
    g.lineStyle(4, 0xc8d0c8, 1);
    g.beginPath(); g.moveTo(310, 270); g.lineTo(316, 295); g.strokePath();
    g.beginPath(); g.moveTo(440, 270); g.lineTo(434, 295); g.strokePath();
    // straps lying on counter floor (cut, frayed)
    g.lineStyle(5, 0xc8d0c8, 1);
    g.beginPath(); g.moveTo(300, 380); g.lineTo(360, 392); g.strokePath();
    g.beginPath(); g.moveTo(370, 395); g.lineTo(430, 388); g.strokePath();
    // frayed ends
    g.lineStyle(2, 0xa0a8a0, 1);
    g.beginPath(); g.moveTo(360, 392); g.lineTo(367, 388); g.moveTo(360, 392); g.lineTo(366, 396); g.strokePath();
    g.beginPath(); g.moveTo(370, 395); g.lineTo(363, 391); g.moveTo(370, 395); g.lineTo(363, 399); g.strokePath();
    
    // Camera on counter turned to wall (clearly a camera)
    // body
    g.fillStyle(0x101814, 1); g.fillRect(660, 290, 80, 50);
    g.lineStyle(2, 0xa0b0a5, 1); g.strokeRect(660, 290, 80, 50);
    // lens (facing left/wall)
    g.fillStyle(0x05100a, 1); g.fillCircle(660, 315, 16);
    g.lineStyle(2, 0xc8d4cc, 1); g.strokeCircle(660, 315, 16);
    g.fillStyle(0x2a3b2f, 1); g.fillCircle(660, 315, 9);
    // viewfinder hump on top
    g.fillStyle(0x101814, 1); g.fillRect(700, 280, 22, 12);
    // record indicator
    g.fillStyle(0xff3344, 1); g.fillCircle(732, 298, 3);
    
    // Trash bin on floor
    g.fillStyle(0x0a1510, 1); g.fillRect(180, 400, 80, 120);
    
    g.generateTexture('bg_kitchen', W, H);
    g.destroy();
  }

  // ---- DINING CAR
  bakeDining() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Plush dark green walls
    g.fillStyle(0x0a1a10, 1); g.fillRect(0, 0, W, 300);
    // Windows
    g.fillStyle(0x020503, 1);
    g.fillRect(50, 50, 200, 150); g.lineStyle(4, 0x102618, 1); g.strokeRect(50, 50, 200, 150);
    g.fillRect(350, 50, 200, 150); g.strokeRect(350, 50, 200, 150);
    g.fillRect(650, 50, 200, 150); g.strokeRect(650, 50, 200, 150);
    
    // Floor
    g.fillStyle(0x08120b, 1); g.fillRect(0, 300, W, 340);
    
    // Tables
    const drawTable = (tx, ty) => {
      g.fillStyle(0x102618, 1); g.fillEllipse(tx, ty, 180, 60);
      g.lineStyle(2, C.MUTE, 1); g.strokeEllipse(tx, ty, 180, 60);
      g.fillStyle(0x0a1a10, 1); g.fillRect(tx-10, ty, 20, 100); // leg
    };
    drawTable(250, 450);
    drawTable(700, 450);
    
    // Camera in upper corner (mounted on wall, clearly a camera)
    // mount
    g.fillStyle(0x2a3b2f, 1); g.fillRect(840, 80, 6, 30);
    // body
    g.fillStyle(0x101814, 1); g.fillRect(770, 110, 90, 56);
    g.lineStyle(2, 0xa0b0a5, 1); g.strokeRect(770, 110, 90, 56);
    // lens (pointing down-left into room)
    g.fillStyle(0x05100a, 1); g.fillCircle(770, 145, 18);
    g.lineStyle(2, 0xc8d4cc, 1); g.strokeCircle(770, 145, 18);
    g.fillStyle(0x2a3b2f, 1); g.fillCircle(770, 145, 10);
    // viewfinder hump
    g.fillStyle(0x101814, 1); g.fillRect(815, 100, 22, 12);
    // record indicator
    g.fillStyle(0xff3344, 1); g.fillCircle(848, 120, 3);

    g.generateTexture('bg_dining', W, H);
    g.destroy();
  }

}

// =========================================================
class IntroScene extends Phaser.Scene {
  constructor() { super('IntroScene'); }

  create() {
    this.registry.set('gameState', {
      currentRoom: 'hallway',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    }); this.registry.set('initialGameState', {
      currentRoom: 'hallway',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    });

    this.cameras.main.setBackgroundColor('#05100a');
    drawCanvasFrame(this);

    this.panelIndex = 0;
    this.advancing = false;
    this.layer = this.add.container(0, 0);

    this.input.keyboard.on('keydown-SPACE', () => this.advance());
    this.input.on('pointerdown', () => { if(Date.now() - (this.lastClick||0) < 300) return; this.lastClick = Date.now(); this.advance(); });

    this.showPanel();
  }

  clearLayer() { this.layer.removeAll(true); }

  showPanel() {
    this.clearLayer();
    const idx = this.panelIndex;

    if (idx === 1 || idx === 3) {
      const bg = this.add.image(480, 320, 'bg_sauna').setAlpha(0.35);
      this.layer.add(bg);
      const tint = this.add.rectangle(480, 320, 960, 640, 0x05100a, 0.65);
      this.layer.add(tint);
    }

    const px = 80, py = 100, pw = 800, ph = 440;
    const pBg = this.add.rectangle(px, py, pw, ph, 0x0a1a10, idx === 4 ? 1 : 0.92).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
    this.layer.add(pBg);
    this.layer.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 18));

    const stripText = `[ FILE ${String(idx+1).padStart(2,'0')} / 05 ]   ·   THE ATLANTIC WOLFFISH`;
    const strip = this.add.text(px+18, py+14, stripText, {
      fontFamily: F.MONO, fontSize:'12px', color:C.MUTE_S, letterSpacing:2
    });
    this.layer.add(strip);
    const stripLine = this.add.rectangle(px+18, py+34, pw-36, 1, C.ACCENT).setOrigin(0,0);
    this.layer.add(stripLine);

    if (idx === 0) {
      this.layer.add(this.add.text(480, 240, 'THE SPA IS A CRIME SCENE.', {
        fontFamily: F.UI, fontSize:'56px', fontStyle:'700', color:C.LIGHT_S
      }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 290, 220, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 340, 'Blood mixing with the sauna pool.', {
        fontFamily: F.MONO, fontSize:'18px', color:C.MUTE_S
      }).setOrigin(0.5));
    }
    else if (idx === 1) {
      this.layer.add(this.add.text(480, 240, 'CAUGHT ON CAMERA.', {
        fontFamily: F.UI, fontSize:'46px', fontStyle:'700', color:C.LIGHT_S
      }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 285, 200, 2, C.ACCENT).setOrigin(0.5));
      const lines = [
        '> automated cameras recorded everything.',
        '> the suspect claims self defense.',
        '> ...but the photos tell a different story.'
      ];
      lines.forEach((t, i) => {
        this.layer.add(this.add.text(280, 320 + i*32, t, {
          fontFamily: F.MONO, fontSize:'18px', color: i === 2 ? C.ACCENT_S : C.LIGHT_S
        }));
      });
    }
    else if (idx === 2) {
      const port = this.add.image(220, 320, 'portrait_protagonist').setOrigin(0.5).setDisplaySize(160, 200);
      this.layer.add(port);
      this.layer.add(this.add.rectangle(220, 320, 162, 202, 0x000000, 0).setOrigin(0.5).setStrokeStyle(2, C.ACCENT));
      this.layer.add(drawAllCornerMarks(this, 139, 219, 162, 202, C.ACCENT, 12));

      this.layer.add(this.add.text(340, 220, 'My name does not matter right now.', {
        fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic'
      }));
      this.layer.add(this.add.text(340, 270, 'The Victim is dead.', {
        fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic'
      }));
      this.layer.add(this.add.text(340, 320, 'Someone on this train', {
        fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic'
      }));
      this.layer.add(this.add.text(340, 348, 'engineered a massacre.', {
        fontFamily: F.MONO, fontSize:'17px', color:C.ACCENT_S, fontStyle:'italic'
      }));
    }
    else if (idx === 3) {
      this.layer.add(this.add.text(480, 240, 'LAST KNOWN LOCATION', {
        fontFamily: F.UI, fontSize:'30px', fontStyle:'700', color:C.MUTE_S, letterSpacing:4
      }).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'SLEEPER HALLWAY.', {
        fontFamily: F.UI, fontSize:'56px', fontStyle:'700', color:C.ACCENT_S
      }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 330, 280, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 370, 'That is where I start.', {
        fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic'
      }).setOrigin(0.5));
    }
    else if (idx === 4) {
      this.layer.add(this.add.text(480, 200, 'MURDER NEXT DOOR', {
        fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:6
      }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 250, 360, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'CASE FILE — THE ATLANTIC WOLFFISH CASE', {
        fontFamily: F.MONO, fontSize:'15px', color:C.MUTE_S, letterSpacing:2
      }).setOrigin(0.5));
      const btn = makeButton(this, 340, 380, 280, 56, '[ BEGIN INVESTIGATION ]', {
        fontSize: 18, onClick: () => { this.scene.start('GameScene'); }
      });
      this.layer.add(btn);
      this.lastPanel = true;
    }

    if (idx < 4) {
      const cont = this.add.text(px+pw-180, py+ph-30, '[ CLICK OR SPACE TO CONTINUE ▶ ]', {
        fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2
      });
      this.layer.add(cont);
      this.tweens.add({ targets: cont, alpha: { from: 1, to: 0.35 }, duration: 700, yoyo:true, repeat:-1 });
    }

    this.cameras.main.fadeIn(300, 10, 10, 15);
  }

  advance() {
    if (this.advancing || this.lastPanel) return;
    this.advancing = true;
    this.cameras.main.fadeOut(220, 10, 10, 15);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.panelIndex++;
      if (this.panelIndex > 4) { this.scene.start('GameScene'); return; }
      this.advancing = false;
      this.lastPanel = (this.panelIndex === 4);
      this.showPanel();
    });
  }
}

// =========================================================
// GAMESCENE
// =========================================================
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'investigation';
    if (!this.gs.visitedRooms.includes(this.gs.currentRoom)) {
      this.gs.visitedRooms.push(this.gs.currentRoom);
    }

    this.cameras.main.setBackgroundColor('#05100a');

    this.bgLayer       = this.add.container(0, 0).setDepth(0);
    this.roomLayer     = this.add.container(0, 0).setDepth(10);
    this.uiBackLayer   = this.add.container(0, 0).setDepth(40);
    this.cardsLayer    = this.add.container(0, 0).setDepth(50);
    this.navLayer      = this.add.container(0, 0).setDepth(60);
    this.hintBtnLayer  = this.add.container(0, 0).setDepth(70);
    this.dialogueLayer = this.add.container(0, 0).setDepth(100).setVisible(false);
    this.suspectLayer  = this.add.container(0, 0).setDepth(200).setVisible(false);
    this.hintLayer     = this.add.container(0, 0).setDepth(300).setVisible(false);
    this.logsLayer     = this.add.container(0, 0).setDepth(400).setVisible(false);
    this.contraLayer   = this.add.container(0, 0).setDepth(500).setVisible(false);

    drawCanvasFrame(this);
    this.buildHeader();
    this.buildFilterButtons();
    this.buildEvidenceRow();
    this.cardsLayer.setVisible(false);
    this.buildNavBar();
    this.buildHintButton();
    this.buildDialoguePanel();

    this.loadRoom(this.gs.currentRoom);
    this.refreshEvidenceCards();
    this.refreshNavBar();

    this.input.keyboard.on('keydown-SPACE', () => { if (this.dialogueActive) this.advanceDialogue(); });
    this.input.keyboard.on('keydown-ESC', () => {
      if (this.suspectLayer.visible) this.toggleSuspectBoard(false);
      else if (this.hintLayer.visible) this.toggleHintPanel(false);
      else if (this.logsLayer.visible) this.toggleLogs(false);
    });
  }

  buildHeader() {
    const h = 38;
    const bg = this.add.rectangle(0, 0, 960, h, C.BG_PANEL, 1).setOrigin(0,0);
    const line = this.add.rectangle(0, h, 960, 1, C.ACCENT).setOrigin(0,0);
    this.uiBackLayer.add([bg, line]);
    this.headerLabel = this.add.text(20, 12, '', {
      fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4
    });
    this.headerSub = this.add.text(20, 28, '', {
      fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:2
    });
    this.headerStatus = this.add.text(940, 14, '', {
      fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2
    }).setOrigin(1, 0);
    this.uiBackLayer.add([this.headerLabel, this.headerSub, this.headerStatus]);
  }

  refreshHeader() {

  loadRoom(room) {
    this.gs.currentRoom = room;
    if (!this.gs.visitedRooms.includes(room)) this.gs.visitedRooms.push(room);

    this.bgLayer.removeAll(true);
    this.roomLayer.removeAll(true);

    const bg = this.add.image(480, 320, 'bg_' + room);
    this.bgLayer.add(bg);

    const dim = this.add.rectangle(0, 360, 960, 280, 0x000000, 0.18).setOrigin(0,0);
    this.bgLayer.add(dim);

    try { window.__drawRoomDetails && window.__drawRoomDetails(this, 'atlantic', room); } catch(e){ console.warn('details', e); }

    HOTSPOTS[room].forEach(h => this.makeHotspot(h));
    (NPCS[room] || []).forEach(n => this.makeNPC(n));

    this.refreshHeader();
    this.refreshNavBar();

    this.cameras.main.flash(180, 0, 255, 102); // green flash
  }

  makeHotspot(h) {
    const collected = h.collect && this.gs.collectedEvidence.includes(h.collect);
    const cont = this.add.container(h.x, h.y);
    cont.hsId = h.id;

    const br = this.add.graphics();
    br.lineStyle(1.5, C.ACCENT, 1);
    const r = 22;
    [[-r,-r,1,1],[r,-r,-1,1],[-r,r,1,-1],[r,r,-1,-1]].forEach(([x,y,sx,sy]) => {
      br.beginPath(); br.moveTo(x, y); br.lineTo(x + 8*sx, y);
      br.moveTo(x, y); br.lineTo(x, y + 8*sy); br.strokePath();
    });
    cont.add(br);

    const dia = this.add.graphics();
    if (collected) { dia.fillStyle(C.ACCENT_D, 0.7); dia.lineStyle(1.5, C.ACCENT, 0.7); } 
    else { dia.fillStyle(C.ACCENT, 1); dia.lineStyle(1.5, C.LIGHT, 1); }
    dia.beginPath(); dia.moveTo(0, -8); dia.lineTo(8, 0); dia.lineTo(0, 8); dia.lineTo(-8, 0);
    dia.closePath(); dia.fillPath(); dia.strokePath();
    cont.add(dia);

    const lbl = this.add.text(0, 28, h.label, {
      fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:1.5
    }).setOrigin(0.5).setAlpha(0);
    cont.add(lbl);

    const hit = this.add.rectangle(0, 0, 56, 56, 0x000000, 0).setInteractive({ useHandCursor:true });
    cont.add(hit);

    hit.on('pointerover', () => { lbl.setAlpha(1); this.tweens.add({ targets: dia, scale:1.4, duration:120 }); });
    hit.on('pointerout', () => { lbl.setAlpha(0); this.tweens.add({ targets: dia, scale:1.0, duration:120 }); });
    hit.on('pointerdown', () => this.triggerHotspot(h));

    this.tweens.add({ targets: [dia, br], alpha:{ from:0.6, to:1.0 }, duration:900, yoyo:true, repeat:-1 });
    this.roomLayer.add(cont);
  }

  makeNPC(n) {
    const cont = this.add.container(n.x, n.y);
    const sh = this.add.ellipse(0, 70, 70, 14, 0x000000, 0.5);
    cont.add(sh);
    const body = this.add.graphics();
    body.fillStyle(n.color, 1);
    body.beginPath(); body.moveTo(-22, 60); body.lineTo(-14, 0); body.lineTo(14, 0); body.lineTo(22, 60);
    body.closePath(); body.fillPath();
    body.lineStyle(2, 0x05100a, 1); body.strokePath();
    cont.add(body);
    const head = this.add.circle(0, -14, 14, 0xd4cfe0).setStrokeStyle(2, 0x05100a);
    cont.add(head);
    const nameBg = this.add.rectangle(0, -50, 80, 18, C.BG_PANEL, 0.92).setStrokeStyle(1, C.ACCENT);
    const nameTxt = this.add.text(0, -50, n.name, {
      fontFamily: F.UI, fontSize:'11px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:2
    }).setOrigin(0.5);
    cont.add([nameBg, nameTxt]);
    const dot = this.add.circle(34, -36, 4, C.ACCENT);
    cont.add(dot);
    this.tweens.add({ targets: dot, alpha:{from:0.4,to:1}, duration:700, yoyo:true, repeat:-1 });

    const hit = this.add.rectangle(0, 20, 80, 100, 0x000000, 0).setInteractive({ useHandCursor:true });
    cont.add(hit);
    hit.on('pointerover', () => { this.tweens.add({ targets: cont, y: n.y - 4, duration: 140 }); });
    hit.on('pointerout', () => { this.tweens.add({ targets: cont, y: n.y, duration: 140 }); });
    hit.on('pointerdown', () => this.triggerNPC(n));

    this.roomLayer.add(cont);
  }

  refreshEvidenceCards() {
    Object.keys(this.filterBtns).forEach(k => {
      const o = this.filterBtns[k];
      if (k === this.filter) { o.bg.setFillStyle(C.ACCENT, 1).setStrokeStyle(1, C.ACCENT); o.txt.setColor(C.BG_DEEP_S); } 
      else { o.bg.setFillStyle(C.BG_PANEL, 1).setStrokeStyle(1, C.MUTE); o.txt.setColor(C.MUTE_S); }
    });

    const evs = this.gs.collectedEvidence.filter(id => {
      if (this.filter === 'ALL') return true;
      return EVIDENCE_META[id] && EVIDENCE_META[id].type === this.filter;
    });

    this.evCount.setText(`${String(this.gs.collectedEvidence.length).padStart(2,'0')} / 16`);
    this.emptyText.setVisible(evs.length === 0);
    this.cardsHolder.removeAll(true);

    const cardW = 138, cardH = 60, gap = 8;
    const visible = 6;
    const maxScroll = Math.max(0, evs.length - visible);
    if (this.cardScroll > maxScroll) this.cardScroll = maxScroll;

    for (let i = 0; i < visible; i++) {
      const idx = i + this.cardScroll;
      if (idx >= evs.length) break;
      const id = evs[idx];
      const meta = EVIDENCE_META[id];
      const x = i * (cardW + gap);

      const card = this.add.container(x, 0);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, C.MUTE);
      const stripe = this.add.rectangle(0, 0, 3, cardH, C.ACCENT, 1).setOrigin(0,0);
      const tagColor = meta.type === 'PHYSICAL' ? C.ACCENT : (meta.type === 'TESTIMONY' ? 0xc49a2a : 0x8aa6c8);
      const tagBg = this.add.rectangle(cardW-50, 6, 44, 12, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, tagColor);
      const tagTx = this.add.text(cardW-28, 12, meta.type.slice(0,3), { fontFamily: F.MONO, fontSize:'8px', color:'#'+tagColor.toString(16).padStart(6,'0'), letterSpacing:1 }).setOrigin(0.5);
      const title = this.add.text(10, 14, id.length > 18 ? id.slice(0,17)+'…' : id, { fontFamily: F.UI, fontSize:'12px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:1 });
      const room = this.add.text(10, 30, '> ' + meta.room, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:1 });
      const bottomBar = this.add.rectangle(10, cardH-15, cardW-20, 1, 0x102618).setOrigin(0,0);
      const bottomTag = this.add.text(10, cardH-12, '· COLLECTED', { fontFamily: F.MONO, fontSize:'8px', color:C.ACCENT_S, letterSpacing:1 });

      card.add([bg, stripe, tagBg, tagTx, title, room, bottomBar, bottomTag]);
      bg.setInteractive({ useHandCursor: true });
      bg.on('pointerdown', () => window.openEvidenceModal('atlantic', id));
    
      if (id === this._newestEvidence) {
        card.setScale(0.6); card.setAlpha(0);
        this.tweens.add({ targets: card, scale:1, alpha:1, duration:380, ease:'Back.Out' });
      }
      this.cardsHolder.add(card);
    }
    this._newestEvidence = null;
    this.refreshHeader();
  }

    Object.keys(this.navTabs).forEach(k => {

      o.dot.setVisible(visited && !isCurrent);
    });
    const ready = this.gs.visitedRooms.length >= 4;
    this.accuseCont.setVisible(ready);
    this.accuseEmpty.setVisible(!ready);
    this.accuseEmptyTxt.setVisible(!ready);
  }

  showDialogue(lines, onDone) {
    this.dialogueActive = true;
    this.dialogueQueue = lines.slice();
    this._dialogueOnDone = onDone || null;
    this.dialogueLayer.setVisible(true);
    this.dialogueLayer.setAlpha(0);
    this.dialogueLayer.y = 8;
    this.tweens.add({ targets: this.dialogueLayer, alpha: 1, y: 0, duration: 200 });
    this.advanceDialogue(true);
  }

  advanceDialogue(initial) {
    if (!this.dialogueActive) return;
    if (!initial) { if (this.dialogueQueue.length === 0) { this.hideDialogue(); return; } }
    const next = this.dialogueQueue.shift();
    if (!next) { this.hideDialogue(); return; }
    this.dPortrait.setTexture(next.portrait);
    this.dSpeaker.setText('// ' + (next.speaker || '— — —'));
    this.dFileTag.setText('// LOG ENTRY · MIXED CASE');
    this.dText.setStyle({ fontFamily: F.MONO, fontSize:'18px', color: C.LIGHT_S, fontStyle: next.italic ? 'italic' : '500', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'left', lineSpacing:6 });
    this.dText.setText(next.text);
    this.dText.setAlpha(0);
    this.tweens.add({ targets: this.dText, alpha: 1, duration: 130 });
  }

  hideDialogue() {
    this.dialogueActive = false;
    this.tweens.add({
      targets: this.dialogueLayer, alpha: 0, duration: 140,
      onComplete: () => {
        this.dialogueLayer.setVisible(false);
        const done = this._dialogueOnDone;
        this._dialogueOnDone = null;
        if (done) done();
      }
    });
  }

  triggerHotspot(h) {
    if (this.dialogueActive) return;
    this.showDialogue(h.lines, () => {
      if (h.collect) {
        if (h.collectExtra && this.gs.collectedEvidence.includes(h.collect)) {
          this.showDialogue([P(h.collectExtra)]); return;
        }
        this.collectEvidence(h.collect);
      }
      if (h.after === 'logs_panel') {
        this.toggleLogs(true); return;
      }
      this.checkContradictions();
    });
  }

  triggerNPC(n) {
    if (this.dialogueActive) return;
    if (!this.gs.suspectsTalked.includes(n.id)) this.gs.suspectsTalked.push(n.id);
    let queue = n.lines.slice();
    if (n.conditional && this.gs.collectedEvidence.includes(n.conditional.has)) { queue.push(n.conditional.line); }
    this.showDialogue(queue, () => {
      if (n.collect) this.collectEvidence(n.collect);
      this.checkContradictions();
    });
  }

  collectEvidence(id) {
    if (!id || this.gs.collectedEvidence.includes(id)) return false;
    this.gs.collectedEvidence.push(id);
    this._newestEvidence = id;
    this.filter = 'ALL';
    this.cardScroll = Math.max(0, this.gs.collectedEvidence.length - 6);
    this.refreshEvidenceCards();
    this.cameras.main.flash(120, 0, 255, 102);
    this.refreshHotspots();
    return true;
  }

  refreshHotspots() {
    this.roomLayer.removeAll(true);
    HOTSPOTS[this.gs.currentRoom].forEach(h => this.makeHotspot(h));
    (NPCS[this.gs.currentRoom] || []).forEach(n => this.makeNPC(n));
  }

  checkContradictions() {
    for (const c of CONTRADICTIONS) {
      if (this.gs.contradictionsTriggered.includes(c.id)) continue;
      const ok = c.requires.every(req => this.gs.collectedEvidence.includes(req));
      if (ok) { this.fireContradiction(c.id); return; }
    }
  }

  fireContradiction(id) {
    const c = CONTRADICTIONS.find(x => x.id === id);
    if (!c) return;
    if (this.gs.contradictionsTriggered.includes(id)) return;
    this.gs.contradictionsTriggered.push(id);
    this.refreshHeader();

    const layer = this.contraLayer;
    layer.removeAll(true);
    layer.setVisible(true).setAlpha(0);

    const overlay = this.add.rectangle(0, 0, 960, 640, 0x05100a, 0.92).setOrigin(0,0);
    layer.add(overlay);

    const big = this.add.text(480, 230, 'CONTRADICTION', { fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:8 }).setOrigin(0.5);
    layer.add(big);
    const tw = big.width + 80, th = big.height + 30;
    const border = this.add.rectangle(480, 230, tw, th, 0x000000, 0).setOrigin(0.5).setStrokeStyle(3, C.ACCENT);
    layer.add(border);
    layer.add(drawAllCornerMarks(this, 480-tw/2, 230-th/2, tw, th, C.ACCENT, 22));
    
    const idx = this.add.text(480, 290, `// CONTRADICTION 0${id} OF 05 LOGGED`, { fontFamily: F.MONO, fontSize:'12px', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5);
    layer.add(idx);
    const expl = this.add.text(480, 360, c.text, { fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'center', lineSpacing:6 }).setOrigin(0.5);
    layer.add(expl);

    const _dismissTxt = this.add.text(480, 470, '[ CLICK TO DISMISS ]', {
      fontFamily: F.MONO, fontSize:'14px', color:C.ACCENT_S, letterSpacing:3
    }).setOrigin(0.5);
    layer.add(_dismissTxt);
    const _hit = this.add.rectangle(0, 0, 960, 640, 0x000000, 0.001).setOrigin(0,0).setInteractive({ useHandCursor:true });
    layer.add(_hit);
    const _dismiss = () => {
      this.tweens.add({
        targets: layer, alpha: 0, duration: 300,
        onComplete: () => { layer.setVisible(false); layer.removeAll(true); }
      });
    };
    _hit.on('pointerdown', _dismiss);
    this.tweens.add({ targets: layer, alpha: 1, duration: 300 });
  }

  toggleSuspectBoard(show) {
    if (show) {
      this.buildSuspectBoard();
      this.suspectLayer.setVisible(true).setAlpha(0);
      this.tweens.add({ targets: this.suspectLayer, alpha: 1, duration: 180 });
    } else {
      this.tweens.add({
        targets: this.suspectLayer, alpha: 0, duration: 180,
        onComplete: () => { this.suspectLayer.setVisible(false); this.suspectLayer.removeAll(true); }
      });
    }
  }

  buildSuspectBoard() {
    const layer = this.suspectLayer;
    layer.removeAll(true);

    layer.add(back);
    const grid = this.add.graphics();
    grid.lineStyle(1, 0x102618, 1);
    for (let gx = 0; gx <= 960; gx += 40) { grid.beginPath(); grid.moveTo(gx, 0); grid.lineTo(gx, 640); grid.strokePath(); }

    const headerBg = this.add.rectangle(0, 0, 960, 56, C.BG_PANEL, 1).setOrigin(0,0);

    layer.add([headerBg, headerLine]);
    layer.add(this.add.text(20, 16, '// SUSPECT BOARD', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 }));
    layer.add(this.add.text(20, 38, 'cross-reference suspects against evidence · pin items to build a case', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:1 }));

    const cardY = 90;

    SUSPECTS.forEach((sus, i) => {
      const x = startX + i * (cardW + gap);
      const card = this.add.container(x, cardY);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(1, 0x102618);
      card.add(bg);
      card.add(this.add.rectangle(0, 0, cardW, 4, C.ACCENT, 1).setOrigin(0,0));
      card.add(this.add.text(10, 14, '0' + (i+1), { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }));
      card.add(this.add.text(cardW-10, 14, '·', { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S }).setOrigin(1,0));
      const port = this.add.image(cardW/2, 130, sus.portrait).setOrigin(0.5).setDisplaySize(150, 188);

      card.add(portBorder);
      card.add(this.add.text(cardW/2, 240, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:4 }).setOrigin(0.5));
      card.add(this.add.rectangle(20, 268, cardW-40, 1, C.ACCENT, 0.4).setOrigin(0,0));
      card.add(this.add.text(cardW/2, 290, sus.desc, { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, wordWrap:{ width: cardW - 24, useAdvancedWrap: true }, align:'center', lineSpacing:3 }).setOrigin(0.5));

      const pins = this.gs.pins[sus.id] || [];
      const pinsContainer = this.add.container(8, 330);

      pins.slice(0, 3).forEach(p => {
        const tagW = cardW - 16;

        const tagTx = this.add.text(8, py + 10, '· ' + (p.length > 22 ? p.slice(0,21)+'…' : p), { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:1 }).setOrigin(0,0.5);
        pinsContainer.add([tagBg, tagTx]);
        py += 24;
      });
      if (pins.length > 3) { pinsContainer.add(this.add.text(0, py, `+${pins.length - 3} more`, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S })); }
      card.add(pinsContainer);

      const pinBtn = makeButton(this, 14, cardH - 38, cardW - 28, 26, '+ PIN EVIDENCE', { fontSize: 11, onClick: () => this.openPinPicker(sus) });
      card.add(pinBtn);
      layer.add(card);
    });
  }

  openPinPicker(sus) {
    const layer = this.suspectLayer;
    const sub = this.add.container(0, 0);
    const back = this.add.rectangle(0, 0, 960, 640, 0x000000, 0.7).setOrigin(0,0).setInteractive();
    sub.add(back);
    const pw = 520, ph = 440;

    sub.add(pBg);
    sub.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 16));
    sub.add(this.add.rectangle(px+16, py+16, pw-32, 1, C.ACCENT).setOrigin(0,0));
    sub.add(this.add.text(px+16, py+22, `// PIN EVIDENCE TO ${sus.name}`, { fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 }));
    sub.add(this.add.text(px+pw-16, py+24, 'click an item to toggle pin', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S }).setOrigin(1,0));

    const pins = this.gs.pins[sus.id] || (this.gs.pins[sus.id] = []);
    const list = this.gs.collectedEvidence;

    if (list.length === 0) {
      sub.add(this.add.text(px+pw/2, py+ph/2, '> NO EVIDENCE COLLECTED YET', { fontFamily: F.MONO, fontSize:'14px', color:C.MUTE_S }).setOrigin(0.5));
    }

    list.forEach((id, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const ix = px + 20 + col * 240;
      const iy = py + 60 + row * 36;
      const isPinned = pins.includes(id);
      const meta = EVIDENCE_META[id];
      const itemBg = this.add.rectangle(ix, iy, 230, 30, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, isPinned ? C.ACCENT : 0x102618);
      const stripe = this.add.rectangle(ix, iy, 3, 30, isPinned ? C.ACCENT : C.MUTE, 1).setOrigin(0,0);
      const tx = this.add.text(ix+10, iy+8, (isPinned ? '◉ ' : '○ ') + (id.length > 22 ? id.slice(0,21)+'…' : id), { fontFamily: F.MONO, fontSize:'10px', color: isPinned ? C.ACCENT_S : C.LIGHT_S, letterSpacing:1 });
      const tag = this.add.text(ix+220, iy+15, meta.type.slice(0,3), { fontFamily: F.MONO, fontSize:'8px', color:C.MUTE_S }).setOrigin(1, 0.5);
      itemBg.setInteractive({ useHandCursor:true });
      itemBg.on('pointerdown', () => {
        if (pins.includes(id)) pins.splice(pins.indexOf(id), 1); else pins.push(id);
        sub.destroy(); this.openPinPicker(sus);
        this.toggleSuspectBoard(false); this.toggleSuspectBoard(true);
      });
      itemBg.on('pointerover', () => itemBg.setStrokeStyle(1, C.ACCENT));
      itemBg.on('pointerout',  () => itemBg.setStrokeStyle(1, isPinned ? C.ACCENT : 0x102618));
      sub.add([itemBg, stripe, tx, tag]);
    });

    const closeBtn = makeButton(this, px+pw-110, py+ph-44, 92, 28, 'DONE', { fontSize:12, onClick: () => sub.destroy() });
    sub.add(closeBtn);
    layer.add(sub);
  }

  toggleHintPanel(show) {
    if (show) {
      this.buildHintPanel();
      this.hintLayer.setVisible(true);
      this.hintLayer.x = 960;
      this.tweens.add({ targets: this.hintLayer, x: 0, duration: 220, ease:'Cubic.Out' });
    } else {
      this.tweens.add({
        targets: this.hintLayer, x: 960, duration: 200, ease:'Cubic.In',
        onComplete: () => { this.hintLayer.setVisible(false); this.hintLayer.removeAll(true); this.hintLayer.x = 0; }

    const pw = 380, ph = 480;

    layer.add(this.add.rectangle(px+16, py+16, pw-32, 1, C.ACCENT).setOrigin(0,0));
    layer.add(this.add.text(px+16, py+24, '// ANONYMOUS TIP', { fontFamily: F.UI, fontSize:'14px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 }));
    const closeBtn = makeButton(this, px+pw-46, py+18, 30, 22, '×', { fontSize:14, onClick: () => this.toggleHintPanel(false) });
    layer.add(closeBtn);
    const port = this.add.image(px+24, py+60, 'portrait_mystery').setOrigin(0,0).setDisplaySize(120, 150);
    layer.add(port);
    layer.add(this.add.rectangle(px+24, py+60, 120, 150, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT, 0.7));
    layer.add(this.add.text(px+160, py+72, '???', { fontFamily: F.UI, fontSize:'30px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:6 }));
    layer.add(this.add.text(px+160, py+108, '> source unknown · trust at own risk', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:1 }));
    layer.add(this.add.rectangle(px+160, py+128, pw-180, 1, C.ACCENT, 0.4).setOrigin(0,0));
    layer.add(this.add.text(px+24, py+230, '// HINTS · ' + ROOM_NAMES[this.gs.currentRoom], { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 }));
    layer.add(this.add.rectangle(px+24, py+250, pw-48, 1, C.ACCENT).setOrigin(0,0));
    const hints = HINTS[this.gs.currentRoom];
    hints.forEach((t, i) => {
      const hy = py + 270 + i * 70;
      const hbg = this.add.rectangle(px+24, hy, pw-48, 60, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, 0x102618);

      layer.add([hbg, stripe, num, tx]);

  toggleLogs(show) {
    if (show) {
      this.buildLogsPanel();
      this.logsLayer.setVisible(true).setAlpha(0);
      this.tweens.add({ targets: this.logsLayer, alpha: 1, duration: 200 });
    } else {
      this.tweens.add({
        targets: this.logsLayer, alpha: 0, duration: 200,
        onComplete: () => { this.logsLayer.setVisible(false); this.logsLayer.removeAll(true); }
      });
    }
  }

  buildLogsPanel() {
    const layer = this.logsLayer;
    layer.removeAll(true);
    const back = this.add.rectangle(0, 0, 960, 640, 0x05100a, 0.92).setOrigin(0,0).setInteractive();
    layer.add(back);
    const pw = 720, ph = 500;
    const px = (960-pw)/2, py = (640-ph)/2;
    layer.add(this.add.rectangle(px, py, pw, ph, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT));
    layer.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 18));
    layer.add(this.add.text(px+20, py+22, '// CAMERA LOGS TERMINAL', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 }));
    layer.add(this.add.text(px+pw-20, py+26, '04 ENTRIES RECOVERED · CHRONOLOGICAL', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0));
    layer.add(this.add.rectangle(px+20, py+50, pw-40, 1, C.ACCENT).setOrigin(0,0));

    CALL_LOGS.forEach((log, i) => {
      const ly = py + 70 + i * 95;
      const lbg = this.add.rectangle(px+20, ly, pw-40, 80, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, 0x102618);

      layer.add([lbg, stripe, tag, time, body]);

      this.tweens.add({ targets:[lbg, stripe, tag, time, body], alpha:1, duration:200, delay: 80 + i*120 });
    });

    const close = makeButton(this, px+pw-130, py+ph-46, 110, 30, 'CLOSE', { fontSize:13, onClick: () => this.toggleLogs(false) });
    layer.add(close);
  }
}

// ACCUSATIONSCENE
// =========================================================
class AccusationScene extends Phaser.Scene {
  constructor() { super('AccusationScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'accusation';
    this.cameras.main.setBackgroundColor('#05100a');

    const grid = this.add.graphics();
    grid.lineStyle(1, 0x102618, 1);
    for (let x = 0; x <= 960; x += 40) { grid.beginPath(); grid.moveTo(x,0); grid.lineTo(x,640); grid.strokePath(); }
    for (let y = 0; y <= 640; y += 40) { grid.beginPath(); grid.moveTo(0,y); grid.lineTo(960,y); grid.strokePath(); }
    const diag = this.add.graphics();
    diag.lineStyle(1, C.ACCENT, 0.3);
    diag.beginPath(); diag.moveTo(0, 80); diag.lineTo(80, 0); diag.strokePath();
    diag.beginPath(); diag.moveTo(960, 80); diag.lineTo(880, 0); diag.strokePath();

    drawCanvasFrame(this);

    this.add.rectangle(0, 0, 960, 56, C.BG_PANEL, 1).setOrigin(0,0);
    this.add.rectangle(0, 56, 960, 2, C.ACCENT).setOrigin(0,0);
    this.add.text(20, 18, '// FINAL ACCUSATION', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 });
    
    this.add.text(940, 18, '// CASE: THE ATLANTIC WOLFFISH · CLOSE THE LOOP', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0);

    this.add.text(480, 110, 'WHO KILLED THE VICTIM?', { fontFamily: F.UI, fontSize:'42px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:6 }).setOrigin(0.5);
    this.add.rectangle(480, 142, 380, 3, C.ACCENT).setOrigin(0.5);
    this.add.text(480, 168, 'select one. there is no second guess.', { fontFamily: F.MONO, fontSize:'13px', color:C.MUTE_S, letterSpacing:2, fontStyle:'italic' }).setOrigin(0.5);

    const cardW = 160, cardH = 280, gap = 20;
    const totalW = 5*cardW + 4*gap;
    const startX = (960 - totalW) / 2;
    const y = 220;

    (function(arr){ for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; })([...SUSPECTS]).forEach((sus, i) => {
      const x = startX + i*(cardW+gap);
      const card = this.add.container(x, y);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.MUTE);
      const portBg = this.add.rectangle(8, 8, cardW-16, 200, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT, 0.7);
      const port = this.add.image(cardW/2, 108, sus.portrait).setOrigin(0.5).setDisplaySize(cardW-20, 196);
      const numTag = this.add.text(14, 18, '0' + (i+1), { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 });
      const name = this.add.text(cardW/2, 226, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:5 }).setOrigin(0.5);
      const div = this.add.rectangle(cardW/2, 248, 60, 1, C.ACCENT).setOrigin(0.5);
      const action = this.add.text(cardW/2, 264, '> ACCUSE', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:3 }).setOrigin(0.5);
      const corners = drawAllCornerMarks(this, x+4, y+4, cardW-8, cardH-8, C.ACCENT, 14);
      corners.setAlpha(0);

      card.add([bg, portBg, port, numTag, name, div, action]);
      bg.setInteractive({ useHandCursor:true });
      bg.on('pointerover', () => {
        bg.setStrokeStyle(2, C.ACCENT); action.setColor(C.ACCENT_S); corners.setAlpha(1);
        this.tweens.add({ targets: card, scaleX:1.05, scaleY:1.05, x: x - cardW*0.025, y: y - cardH*0.025, duration:140 });
      });
      bg.on('pointerout', () => {
        bg.setStrokeStyle(2, C.MUTE); action.setColor(C.ACCENT_S); corners.setAlpha(0);
        this.tweens.add({ targets: card, scaleX:1, scaleY:1, x, y, duration:140 });
      });
      bg.on('pointerdown', () => {
        bg.disableInteractive();
        this.cameras.main.flash(180, 0, 255, 102);
        this.cameras.main.fadeOut(360, 10, 10, 15);
        this.cameras.main.once('camerafadeoutcomplete', () => {
          this.scene.start('EndingScene', { accused: sus.id, correct: sus.correct });
        });
      });
    });

    const back = makeButton(this, 20, 590, 140, 30, '← BACK', { fontSize:12, onClick: () => { this.scene.start('GameScene'); } });

    const ev = this.gs.collectedEvidence.length;
    const cn = this.gs.contradictionsTriggered.length;
    this.add.text(940, 600, `EVIDENCE ${String(ev).padStart(2,'0')}/16  ·  CONTRADICTIONS ${cn}/05`, {
      fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2
    }).setOrigin(1,0.5);

    this.cameras.main.fadeIn(280, 10, 10, 15);
  }
}

// ENDINGSCENE
// =========================================================
class EndingScene extends Phaser.Scene {
  constructor() { super('EndingScene'); }

  init(data) {
    this.accused = data && data.accused;
    this.correct = !!(data && data.correct);
    try { window.recordAccusation && window.recordAccusation(window.currentCase || window._postCaseId || 'unknown', this.accused || 'unknown', this.correct); } catch(e){}
  }

  create() {

function drawCornerMarks(s, x, y, w, h, color, len) {
  len = len || 14;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawAllCornerMarks(s, x, y, w, h, color, len) {
  len = len || 16;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y); g.lineTo(x+w, y); g.lineTo(x+w, y+len); g.strokePath();
  g.beginPath(); g.moveTo(x, y+h-len); g.lineTo(x, y+h); g.lineTo(x+len, y+h); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawCanvasFrame(s) {
  const g = s.add.graphics();
  g.lineStyle(2, C.ACCENT, 1);
  g.strokeRect(1, 1, 958, 638);
  g.setDepth(9999);
  const len = 22;
  const cg = s.add.graphics();
  cg.lineStyle(3, C.ACCENT, 1);
  cg.beginPath(); cg.moveTo(0, len); cg.lineTo(0, 0); cg.lineTo(len, 0); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 0); cg.lineTo(960, 0); cg.lineTo(960, len); cg.strokePath();
  cg.beginPath(); cg.moveTo(0, 640-len); cg.lineTo(0, 640); cg.lineTo(len, 640); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 640); cg.lineTo(960, 640); cg.lineTo(960, 640-len); cg.strokePath();
  cg.setDepth(9999);
  return [g, cg];
}

function makeButton(s, x, y, w, h, label, opts) {
  opts = opts || {};
  const fontSize = opts.fontSize || 14;
  const cont = s.add.container(x, y);
  const bg = s.add.rectangle(0, 0, w, h, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
  const txt = s.add.text(w/2, h/2, label, {
    fontFamily: F.UI, fontSize: fontSize+'px', fontStyle:'600',
    color: C.ACCENT_S
  }).setOrigin(0.5);
  cont.add([bg, txt]);
  bg.setInteractive({ useHandCursor:true });
  bg.on('pointerover', () => { bg.setFillStyle(C.ACCENT, 1); txt.setColor(C.BG_DEEP_S); });
  bg.on('pointerout',  () => { bg.setFillStyle(C.BG_PANEL, 1); txt.setColor(C.ACCENT_S); });
  if (opts.onClick) bg.on('pointerdown', opts.onClick);
  cont.bg = bg; cont.txt = txt;
  return cont;
}

    const keys = Object.keys(PORTRAITS);

      'portrait_the_stagehand': 'THE STAGEHAND',
      'portrait_protagonist':   '',
      'portrait_mystery':       '???'
    };
    const name = labelMap[key] !== undefined ? labelMap[key] : key.replace('portrait_', '').replace(/_/g, ' ').toUpperCase();
    const W = 160, H = 200;

    const rt = this.add.renderTexture(0, 0, W, H).setVisible(false);
    rt.fill(fc.bg);

    const g = this.add.graphics();
    g.lineStyle(2, fc.accent, 1);
    g.strokeRect(2, 2, W - 4, H - 4);
    if (key === 'portrait_protagonist') {
      g.fillStyle(0x0a0905, 1);
      g.fillEllipse(W / 2, 70, 60, 68);
      g.lineStyle(2, C.ACCENT, 0.6);
      g.strokeEllipse(W / 2, 70, 60, 68);
      g.fillStyle(0x0a0905, 1);
      g.beginPath();
      g.moveTo(20, H); g.lineTo(42, 120); g.lineTo(W - 42, 120); g.lineTo(W - 20, H);
      g.closePath(); g.fillPath();
      g.lineStyle(2, C.ACCENT, 0.6); g.strokePath();
      g.fillStyle(C.ACCENT, 0.6);
      g.fillCircle(64, 70, 2); g.fillCircle(96, 70, 2);
    } else {
      g.fillStyle(fc.accent, 0.2);
      g.fillCircle(W / 2, 60, 28);
      g.beginPath();
      g.moveTo(35, H); g.lineTo(50, 110); g.lineTo(W - 50, 110); g.lineTo(W - 35, H);
      g.closePath(); g.fillPath();
    }
    rt.draw(g);
    g.destroy();

    if (name) {
      const txt = this.add.text(W / 2, H - 24, name, {
      fontFamily: F.UI, fontSize: '14px', fontStyle: '700',
      color: '#' + fc.accent.toString(16).padStart(6, '0'), letterSpacing: 2
    }).setOrigin(0.5);
    rt.draw(txt);
    txt.destroy();
    }

    rt.saveTexture(key);
    rt.destroy();
  }

  mg() { return this.make.graphics({ add:false }); }

  bakeBackgrounds() {
    this.bakePrison();
    this.bakeLab();
    this.bakeLibrary();
    this.bakeTrain();
  }

  // ---- PRISON
  bakePrison() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Background wall
    g.fillStyle(0x1a1812, 1); g.fillRect(0, 0, W, 400);
    // Floor
    g.fillStyle(0x242018, 1); g.fillRect(0, 400, W, 240);
    g.lineStyle(1, 0x2e2918, 1);
    for (let i = 0; i < 10; i++) {
      const y = 420 + i * 24;
      g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.strokePath();
    }

    // Cell Bars across the front
    g.lineStyle(8, 0x0a0905, 1);
    for (let x = 40; x < W; x += 80) {
      g.beginPath(); g.moveTo(x, 0); g.lineTo(x, H); g.strokePath();
    }
    // Horizontal crossbars
    g.lineStyle(12, 0x0f0d0a, 1);
    g.beginPath(); g.moveTo(0, 150); g.lineTo(W, 150); g.strokePath();
    g.beginPath(); g.moveTo(0, 450); g.lineTo(W, 450); g.strokePath();

    // Chalk Outline on floor (behind bars)
    g.lineStyle(3, 0xf0efe6, 0.6);
    g.beginPath();
    // Head
    g.strokeCircle(480, 430, 20);
    // Body
    g.moveTo(480, 450); g.lineTo(480, 520);
    // Arms
    g.moveTo(480, 470); g.lineTo(430, 490);
    g.moveTo(480, 470); g.lineTo(530, 490);
    // Legs
    g.moveTo(480, 520); g.lineTo(450, 580);
    g.moveTo(480, 520); g.lineTo(510, 580);
    g.strokePath();

    // Suspended Bucket
    g.fillStyle(0x3d3624, 1);
    g.beginPath(); g.moveTo(460, 180); g.lineTo(500, 180); g.lineTo(490, 230); g.lineTo(470, 230); g.closePath(); g.fillPath();
    g.lineStyle(2, C.ACCENT, 1); g.strokePath();
    // Ropes going up and out
    g.lineStyle(2, 0x99863d, 1);
    g.beginPath(); g.moveTo(480, 180); g.lineTo(480, 0); g.strokePath(); // suspend
    g.lineStyle(2, C.ACCENT, 1);
    g.beginPath(); g.moveTo(480, 230); g.lineTo(550, 100); g.lineTo(960, 100); g.strokePath(); // flip/pull rope

    g.generateTexture('bg_prison', W, H);
    g.destroy();
  }

  // ---- CHEMISTRY LAB
  bakeLab() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Wall
    g.fillStyle(0x1f1c12, 1); g.fillRect(0, 0, W, 350);
    // Lab counter
    g.fillStyle(0x14130d, 1); g.fillRect(0, 350, W, 50);
    g.lineStyle(3, C.ACCENT, 0.4); g.strokeRect(0, 350, W, 50);
    // Lower cabinets
    g.fillStyle(0x242018, 1); g.fillRect(0, 400, W, 240);
    g.lineStyle(2, 0x3d3624, 1);
    for(let x=0; x<W; x+=160) g.strokeRect(x, 400, 160, 240);

    // Chemical Flasks on counter
    g.fillStyle(0x33cc33, 0.6); // Green liquid
    g.beginPath(); g.moveTo(300, 340); g.lineTo(280, 300); g.lineTo(320, 300); g.closePath(); g.fillPath();
    g.lineStyle(2, 0xf0efe6, 0.8); g.strokePath();
    g.fillStyle(0xcc33ff, 0.6); // Purple liquid
    g.beginPath(); g.moveTo(200, 340); g.lineTo(190, 280); g.lineTo(210, 280); g.closePath(); g.fillPath();
    g.lineStyle(2, 0xf0efe6, 0.8); g.strokePath();

    // Hot plate
    g.fillStyle(0x3d3624, 1); g.fillRect(450, 335, 80, 15);
    g.fillStyle(0xff5566, 0.8); g.fillRect(460, 332, 60, 3); // glowing red coil

    // Wall shelf
    g.fillStyle(0x2e2918, 1); g.fillRect(700, 220, 200, 15);
    // Bottle on shelf (Ca(ClO)2) - clearly an evidence asset
    g.fillStyle(0xe8e0c4, 1); g.fillRect(750, 160, 50, 60);
    g.lineStyle(2, C.ACCENT, 1); g.strokeRect(750, 160, 50, 60);
    // cap
    g.fillStyle(0x4a4030, 1); g.fillRect(760, 152, 30, 10);
    // label patch
    g.fillStyle(0xffffff, 1); g.fillRect(755, 175, 40, 22);
    g.lineStyle(1, 0x4a4030, 1); g.strokeRect(755, 175, 40, 22);
    // hazard band
    g.fillStyle(0xff5566, 0.85); g.fillRect(755, 197, 40, 4);
    // tipped/empty: residue spilled at base
    g.fillStyle(0xfff8c0, 0.65); g.fillEllipse(775, 232, 60, 8);

    // Blowtorch on desk
    g.fillStyle(0x14130d, 1); g.fillRect(550, 300, 20, 50);
    g.fillStyle(0x99863d, 1); g.fillRect(570, 300, 30, 10);
    g.fillStyle(0xffcc00, 0.8); g.fillTriangle(600, 300, 600, 310, 630, 305); // flame hint

    g.generateTexture('bg_lab', W, H);
    g.destroy();
  }

  // ---- LIBRARY
  bakeLibrary() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Background wall (dark wood)
    g.fillStyle(0x1a150d, 1); g.fillRect(0, 0, W, H);
    
    // Huge bookshelves
    g.fillStyle(0x241d12, 1);
    g.fillRect(100, 50, 300, 500);
    g.fillRect(560, 50, 300, 500);
    
    // Shelves lines
    g.lineStyle(4, 0x3d311f, 1);
    for(let y=120; y<550; y+=80) {
      g.beginPath(); g.moveTo(100, y); g.lineTo(400, y); g.strokePath();
      g.beginPath(); g.moveTo(560, y); g.lineTo(860, y); g.strokePath();
    }

    // Books (colorful rectangles)
    const drawBooks = (sx, y) => {
      let x = sx;
      while(x < sx + 280) {
        let bw = 10 + Math.random()*20;
        let bh = 40 + Math.random()*30;
        let colors = [0x5e2b2b, 0x2b4a5e, 0x5e5a2b, 0x2b5e3a, 0x3d311f];
        g.fillStyle(colors[Math.floor(Math.random()*colors.length)], 1);
        g.fillRect(x, y - bh, bw, bh);
        x += bw + 2;
      }
    };
    for(let y=120; y<550; y+=80) {
      drawBooks(110, y);
      drawBooks(570, y);
    }

    // Massive specific books sticking out
    g.fillStyle(C.ACCENT, 1); g.fillRect(250, 240, 40, 75); // Chem 4 Morons
    g.fillStyle(0xff5566, 1); g.fillRect(650, 320, 35, 75); // How 2 Maths

    // Reading desk in foreground
    g.fillStyle(0x14110a, 1); g.fillRect(0, 550, W, 90);
    g.lineStyle(2, C.ACCENT, 0.3); g.beginPath(); g.moveTo(0, 550); g.lineTo(W, 550); g.strokePath();

    g.generateTexture('bg_library', W, H);
    g.destroy();
  }

  // ---- TRAIN ROOM
  bakeTrain() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Walls
    g.fillStyle(0x1c1a16, 1); g.fillRect(0, 0, W, 380);
    // Floor
    g.fillStyle(0x14130d, 1); g.fillRect(0, 380, W, 260);

    // Curved Track on floor
    g.lineStyle(8, 0x3d3624, 1);
    g.beginPath(); g.arc(480, 500, 200, 0, Math.PI, true); g.strokePath(); // Top half of arc
    g.lineStyle(4, 0x807c68, 1);
    g.beginPath(); g.arc(480, 500, 210, 0, Math.PI, true); g.strokePath(); // outer rail
    g.beginPath(); g.arc(480, 500, 190, 0, Math.PI, true); g.strokePath(); // inner rail

    // The Train Car
    g.fillStyle(0x2e2918, 1);
    g.fillRect(580, 280, 180, 150); // main cabin
    g.lineStyle(2, C.ACCENT, 1); g.strokeRect(580, 280, 180, 150);
    // Train window
    g.fillStyle(0x12110a, 1); g.fillRect(600, 300, 60, 60);
    // Train wheels
    g.fillStyle(0x0a0905, 1);
    g.fillCircle(620, 440, 20); g.fillCircle(720, 440, 20);
    
    // Rope leading out of the room from the train door
    g.lineStyle(3, C.ACCENT, 1);
    g.beginPath(); g.moveTo(600, 380); g.lineTo(0, 420); g.strokePath();

    // Distance marker on floor
    g.fillStyle(C.ACCENT, 0.8);
    g.fillRect(300, 480, 40, 10);
    
    g.generateTexture('bg_train', W, H);
    g.destroy();
  }

}

class IntroScene extends Phaser.Scene {
  constructor() { super('IntroScene'); }

  create() {
    this.registry.set('gameState', {
      currentRoom: 'prison',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    }); this.registry.set('initialGameState', {
      currentRoom: 'prison',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    });

    this.cameras.main.setBackgroundColor('#12110a');
    drawCanvasFrame(this);

    this.panelIndex = 0;
    this.advancing = false;
    this.layer = this.add.container(0, 0);

    this.input.keyboard.on('keydown-SPACE', () => this.advance());
    this.input.on('pointerdown', () => { if(Date.now() - (this.lastClick||0) < 300) return; this.lastClick = Date.now(); this.advance(); });

    this.showPanel();
  }

  clearLayer() { this.layer.removeAll(true); }

  showPanel() {
    this.clearLayer();
    const idx = this.panelIndex;

    if (idx === 1 || idx === 3) {
      const bg = this.add.image(480, 320, 'bg_prison').setAlpha(0.4);
      this.layer.add(bg);
      const tint = this.add.rectangle(480, 320, 960, 640, 0x12110a, 0.6);
      this.layer.add(tint);
    }

    const px = 80, py = 100, pw = 800, ph = 440;
    const pBg = this.add.rectangle(px, py, pw, ph, 0x1f1c12, idx === 4 ? 1 : 0.92).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
    this.layer.add(pBg);
    this.layer.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 18));

    const stripText = `[ FILE ${String(idx+1).padStart(2,'0')} / 05 ]   ·   THE BURNED CHEF`;
    const strip = this.add.text(px+18, py+14, stripText, {
      fontFamily: F.MONO, fontSize:'12px', color:C.MUTE_S, letterSpacing:2
    });
    this.layer.add(strip);
    const stripLine = this.add.rectangle(px+18, py+34, pw-36, 1, C.ACCENT).setOrigin(0,0);
    this.layer.add(stripLine);

    if (idx === 0) {
      this.layer.add(this.add.text(480, 240, 'THE ULTIMATE CHEF.', { fontFamily: F.UI, fontSize:'56px', fontStyle:'700', color:C.LIGHT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 290, 220, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 340, 'Burned to a crisp inside a locked prison cell.', { fontFamily: F.MONO, fontSize:'18px', color:C.MUTE_S }).setOrigin(0.5));
    }
    else if (idx === 1) {
      this.layer.add(this.add.text(480, 240, 'AN ENGINEERED INFERNO.', { fontFamily: F.UI, fontSize:'46px', fontStyle:'700', color:C.LIGHT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 285, 200, 2, C.ACCENT).setOrigin(0.5));
      const lines = [
        '> gummy bears scattered at the gate.',
        '> a bucket suspended by ropes.',
        '> ...and a synthesis of highly reactive chemicals.'
      ];
      lines.forEach((t, i) => {
        this.layer.add(this.add.text(280, 320 + i*32, t, { fontFamily: F.MONO, fontSize:'18px', color: i === 2 ? C.ACCENT_S : C.LIGHT_S }));
      });
    }
    else if (idx === 2) {
      const port = this.add.image(220, 320, 'portrait_protagonist').setOrigin(0.5).setDisplaySize(160, 200);
      this.layer.add(port);
      this.layer.add(this.add.rectangle(220, 320, 162, 202, 0x000000, 0).setOrigin(0.5).setStrokeStyle(2, C.ACCENT));
      this.layer.add(drawAllCornerMarks(this, 139, 219, 162, 202, C.ACCENT, 12));

      this.layer.add(this.add.text(340, 220, 'The Chef is dead.', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 270, 'The killer used science as a weapon.', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 320, 'Someone calculated every variable.', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 348, 'I need to find the missing variable.', { fontFamily: F.MONO, fontSize:'17px', color:C.ACCENT_S, fontStyle:'italic' }));
    }
    else if (idx === 3) {
      this.layer.add(this.add.text(480, 240, 'LAST KNOWN LOCATION', { fontFamily: F.UI, fontSize:'30px', fontStyle:'700', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'THE PRISON.', { fontFamily: F.UI, fontSize:'56px', fontStyle:'700', color:C.ACCENT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 330, 280, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 370, 'That is where the trap was sprung.', { fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic' }).setOrigin(0.5));
    }
    else if (idx === 4) {
      this.layer.add(this.add.text(480, 200, 'MURDER NEXT DOOR', { fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:6 }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 250, 360, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'CASE FILE — THE H.O.P.E. CASE', { fontFamily: F.MONO, fontSize:'15px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(0.5));
      const btn = makeButton(this, 340, 380, 280, 56, '[ BEGIN INVESTIGATION ]', { fontSize: 18, onClick: () => { this.scene.start('GameScene'); } });
      this.layer.add(btn);
      this.lastPanel = true;
    }

    if (idx < 4) {
      const cont = this.add.text(px+pw-180, py+ph-30, '[ CLICK OR SPACE TO CONTINUE ▶ ]', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 });
      this.layer.add(cont);
      this.tweens.add({ targets: cont, alpha: { from: 1, to: 0.35 }, duration: 700, yoyo:true, repeat:-1 });
    }
    this.cameras.main.fadeIn(300, 10, 10, 15);
  }

  advance() {
    if (this.advancing || this.lastPanel) return;
    this.advancing = true;
    this.cameras.main.fadeOut(220, 10, 10, 15);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.panelIndex++;
      if (this.panelIndex > 4) { this.scene.start('GameScene'); return; }
      this.advancing = false;
      this.lastPanel = (this.panelIndex === 4);
      this.showPanel();
    });
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'investigation';
    if (!this.gs.visitedRooms.includes(this.gs.currentRoom)) this.gs.visitedRooms.push(this.gs.currentRoom);

    this.cameras.main.setBackgroundColor('#12110a');

    this.bgLayer       = this.add.container(0, 0).setDepth(0);
    this.roomLayer     = this.add.container(0, 0).setDepth(10);
    this.uiBackLayer   = this.add.container(0, 0).setDepth(40);
    this.cardsLayer    = this.add.container(0, 0).setDepth(50);
    this.navLayer      = this.add.container(0, 0).setDepth(60);
    this.hintBtnLayer  = this.add.container(0, 0).setDepth(70);
    this.dialogueLayer = this.add.container(0, 0).setDepth(100).setVisible(false);
    this.suspectLayer  = this.add.container(0, 0).setDepth(200).setVisible(false);
    this.hintLayer     = this.add.container(0, 0).setDepth(300).setVisible(false);
    this.logsLayer     = this.add.container(0, 0).setDepth(400).setVisible(false);
    this.contraLayer   = this.add.container(0, 0).setDepth(500).setVisible(false);

    drawCanvasFrame(this);
    this.buildHeader();
    this.buildFilterButtons();
    this.buildEvidenceRow();
    this.cardsLayer.setVisible(false);
    this.buildNavBar();
    this.buildHintButton();
    this.buildDialoguePanel();

    this.loadRoom(this.gs.currentRoom);
    this.refreshEvidenceCards();
    this.refreshNavBar();

    this.input.keyboard.on('keydown-SPACE', () => { if (this.dialogueActive) this.advanceDialogue(); });
    this.input.keyboard.on('keydown-ESC', () => {
      if (this.suspectLayer.visible) this.toggleSuspectBoard(false);
      else if (this.hintLayer.visible) this.toggleHintPanel(false);
      else if (this.logsLayer.visible) this.toggleLogs(false);
    });
  }

  buildHeader() {
    const h = 38;
    const bg = this.add.rectangle(0, 0, 960, h, C.BG_PANEL, 1).setOrigin(0,0);
    const line = this.add.rectangle(0, h, 960, 1, C.ACCENT).setOrigin(0,0);
    this.uiBackLayer.add([bg, line]);
    this.headerLabel = this.add.text(20, 12, '', { fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 });
    this.headerSub = this.add.text(20, 28, '', { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:2 });
    this.headerStatus = this.add.text(940, 14, '', { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1, 0);
    this.uiBackLayer.add([this.headerLabel, this.headerSub, this.headerStatus]);
  }

  refreshHeader() {
    const room = this.gs.currentRoom;
    this.headerLabel.setText(`// ${ROOM_NAMES[room]}`);
    this.headerSub.setText(`zone ${ROOM_KEYS.indexOf(room)+1} / 04   ·   the chef investigation`);
    const ev = this.gs.collectedEvidence.length;
    const cn = this.gs.contradictionsTriggered.length;
    this.headerStatus.setText(`EVIDENCE ${String(ev).padStart(2,'0')}/16   ·   CONTRADICTIONS ${cn}/05`);
  }

  loadRoom(room) {
    this.gs.currentRoom = room;
    if (!this.gs.visitedRooms.includes(room)) this.gs.visitedRooms.push(room);

    this.bgLayer.removeAll(true);
    this.roomLayer.removeAll(true);

    const bg = this.add.image(480, 320, 'bg_' + room);
    this.bgLayer.add(bg);

    const dim = this.add.rectangle(0, 360, 960, 280, 0x000000, 0.18).setOrigin(0,0);
    this.bgLayer.add(dim);

    try { window.__drawRoomDetails && window.__drawRoomDetails(this, 'hope', room); } catch(e){ console.warn('details', e); }

    HOTSPOTS[room].forEach(h => this.makeHotspot(h));
    (NPCS[room] || []).forEach(n => this.makeNPC(n));

    this.refreshHeader();
    this.refreshNavBar();

    this.cameras.main.flash(180, 255, 204, 0); // Yellow flash
  }

  makeHotspot(h) {
    const collected = h.collect && this.gs.collectedEvidence.includes(h.collect);
    const cont = this.add.container(h.x, h.y);
    cont.hsId = h.id;

    const br = this.add.graphics();
    br.lineStyle(1.5, C.ACCENT, 1);
    const r = 22;
    [[-r,-r,1,1],[r,-r,-1,1],[-r,r,1,-1],[r,r,-1,-1]].forEach(([x,y,sx,sy]) => {
      br.beginPath(); br.moveTo(x, y); br.lineTo(x + 8*sx, y); br.moveTo(x, y); br.lineTo(x, y + 8*sy); br.strokePath();
    });
    cont.add(br);

    const dia = this.add.graphics();
    if (collected) { dia.fillStyle(C.ACCENT_D, 0.7); dia.lineStyle(1.5, C.ACCENT, 0.7); } 
    else { dia.fillStyle(C.ACCENT, 1); dia.lineStyle(1.5, C.LIGHT, 1); }
    dia.beginPath(); dia.moveTo(0, -8); dia.lineTo(8, 0); dia.lineTo(0, 8); dia.lineTo(-8, 0); dia.closePath(); dia.fillPath(); dia.strokePath();
    cont.add(dia);

    const lbl = this.add.text(0, 28, h.label, { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:1.5 }).setOrigin(0.5).setAlpha(0);
    cont.add(lbl);

    const hit = this.add.rectangle(0, 0, 56, 56, 0x000000, 0).setInteractive({ useHandCursor:true });
    cont.add(hit);

    hit.on('pointerover', () => { lbl.setAlpha(1); this.tweens.add({ targets: dia, scale:1.4, duration:120 }); });
    hit.on('pointerout', () => { lbl.setAlpha(0); this.tweens.add({ targets: dia, scale:1.0, duration:120 }); });
    hit.on('pointerdown', () => this.triggerHotspot(h));

  refreshEvidenceCards() {
    Object.keys(this.filterBtns).forEach(k => {
      const o = this.filterBtns[k];
      if (k === this.filter) { o.bg.setFillStyle(C.ACCENT, 1).setStrokeStyle(1, C.ACCENT); o.txt.setColor(C.BG_DEEP_S); } 
      else { o.bg.setFillStyle(C.BG_PANEL, 1).setStrokeStyle(1, C.MUTE); o.txt.setColor(C.MUTE_S); }
    });

    const evs = this.gs.collectedEvidence.filter(id => {
      if (this.filter === 'ALL') return true;
      return EVIDENCE_META[id] && EVIDENCE_META[id].type === this.filter;
    });

    this.evCount.setText(`${String(this.gs.collectedEvidence.length).padStart(2,'0')} / 16`);
    this.emptyText.setVisible(evs.length === 0);
    this.cardsHolder.removeAll(true);

    const cardW = 138, cardH = 60, gap = 8;
    const visible = 6;
    const maxScroll = Math.max(0, evs.length - visible);
    if (this.cardScroll > maxScroll) this.cardScroll = maxScroll;

    for (let i = 0; i < visible; i++) {
      const idx = i + this.cardScroll;
      if (idx >= evs.length) break;
      const id = evs[idx];
      const meta = EVIDENCE_META[id];
      const x = i * (cardW + gap);

      const card = this.add.container(x, 0);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, C.MUTE);
      const stripe = this.add.rectangle(0, 0, 3, cardH, C.ACCENT, 1).setOrigin(0,0);
      const tagColor = meta.type === 'PHYSICAL' ? C.ACCENT : (meta.type === 'TESTIMONY' ? 0xccb333 : 0x8a99a8);
      const tagBg = this.add.rectangle(cardW-50, 6, 44, 12, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, tagColor);
      const tagTx = this.add.text(cardW-28, 12, meta.type.slice(0,3), { fontFamily: F.MONO, fontSize:'8px', color:'#'+tagColor.toString(16).padStart(6,'0'), letterSpacing:1 }).setOrigin(0.5);
      const title = this.add.text(10, 14, id.length > 18 ? id.slice(0,17)+'…' : id, { fontFamily: F.UI, fontSize:'12px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:1 });
      const room = this.add.text(10, 30, '> ' + meta.room, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:1 });
      const bottomBar = this.add.rectangle(10, cardH-15, cardW-20, 1, 0x3d3624).setOrigin(0,0);
      const bottomTag = this.add.text(10, cardH-12, '· COLLECTED', { fontFamily: F.MONO, fontSize:'8px', color:C.ACCENT_S, letterSpacing:1 });

      card.add([bg, stripe, tagBg, tagTx, title, room, bottomBar, bottomTag]);
      bg.setInteractive({ useHandCursor: true });
      bg.on('pointerdown', () => window.openEvidenceModal('hope', id));
    
      if (id === this._newestEvidence) {
        card.setScale(0.6); card.setAlpha(0);
        this.tweens.add({ targets: card, scale:1, alpha:1, duration:380, ease:'Back.Out' });
      }
      this.cardsHolder.add(card);
    }
    this._newestEvidence = null;
    this.refreshHeader();
  }
